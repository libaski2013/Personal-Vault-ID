services:
  - type: web
    name: trustid-realtime
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: "*"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
