<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personal Vault - Addresses</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <style>
    .addr-grid{display:grid;grid-template-columns:1fr 380px;gap:22px;align-items:start}
    .addr-item{border:1px solid #E8ECF4;border-radius:14px;padding:14px;background:#fff;margin-bottom:10px}
    .map-frame{height:260px;border-radius:14px;overflow:hidden;border:1px solid #E2E8F0;background:#F8FAFC}
    .map-frame iframe{width:100%;height:100%;border:none}
    @media(max-width:900px){.addr-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"></div>
  </div>
</div>
<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('address');
var home = {}, previous = [];
document.getElementById('content').innerHTML = Layout.spinner();
load();

function esc(v){ return String(v||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];}); }
function text(a){ return [a.street,a.city,a.state,a.postalCode,a.country].filter(Boolean).join(', '); }
function gmaps(a){ return a.mapUrl || ('https://www.google.com/maps/search/'+encodeURIComponent(text(a))); }
function embed(a){ return 'https://maps.google.com/maps?q='+encodeURIComponent(text(a))+'&output=embed&z=15'; }

function load(){
  fetch('/api/trustid/vault/address',{headers:{Authorization:'Bearer '+Auth.getToken()}})
    .then(function(r){return r.json();})
    .then(function(r){ var d=r.data||{}; home=d.homeAddress||{}; previous=d.previousAddresses||[]; render(); });
}

function render(){
  var hasHome = !!text(home);
  document.getElementById('content').innerHTML =
    '<div class="page-header"><div><h1 class="page-title">My Addresses</h1><p class="page-sub">Save home and previous addresses, pin them on Google Maps, and share only what you choose</p></div></div>'
    + '<div class="addr-grid">'
    + '<div style="display:flex;flex-direction:column;gap:18px">'
    + formCard('Home Address','home')
    + '<div class="card"><h3 style="font-size:15px;font-weight:800;margin-bottom:14px">Previous Addresses</h3>'
    + formCardInner('Previous Address','prev')
    + '<div style="margin-top:16px">'+(previous.length?previous.map(addrCard).join(''):'<div class="empty" style="padding:24px">No previous addresses saved yet.</div>')+'</div>'
    + '</div></div>'
    + '<div style="display:flex;flex-direction:column;gap:16px">'
    + '<div class="card"><h3 style="font-size:15px;font-weight:800;margin-bottom:14px">Home Map Pin</h3>'
    + (hasHome?'<div class="map-frame"><iframe src="'+embed(home)+'" loading="lazy"></iframe></div><a class="btn btn-ghost btn-full" style="margin-top:12px" target="_blank" href="'+gmaps(home)+'">Open in Google Maps</a>':'<div class="empty" style="padding:40px">Save your home address to show the map pin.</div>')
    + '</div>'
    + (hasHome?'<div class="card" style="text-align:center"><h3 style="font-size:14px;font-weight:800;margin-bottom:14px">Address QR</h3>'+Layout.qrImg(gmaps(home),180)+'<button onclick="copy(\''+esc(gmaps(home))+'\')" class="btn btn-outline btn-full" style="margin-top:14px">Copy Map Link</button></div>':'')
    + '</div></div>';
}

function formCard(title,prefix){ return '<div class="card"><h3 style="font-size:15px;font-weight:800;margin-bottom:14px">'+title+'</h3>'+formCardInner(title,prefix)+'</div>'; }
function formCardInner(title,prefix){
  var a = prefix === 'home' ? home : {};
  return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    + input(prefix,'label','Label',a.label||title) + input(prefix,'street','Street',a.street)
    + input(prefix,'city','City',a.city) + input(prefix,'state','State / Region',a.state)
    + input(prefix,'country','Country',a.country) + input(prefix,'postalCode','Postal Code',a.postalCode)
    + input(prefix,'livedFrom','From',a.livedFrom) + input(prefix,'livedTo','To',a.livedTo)
    + '</div><div style="margin-top:12px">'+input(prefix,'mapUrl','Google Maps Link',a.mapUrl,'url')+'</div>'
    + '<button onclick="'+(prefix==='home'?'saveHome()':'addPrevious()')+'" class="btn btn-primary btn-full" style="margin-top:14px">'+(prefix==='home'?'Save Home Address':'Add Previous Address')+'</button>';
}
function input(p,id,label,value,type){ return '<div><label class="label">'+label+'</label><input id="'+p+'-'+id+'" class="input" type="'+(type||'text')+'" value="'+esc(value)+'"></div>'; }
function read(prefix){ var ids=['label','street','city','state','country','postalCode','lat','lng','mapUrl','livedFrom','livedTo'], o={}; ids.forEach(function(id){ var el=document.getElementById(prefix+'-'+id); if(el) o[id]=el.value.trim(); }); return o; }

function addrCard(a){
  return '<div class="addr-item"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start">'
    + '<div><div style="font-weight:800">'+esc(a.label||'Previous Address')+'</div><div style="font-size:13px;color:#64748B;line-height:1.5;margin-top:4px">'+esc(text(a))+'</div>'
    + ((a.livedFrom||a.livedTo)?'<div style="font-size:12px;color:#94A3B8;margin-top:4px">'+esc(a.livedFrom||'?')+' - '+esc(a.livedTo||'Present')+'</div>':'')+'</div>'
    + '<div style="display:flex;gap:6px"><a class="btn btn-ghost btn-sm" target="_blank" href="'+gmaps(a)+'">Map</a><button class="btn btn-danger btn-sm" onclick="delPrev(\''+a._id+'\')">Delete</button></div>'
    + '</div></div>';
}

function saveHome(){
  fetch('/api/trustid/vault/address',{method:'PUT',headers:{'Content-Type':'application/json',Authorization:'Bearer '+Auth.getToken()},body:JSON.stringify(read('home'))})
    .then(function(r){return r.json();}).then(function(r){ if(r.success){ Layout.toast('Home address saved.'); load(); } else Layout.toast(r.message||'Could not save address','error'); });
}
function addPrevious(){
  fetch('/api/trustid/vault/addresses',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+Auth.getToken()},body:JSON.stringify(read('prev'))})
    .then(function(r){return r.json();}).then(function(r){ if(r.success){ Layout.toast('Previous address added.'); load(); } else Layout.toast(r.message||'Could not save address','error'); });
}
function delPrev(id){
  fetch('/api/trustid/vault/addresses/'+id,{method:'DELETE',headers:{Authorization:'Bearer '+Auth.getToken()}})
    .then(function(r){return r.json();}).then(function(r){ if(r.success){ previous=previous.filter(function(a){return a._id!==id;}); render(); } });
}
function copy(v){ navigator.clipboard.writeText(v).then(function(){ Layout.toast('Copied.'); }); }
</script>
</body>
</html>
