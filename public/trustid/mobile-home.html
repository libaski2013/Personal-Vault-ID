<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personal Vault — Mobile Home</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#111827">
  <link rel="icon" href="./icon.svg">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#EEF2F8;color:#0F172A;min-height:100vh}
    button,input{font:inherit}
    button{cursor:pointer;border:none}
    .app{min-height:100vh;padding:18px 14px 90px;background:linear-gradient(180deg,#111827 0,#1E1B4B 230px,#EEF2F8 231px)}
    .top{display:flex;align-items:center;justify-content:space-between;color:#fff;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,#7C3AED,#22C55E);display:flex;align-items:center;justify-content:center;font-size:22px}
    .hello{font-size:12px;color:rgba(255,255,255,.62)}
    .name{font-size:18px;font-weight:900}
    .avatar{width:42px;height:42px;border-radius:50%;background:#fff;color:#1E1B4B;display:flex;align-items:center;justify-content:center;font-weight:900;overflow:hidden}
    .avatar img{width:100%;height:100%;object-fit:cover}
    .hero{background:linear-gradient(135deg,#7C3AED,#2563EB 55%,#0F172A);border-radius:24px;padding:20px;color:#fff;box-shadow:0 18px 45px rgba(30,27,75,.35)}
    .hero-row{display:flex;align-items:center;justify-content:space-between;gap:16px}
    .score{font-size:44px;font-weight:900;line-height:1}
    .score-label{font-size:11px;color:rgba(255,255,255,.65);font-weight:700;letter-spacing:.8px;margin-top:4px}
    .trust{font-size:12px;color:rgba(255,255,255,.75);margin-top:12px;line-height:1.6}
    .ring{width:86px;height:86px;border-radius:50%;border:9px solid rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-weight:900;background:rgba(255,255,255,.1)}
    .quick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
    .qbtn{height:78px;border-radius:18px;background:#fff;color:#0F172A;box-shadow:0 8px 24px rgba(15,23,42,.12);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;font-weight:800;font-size:12px}
    .qbtn span{font-size:25px}
    .section{margin-top:20px}
    .section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .section-title{font-size:15px;font-weight:900;color:#0F172A}
    .section-link{font-size:12px;font-weight:800;color:#7C3AED;background:transparent}
    .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .stat{background:#fff;border:1px solid #E6EAF2;border-radius:18px;padding:14px;min-height:86px}
    .stat-ic{font-size:22px;margin-bottom:8px}
    .stat-val{font-size:20px;font-weight:900}
    .stat-lbl{font-size:11px;color:#64748B;margin-top:3px}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .tile{background:#fff;border:1px solid #E6EAF2;border-radius:18px;padding:15px;min-height:104px;display:flex;flex-direction:column;justify-content:space-between;text-align:left}
    .tile-ic{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:12px}
    .tile-title{font-size:13px;font-weight:900}
    .tile-sub{font-size:11px;color:#64748B;margin-top:3px;line-height:1.35}
    .feed{background:#fff;border:1px solid #E6EAF2;border-radius:18px;overflow:hidden}
    .feed-row{display:flex;align-items:center;gap:10px;padding:13px 14px;border-bottom:1px solid #F1F5F9}
    .feed-row:last-child{border-bottom:none}
    .feed-dot{width:9px;height:9px;border-radius:50%;background:#7C3AED;flex-shrink:0}
    .feed-main{flex:1;min-width:0}
    .feed-title{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .feed-sub{font-size:11px;color:#64748B;margin-top:2px}
    .bottom{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid #E6EAF2;display:flex;z-index:50;padding:8px 0 max(8px,env(safe-area-inset-bottom));box-shadow:0 -8px 26px rgba(15,23,42,.08)}
    .bn{flex:1;background:transparent;color:#94A3B8;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-weight:800}
    .bn span{font-size:21px}
    .bn.active{color:#7C3AED}
    .toast{position:fixed;left:14px;right:14px;bottom:86px;background:#111827;color:#fff;border-radius:16px;padding:14px;font-size:13px;font-weight:700;box-shadow:0 12px 34px rgba(15,23,42,.35);z-index:80;display:none}
    .hidden-file{display:none}
    @media(min-width:720px){.app{max-width:460px;margin:0 auto;box-shadow:0 0 0 1px #E5E7EB}.bottom{left:50%;right:auto;width:460px;transform:translateX(-50%)}}
  </style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="brand">
      <div class="logo">🔐</div>
      <div>
        <div class="hello" id="today">Personal Vault</div>
        <div class="name" id="hello">Welcome back</div>
      </div>
    </div>
    <button class="avatar" onclick="go('/trustid/profile.html')" id="avatar">PV</button>
  </div>

  <div class="hero">
    <div class="hero-row">
      <div>
        <div class="score" id="score">--</div>
        <div class="score-label">TRUST SCORE</div>
        <div class="trust" id="trustText">Syncing live vault status...</div>
      </div>
      <div class="ring" id="level">L--</div>
    </div>
  </div>

  <div class="quick">
    <button class="qbtn" onclick="pickScan()"><span>🤖</span>AI Scan</button>
    <button class="qbtn" onclick="go('/trustid/documents.html')"><span>📤</span>Upload</button>
    <button class="qbtn" onclick="go('/trustid/share.html')"><span>▦</span>QR Share</button>
  </div>

  <input id="scanFile" class="hidden-file" type="file" accept="image/*,.pdf" onchange="saveScan(this.files&&this.files[0])">

  <div class="section">
    <div class="section-head">
      <div class="section-title">Live Vault</div>
      <button class="section-link" onclick="loadLive()">Refresh</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-ic">📁</div><div class="stat-val" id="docsCount">--</div><div class="stat-lbl">Documents</div></div>
      <div class="stat"><div class="stat-ic">✅</div><div class="stat-val" id="verifiedCount">--</div><div class="stat-lbl">Verified</div></div>
      <div class="stat"><div class="stat-ic">🔔</div><div class="stat-val" id="remCount">--</div><div class="stat-lbl">Reminders</div></div>
      <div class="stat"><div class="stat-ic">🗓️</div><div class="stat-val" id="eventCount">--</div><div class="stat-lbl">Events</div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Modules</div>
      <button class="section-link" onclick="go('/trustid/dashboard.html')">Classic</button>
    </div>
    <div class="grid">
      <button class="tile" onclick="go('/trustid/chat.html')"><div><div class="tile-ic" style="background:#7C3AED18">📡</div><div class="tile-title">Social Network</div><div class="tile-sub">Anonymous discovery and chat</div></div></button>
      <button class="tile" onclick="go('/trustid/card.html')"><div><div class="tile-ic" style="background:#22C55E18">🪪</div><div class="tile-title">Digital Card</div><div class="tile-sub">Contact card and QR scan</div></div></button>
      <button class="tile" onclick="go('/trustid/vault.html')"><div><div class="tile-ic" style="background:#0F172A12">🔐</div><div class="tile-title">Secret Vault</div><div class="tile-sub">PIN protected notes and files</div></div></button>
      <button class="tile" onclick="go('/trustid/reminders.html')"><div><div class="tile-ic" style="background:#F9731618">⏰</div><div class="tile-title">Reminders</div><div class="tile-sub">Date, time and phone alarms</div></div></button>
      <button class="tile" onclick="go('/trustid/calendar.html')"><div><div class="tile-ic" style="background:#3B82F618">📅</div><div class="tile-title">Calendar</div><div class="tile-sub">Tagged dates and events</div></div></button>
      <button class="tile" onclick="go('/trustid/address.html')"><div><div class="tile-ic" style="background:#10B98118">📍</div><div class="tile-title">Addresses</div><div class="tile-sub">Home, previous and map pins</div></div></button>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <div class="section-title">Recent Activity</div>
      <button class="section-link" onclick="go('/trustid/documents.html')">Docs</button>
    </div>
    <div class="feed" id="feed">
      <div class="feed-row"><div class="feed-dot"></div><div class="feed-main"><div class="feed-title">Loading live feed...</div><div class="feed-sub">Please wait</div></div></div>
    </div>
  </div>
</div>

<div class="bottom">
  <button class="bn active" onclick="go('/trustid/mobile-home.html')"><span>⌂</span>Home</button>
  <button class="bn" onclick="pickScan()"><span>🤖</span>Scan</button>
  <button class="bn" onclick="go('/trustid/chat.html')"><span>📡</span>Social</button>
  <button class="bn" onclick="go('/trustid/vault.html')"><span>🔐</span>Vault</button>
  <button class="bn" onclick="go('/trustid/profile.html')"><span>👤</span>Profile</button>
</div>
<div class="toast" id="toast"></div>

<script src="./js/config.js"></script>
<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script>
var user = Auth.getUser() || {};
if (user.role === 'admin') location.replace(PV.appPath('/trustid/admin/dashboard.html'));

function go(path){ location.href = PV.appPath(path); }
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  clearTimeout(window.__pvToast);
  window.__pvToast=setTimeout(function(){t.style.display='none';},3200);
}
function initials(){
  return ((user.firstName||'P')[0]||'P').toUpperCase()+((user.lastName||'V')[0]||'V').toUpperCase();
}
function pickScan(){ document.getElementById('scanFile').click(); }
async function saveScan(file){
  if(!file) return;
  toast('AI scanner enhancing document...');
  setTimeout(async function(){
    var name=(file.name||'AI scanned document').replace(/\.[^.]+$/,'');
    var type=(file.type||'document').split('/').pop()||'document';
    var r=await Api.uploadDoc({name:name+' - AI enhanced',type:type,category:'identity'});
    if(r.success){ toast('AI scan saved to Documents'); loadLive(); }
    else toast(r.message||'Could not save scan');
  },900);
}
function feedRow(icon,title,sub,color){
  return '<div class="feed-row"><div class="feed-dot" style="background:'+color+'"></div><div class="feed-main"><div class="feed-title">'+title+'</div><div class="feed-sub">'+sub+'</div></div><div style="font-size:20px">'+icon+'</div></div>';
}
function fmt(d){ return d ? new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'No date'; }
async function loadLive(){
  var tid=user.trustId||{};
  document.getElementById('today').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  document.getElementById('hello').textContent='Hi, '+(user.firstName||'there');
  document.getElementById('score').textContent=tid.score||100;
  document.getElementById('level').textContent='L'+(tid.level||1);
  document.getElementById('trustText').textContent=(tid.id||'TrustID pending')+' · '+(user.tier||'free')+' plan';
  var av=document.getElementById('avatar');
  av.innerHTML=user.profilePhoto?'<img src="'+user.profilePhoto+'" alt="">':initials();

  var results=await Promise.all([
    Api.getDocs(), Api.getReminders(), Api.getTodos(), Api.getExpenses(), Api.getCalendarEvents()
  ]);
  var docs=results[0].success?results[0].data:[];
  var rems=results[1].success?results[1].data:[];
  var todos=results[2].success?results[2].data:[];
  var expenses=results[3].success?results[3].data:[];
  var events=results[4].success?results[4].data:[];
  document.getElementById('docsCount').textContent=docs.length;
  document.getElementById('verifiedCount').textContent=docs.filter(function(d){return d.status==='verified';}).length;
  document.getElementById('remCount').textContent=rems.filter(function(r){return !r.done;}).length;
  document.getElementById('eventCount').textContent=events.length;

  var rows=[];
  docs.slice(0,2).forEach(function(d){rows.push(feedRow('📄',d.name||d.type,(d.status||'pending')+' · '+fmt(d.createdAt),'#7C3AED'));});
  rems.filter(function(r){return !r.done;}).slice(0,2).forEach(function(r){rows.push(feedRow('🔔',r.title,fmt(r.dueDate||r.alarmAt),'#F97316'));});
  todos.filter(function(t){return !t.done;}).slice(0,1).forEach(function(t){rows.push(feedRow('✅',t.title,fmt(t.dueDate),'#22C55E'));});
  if(!rows.length) rows.push(feedRow('✨','Your mobile vault is ready','Add documents, reminders or events to see live activity','#3B82F6'));
  document.getElementById('feed').innerHTML=rows.join('');
}
loadLive();
</script>
</body>
</html>
