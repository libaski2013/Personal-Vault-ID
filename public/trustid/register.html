<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1E1B4B">
  <link rel="icon" href="./icon.svg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,-apple-system,sans-serif;min-height:100vh;display:flex}
    input,button{font:inherit}

    .left{flex:1;background:linear-gradient(155deg,#0F0E2A,#1E1B4B,#312E81);display:flex;align-items:center;justify-content:center;padding:60px}
    .left-inner{max-width:380px;color:#fff}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:52px}
    .brand-icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px}
    .brand-name{font-size:22px;font-weight:900}
    .left h2{font-size:30px;font-weight:900;margin-bottom:12px}
    .left p{color:rgba(255,255,255,0.65);font-size:15px;line-height:1.75}

    .right{width:500px;display:flex;align-items:center;justify-content:center;padding:52px;background:#fff;overflow-y:auto}
    .form-box{width:100%;max-width:400px}
    .back-link{display:block;color:#64748B;font-size:14px;font-weight:600;margin-bottom:28px;text-decoration:none}
    .back-link:hover{color:#7C3AED}
    .form-box h1{font-size:25px;font-weight:900;color:#0F172A;margin-bottom:6px}
    .form-box .sub{color:#64748B;font-size:13px;margin-bottom:24px}
    .error-box{padding:10px 14px;border-radius:10px;background:#EF444412;border:1px solid #EF444430;color:#EF4444;font-size:13px;margin-bottom:14px;display:none}
    .success-box{padding:10px 14px;border-radius:10px;background:#22C55E12;border:1px solid #22C55E30;color:#22C55E;font-size:13px;margin-bottom:14px;display:none}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
    .field{margin-bottom:0}
    .field-full{margin-bottom:14px}
    .field label,.field-full label{display:block;font-weight:600;font-size:13px;color:#334155;margin-bottom:6px}
    .field input,.field-full input{width:100%;height:43px;padding:0 12px;border-radius:10px;border:1.5px solid #E2E8F0;font-size:14px;color:#0F172A;outline:none;transition:border-color 0.15s}
    .field input:focus,.field-full input:focus{border-color:#7C3AED}
    .req{color:#EF4444;margin-left:3px}
    .btn-submit{width:100%;height:44px;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#8B5CF6);border:none;color:#fff;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:22px;transition:opacity 0.15s}
    .btn-submit:hover{opacity:0.9}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed}
    .spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;animation:spin 0.8s linear infinite;display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .login-link{text-align:center;margin-top:18px;font-size:13px;color:#64748B}
    .login-link a{color:#7C3AED;font-weight:700;text-decoration:none}

    /* Success screen */
    .success-screen{display:none;text-align:center;padding:20px 0}
    .success-screen .big-icon{font-size:60px;margin-bottom:18px}
    .success-screen h2{font-size:26px;font-weight:900;color:#0F172A;margin-bottom:10px}
    .success-screen p{color:#64748B;line-height:1.65;margin-bottom:28px}
    .btn-go{width:100%;height:44px;border-radius:10px;background:linear-gradient(135deg,#7C3AED,#8B5CF6);border:none;color:#fff;font-weight:700;font-size:14px;cursor:pointer}

    @media(max-width:640px){
      body{flex-direction:column}
      .left{display:none}
      .right{width:100%;padding:32px 24px}
      .grid-2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>

<div class="left">
  <div class="left-inner">
    <div class="brand">
      <div class="brand-icon">🛡️</div>
      <span class="brand-name">TrustID</span>
    </div>
    <h2>Create your TrustID account</h2>
    <p>Get verified and start building your trust score in minutes.</p>
  </div>
</div>

<div class="right">
  <div class="form-box">

    <!-- Registration form -->
    <div id="formSection">
      <a href="./login.html" class="back-link">← Back to Sign In</a>
      <h1>Create Account</h1>
      <p class="sub">Free forever. No credit card required.</p>

      <div class="error-box" id="err"></div>

      <div class="grid-2">
        <div class="field">
          <label>First name <span class="req">*</span></label>
          <input type="text" id="firstName" placeholder="Jane" autocomplete="given-name">
        </div>
        <div class="field">
          <label>Last name</label>
          <input type="text" id="lastName" placeholder="Doe" autocomplete="family-name">
        </div>
      </div>

      <div class="field-full">
        <label>Email <span class="req">*</span></label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field-full">
        <label>Password <span class="req">*</span></label>
        <input type="password" id="password" placeholder="Min 8 characters" autocomplete="new-password">
      </div>
      <div class="field-full">
        <label>Confirm password <span class="req">*</span></label>
        <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password">
      </div>

      <button class="btn-submit" id="submitBtn" onclick="doRegister()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Create Account</span>
      </button>

      <div class="login-link">Have an account? <a href="./login.html">Sign in</a></div>
    </div>

    <!-- Success screen -->
    <div class="success-screen" id="successSection">
      <div class="big-icon">🎉</div>
      <h2>Account Created!</h2>
      <p>Welcome to TrustID. Your account is ready and you're now logged in.</p>
      <button class="btn-go" onclick="location.href='./dashboard.html'">Go to Dashboard →</button>
    </div>

  </div>
</div>

<script>
  /* Redirect logged-in users */
  (function () {
    try {
      if (localStorage.getItem('tid_token')) {
        var u = JSON.parse(localStorage.getItem('tid_user') || 'null');
        location.replace(u && u.role === 'admin' ? './admin/dashboard.html' : './dashboard.html');
      }
    } catch(e){}
  })();

  async function doRegister() {
    var firstName = document.getElementById('firstName').value.trim();
    var lastName  = document.getElementById('lastName').value.trim();
    var email     = document.getElementById('email').value.trim();
    var password  = document.getElementById('password').value;
    var confirm   = document.getElementById('confirm').value;
    var btn       = document.getElementById('submitBtn');
    var spinner   = document.getElementById('spinner');
    var btnText   = document.getElementById('btnText');

    if (!firstName || !email || !password) { showErr('Please fill in all required fields.'); return; }
    if (password !== confirm)              { showErr('Passwords do not match.');            return; }
    if (password.length < 8)              { showErr('Password must be at least 8 characters.'); return; }

    btn.disabled          = true;
    spinner.style.display = 'block';
    btnText.textContent   = 'Creating…';
    document.getElementById('err').style.display = 'none';

    try {
      var res  = await fetch('/api/trustid/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ firstName: firstName, lastName: lastName, email: email, password: password })
      });
      var data = await res.json();

      if (data.success && data.token) {
        localStorage.setItem('tid_token', data.token);
        localStorage.setItem('tid_user',  JSON.stringify(data.user));
        document.getElementById('formSection').style.display    = 'none';
        document.getElementById('successSection').style.display = 'block';
      } else {
        showErr(data.message || 'Registration failed. Please try again.');
      }
    } catch(e) {
      showErr('Network error. Please try again.');
    }

    btn.disabled          = false;
    spinner.style.display = 'none';
    btnText.textContent   = 'Create Account';
  }

  function showErr(msg) {
    var el = document.getElementById('err');
    el.textContent   = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
