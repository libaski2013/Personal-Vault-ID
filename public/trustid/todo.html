<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — To-Do List</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>

<!-- Add Task Modal -->
<div id="todoModal" class="modal-backdrop" style="display:none">
  <div class="modal" style="max-width:440px;width:100%">
    <div class="modal-header">
      <h2 class="modal-title">Add Task</h2>
      <button onclick="closeTodoModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#94A3B8;line-height:1;padding:0">&times;</button>
    </div>
    <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
      <div>
        <label class="label">Task Title <span style="color:#EF4444">*</span></label>
        <input id="todoTitle" class="input" placeholder="e.g. Upload bank statement">
      </div>
      <div>
        <label class="label">Category</label>
        <input id="todoCategory" class="input" placeholder="e.g. Documents, Finance…">
      </div>
      <div>
        <label class="label">Due Date & Time</label>
        <input id="todoDate" class="input" type="datetime-local">
      </div>
      <label style="display:flex;align-items:center;gap:8px;font-size:13px;color:#334155;font-weight:600">
        <input id="todoAlarm" type="checkbox" style="width:17px;height:17px;accent-color:#7C3AED">
        Trigger phone/app alarm
      </label>
      <div>
        <label class="label">Priority</label>
        <div style="display:flex;gap:10px">
          <button id="tp-low"    onclick="setTodoPriority('low')"    style="flex:1;height:40px;border-radius:10px;background:#22C55E20;border:1.5px solid #22C55E;cursor:pointer;font-weight:700;font-size:13px;color:#22C55E">Low</button>
          <button id="tp-medium" onclick="setTodoPriority('medium')" style="flex:1;height:40px;border-radius:10px;background:transparent;border:1.5px solid #E2E8F0;cursor:pointer;font-weight:700;font-size:13px;color:#94A3B8">Medium</button>
          <button id="tp-high"   onclick="setTodoPriority('high')"   style="flex:1;height:40px;border-radius:10px;background:transparent;border:1.5px solid #E2E8F0;cursor:pointer;font-weight:700;font-size:13px;color:#94A3B8">High</button>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button onclick="closeTodoModal()" class="btn btn-ghost btn-full">Cancel</button>
        <button onclick="submitTodo()" id="todoBtn" class="btn btn-primary btn-full">Add Task</button>
      </div>
    </div>
  </div>
</div>

<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script src="./js/alarms.js"></script>
<script>
Layout.init('todo');
document.getElementById('loading').innerHTML = Layout.spinner();

var PCOL     = { high:'#EF4444', medium:'#F97316', low:'#22C55E' };
var allTodos = [];
var selPriority = 'low';

function openTodoModal()  { document.getElementById('todoModal').style.display = 'flex'; setTodoPriority('low'); }
function closeTodoModal() {
  document.getElementById('todoModal').style.display = 'none';
  document.getElementById('todoTitle').value    = '';
  document.getElementById('todoCategory').value = '';
  document.getElementById('todoDate').value = '';
  document.getElementById('todoAlarm').checked = false;
  selPriority = 'low';
}

function fmtDateTime(d) {
  return d ? new Date(d).toLocaleString([], { month:'short', day:'numeric', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
}

function setTodoPriority(p) {
  selPriority = p;
  ['low','medium','high'].forEach(function(lvl) {
    var btn = document.getElementById('tp-' + lvl);
    if (!btn) return;
    var c = PCOL[lvl];
    if (lvl === p) {
      btn.style.background = c + '20';
      btn.style.border     = '1.5px solid ' + c;
      btn.style.color      = c;
    } else {
      btn.style.background = 'transparent';
      btn.style.border     = '1.5px solid #E2E8F0';
      btn.style.color      = '#94A3B8';
    }
  });
}

function renderTodos() {
  var active    = allTodos.filter(function(t){ return !t.done; });
  var completed = allTodos.filter(function(t){ return t.done;  });

  var activeEl = document.getElementById('activeList');
  var doneEl   = document.getElementById('doneList');
  var aHead    = document.getElementById('activeHead');
  var dHead    = document.getElementById('doneHead');

  if (aHead) aHead.textContent = 'Active (' + active.length + ')';
  if (dHead) dHead.textContent = 'Completed (' + completed.length + ')';

  if (activeEl) {
    if (active.length === 0) {
      activeEl.innerHTML = '<div style="text-align:center;padding:32px 0;color:#94A3B8;font-size:14px">All done! 🎉</div>';
    } else {
      activeEl.innerHTML = active.map(function(t) {
        var c = PCOL[t.priority] || '#94A3B8';
        return '<div class="card" style="display:flex;gap:12px;align-items:center;margin-bottom:9px">'
          + '<div onclick="toggleTodo(\'' + t._id + '\',' + (t.done ? 'true' : 'false') + ')" style="width:22px;height:22px;border-radius:50%;border:2px solid ' + c + ';cursor:pointer;flex-shrink:0"></div>'
          + '<div style="flex:1">'
          +   '<div style="font-weight:600;font-size:13px;color:#0F172A">' + t.title + '</div>'
          +   '<div style="font-size:11px;color:#64748B;margin-top:2px">' + (t.category || 'General') + (t.dueDate ? ' · 📅 ' + fmtDateTime(t.dueDate) : '') + (t.alarm && t.dueDate ? ' · 🔔 Alarm' : '') + '</div>'
          + '</div>'
          + '<span style="padding:2px 8px;border-radius:100px;background:' + c + '15;color:' + c + ';font-size:10px;font-weight:700;text-transform:capitalize">' + (t.priority||'medium') + '</span>'
          + '<button onclick="deleteTodo(\'' + t._id + '\')" style="background:none;border:none;cursor:pointer;color:#CBD5E1;font-size:15px;padding:4px">🗑</button>'
          + '</div>';
      }).join('');
    }
  }

  if (doneEl) {
    if (completed.length === 0) {
      doneEl.innerHTML = '<div style="text-align:center;padding:32px 0;color:#94A3B8;font-size:14px">No completed tasks yet.</div>';
    } else {
      doneEl.innerHTML = completed.map(function(t) {
        return '<div class="card" style="display:flex;gap:12px;align-items:center;margin-bottom:9px;opacity:0.65">'
          + '<div onclick="toggleTodo(\'' + t._id + '\',' + (t.done ? 'true' : 'false') + ')" style="width:22px;height:22px;border-radius:50%;background:#22C55E20;border:2px solid #22C55E;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:11px;color:#22C55E">✓</div>'
          + '<span style="flex:1;text-decoration:line-through;color:#94A3B8;font-size:13px">' + t.title + '</span>'
          + '<button onclick="deleteTodo(\'' + t._id + '\')" style="background:none;border:none;cursor:pointer;color:#CBD5E1;font-size:15px;padding:4px">🗑</button>'
          + '</div>';
      }).join('');
    }
  }
}

function toggleTodo(id, wasDone) {
  Api.updateTodo(id, { done: !wasDone }).then(function(res) {
    if (res.success) {
      allTodos = allTodos.map(function(t){ return t._id === id ? Object.assign({}, t, { done: !wasDone }) : t; });
      renderTodos();
    }
  });
}

function deleteTodo(id) {
  Layout.confirm('Delete this task?', function() {
    Api.deleteTodo(id).then(function() {
      allTodos = allTodos.filter(function(t){ return t._id !== id; });
      renderTodos();
      Layout.toast('Task deleted.', 'info');
    });
  }, {title:'Delete Task?', icon:'✅', yesLabel:'Yes, Delete'});
}

function submitTodo() {
  var title    = document.getElementById('todoTitle').value.trim();
  var category = document.getElementById('todoCategory').value.trim() || 'General';
  var dueDate  = document.getElementById('todoDate').value;
  var alarm    = document.getElementById('todoAlarm').checked;
  if (!title) { Layout.toast('Task title is required.', 'error'); return; }

  var btn = document.getElementById('todoBtn');
  btn.disabled    = true;
  btn.textContent = 'Adding…';

  Api.addTodo({ title: title, category: category, dueDate: dueDate || null, alarmAt: dueDate || null, alarm: alarm, priority: selPriority }).then(function(res) {
    btn.disabled    = false;
    btn.textContent = 'Add Task';
    if (res.success) {
      allTodos.unshift(res.data);
      if (window.PVAlarms) PVAlarms.schedule('todo', res.data);
      renderTodos();
      closeTodoModal();
      Layout.toast('Task added!');
    } else {
      Layout.toast(res.message || 'Failed to add task.', 'error');
    }
  });
}

Api.getTodos().then(function(res) {
  allTodos = res.success ? res.data : [];
  var active = allTodos.filter(function(t){ return !t.done; }).length;
  var done   = allTodos.filter(function(t){ return t.done;  }).length;

  document.getElementById('content').innerHTML =
    '<div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">'
    + '<div><h1 class="page-title">To-Do List</h1><p class="page-sub">' + active + ' pending · ' + done + ' completed</p></div>'
    + '<div style="display:flex;gap:8px;flex-wrap:wrap"><button onclick="PVAlarms.ask().then(function(ok){Layout.toast(ok?\'Alarms enabled\':\'Notifications are blocked\', ok?\'success\':\'warning\')})" class="btn btn-ghost">🔔 Enable Alarms</button><button onclick="openTodoModal()" class="btn btn-primary">➕ Add Task</button></div>'
    + '</div>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:22px">'

    + '<div>'
    +   '<h3 id="activeHead" style="font-size:13px;font-weight:800;color:#334155;margin-bottom:12px">Active</h3>'
    +   '<div id="activeList"></div>'
    + '</div>'

    + '<div>'
    +   '<h3 id="doneHead" style="font-size:13px;font-weight:800;color:#64748B;margin-bottom:12px">Completed</h3>'
    +   '<div id="doneList"></div>'
    + '</div>'

    + '</div>';

  renderTodos();
  if (window.PVAlarms) PVAlarms.scheduleAll([], allTodos);
}).catch(function() {
  document.getElementById('content').innerHTML = '<div class="empty">Failed to load tasks. Please refresh.</div>';
});
</script>
</body>
</html>
