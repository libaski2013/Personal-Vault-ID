<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — To-Do List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./js/react.min.js"></script>
  <script src="./js/react-dom.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="./js/auth.js"></script>
<script>Auth.requireAuth();</script>
<script src="./js/api.js"></script>
<script src="./js/components.js"></script>
<script>
const { createElement: h, useState, useEffect, useCallback } = React;
const pc = { high:C.red, medium:C.orange, low:C.green };

function TodoPage() {
  const [todos,  setTodos]  = useState([]);
  const [loading,setLoading]= useState(true);
  const [show,   setShow]   = useState(false);
  const [form,   setForm]   = useState({ title:'', priority:'medium', category:'General' });
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  const load = useCallback(async () => {
    setLoading(true);
    const r = await Api.getTodos();
    if (r.success) setTodos(r.data);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const add = async () => {
    if (!form.title) return;
    setSaving(true);
    const r = await Api.addTodo(form);
    setSaving(false);
    if (r.success) { setTodos(p=>[r.data,...p]); setForm({title:'',priority:'medium',category:'General'}); setShow(false); toast({type:'success',msg:'Task added!'}); }
  };

  const toggle = async (id, done) => {
    const r = await Api.updateTodo(id, { done:!done });
    if (r.success) setTodos(p=>p.map(x=>x._id===id?{...x,done:!done}:x));
  };

  const del = async id => {
    await Api.deleteTodo(id);
    setTodos(p=>p.filter(t=>t._id!==id));
  };

  const active = todos.filter(t=>!t.done);
  const done   = todos.filter(t=>t.done);

  return h(AppLayout, { activePage:'todo' },
    h('div', null,
      h(PH, { title:'To-Do List', sub:`${active.length} pending · ${done.length} completed`,
        actions: h(Btn, { label:'Add Task', icon:'➕', full:false, sm:true, onClick:()=>setShow(true) }) }),

      loading ? h('div', { style:{display:'flex',justifyContent:'center',padding:60} }, h(Spin, { sz:32 })) :
      h('div', { style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:22} },
        h('div', null,
          h('h3', { style:{fontSize:13,fontWeight:800,marginBottom:12} }, `Active (${active.length})`),
          active.map(t => h('div', { key:t._id, className:'card', style:{display:'flex',gap:12,alignItems:'center',marginBottom:9} },
            h('div', { onClick:()=>toggle(t._id,t.done), style:{width:22,height:22,borderRadius:'50%',border:`2px solid ${pc[t.priority]}`,cursor:'pointer',flexShrink:0} }),
            h('div', { style:{flex:1} },
              h('div', { style:{fontWeight:600,fontSize:13} }, t.title),
              h('div', { style:{fontSize:11,color:C[500]} }, t.category)
            ),
            h('span', { style:{padding:'2px 8px',borderRadius:100,background:pc[t.priority]+'15',color:pc[t.priority],fontSize:10,fontWeight:700,textTransform:'capitalize'} }, t.priority),
            h('button', { onClick:()=>del(t._id), style:{background:'none',border:'none',cursor:'pointer',color:C[300],fontSize:15} }, '🗑')
          ))
        ),
        h('div', null,
          h('h3', { style:{fontSize:13,fontWeight:800,color:C[500],marginBottom:12} }, `Completed (${done.length})`),
          done.map(t => h('div', { key:t._id, className:'card', style:{display:'flex',gap:12,alignItems:'center',marginBottom:9,opacity:0.65} },
            h('div', { onClick:()=>toggle(t._id,t.done), style:{width:22,height:22,borderRadius:'50%',background:C.green+'20',border:`2px solid ${C.green}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,fontSize:11} }, '✓'),
            h('span', { style:{flex:1,textDecoration:'line-through',color:C[400],fontSize:13} }, t.title)
          ))
        )
      ),

      h(Modal, { open:show, onClose:()=>setShow(false), title:'Add Task' },
        h('div', { style:{display:'flex',flexDirection:'column',gap:15} },
          h(Field, { label:'Task', value:form.title, onChange:v=>setForm(f=>({...f,title:v})), placeholder:'e.g. Upload bank statement', req:true }),
          h(Field, { label:'Category', value:form.category, onChange:v=>setForm(f=>({...f,category:v})), placeholder:'e.g. Documents' }),
          h('div', null,
            h('label', { className:'label' }, 'Priority'),
            h('div', { style:{display:'flex',gap:10} },
              ['low','medium','high'].map(p => h('button', { key:p, onClick:()=>setForm(f=>({...f,priority:p})),
                style:{flex:1,height:40,borderRadius:10,background:form.priority===p?pc[p]+'20':'transparent',border:`1.5px solid ${form.priority===p?pc[p]:C[200]}`,cursor:'pointer',fontWeight:700,fontSize:13,color:form.priority===p?pc[p]:C[500],textTransform:'capitalize'} }, p))
            )
          ),
          h(Btn, { label:'Add Task', onClick:add, loading:saving })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(TodoPage));
</script>
</body>
</html>
