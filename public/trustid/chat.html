<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personal Vault — Messages</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <style>
    /* ══ SCREENSHOT PREVENTION ══ */
    .chat-protected {
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      user-select: none !important;
      -webkit-touch-callout: none !important;
    }
    /* Watermark with user identity */
    .chat-watermark {
      position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background: repeating-linear-gradient(
        -45deg, transparent, transparent 120px,
        rgba(124,58,237,0.025) 120px, rgba(124,58,237,0.025) 122px
      );
      display: flex; align-items: center; justify-content: center;
    }
    .chat-watermark span {
      font-size: 11px; color: rgba(124,58,237,0.06); font-weight: 700;
      transform: rotate(-35deg); white-space: nowrap; letter-spacing: 2px;
      user-select: none; pointer-events: none;
    }
    /* Screenshot overlay */
    #screenshotOverlay {
      position: fixed; inset: 0; background: #0F0E2A; z-index: 99999;
      display: none; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; color: #fff;
    }
    /* ══ CHAT LAYOUT ══ */
    .chat-shell  { display:flex; height:calc(100vh - 62px); overflow:hidden; background:#F0F2F8; }
    .conv-panel  { width:290px; border-right:1px solid #E8ECF4; display:flex; flex-direction:column; background:#fff; flex-shrink:0; }
    .msg-panel   { flex:1; display:flex; flex-direction:column; }
    /* Conversation list */
    .conv-hdr    { padding:14px 16px; border-bottom:1px solid #E8ECF4; display:flex; align-items:center; justify-content:space-between; }
    .conv-search { padding:10px 14px; border-bottom:1px solid #E8ECF4; }
    .conv-search input { width:100%; height:34px; padding:0 12px; border-radius:20px; border:1px solid #E2E8F0; font-size:13px; outline:none; background:#F8FAFC; }
    .conv-list   { flex:1; overflow-y:auto; }
    .conv-item   { display:flex; align-items:center; gap:11px; padding:12px 14px; cursor:pointer; border-bottom:1px solid #F8FAFC; transition:background 0.1s; }
    .conv-item:hover  { background:#F8FAFC; }
    .conv-item.active { background:#7C3AED0C; border-left:3px solid #7C3AED; padding-left:11px; }
    .c-av   { width:42px; height:42px; border-radius:50%; background:linear-gradient(135deg,#7C3AED,#8B5CF6); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:14px; flex-shrink:0; position:relative; }
    .dot-on { position:absolute; bottom:1px; right:1px; width:11px; height:11px; border-radius:50%; background:#22C55E; border:2px solid #fff; }
    .dot-off{ position:absolute; bottom:1px; right:1px; width:11px; height:11px; border-radius:50%; background:#E2E8F0; border:2px solid #fff; }
    .c-info  { flex:1; min-width:0; }
    .c-name  { font-size:13px; font-weight:700; color:#0F172A; margin-bottom:2px; }
    .c-last  { font-size:11px; color:#94A3B8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .c-badge { min-width:18px; height:18px; border-radius:9px; background:#7C3AED; color:#fff; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; padding:0 4px; }
    /* Message area */
    .msg-hdr  { padding:12px 18px; border-bottom:1px solid #E8ECF4; background:#fff; display:flex; align-items:center; gap:10px; box-shadow:0 1px 4px rgba(0,0,0,0.04); }
    .msg-body { flex:1; overflow-y:auto; padding:16px 18px; display:flex; flex-direction:column; gap:2px; }
    .msg-foot { padding:10px 14px; background:#fff; border-top:1px solid #E8ECF4; display:flex; align-items:flex-end; gap:8px; }
    .msg-inp  { flex:1; min-height:40px; max-height:110px; padding:10px 16px; border-radius:22px; border:1.5px solid #E2E8F0; font-size:14px; outline:none; resize:none; line-height:1.4; font-family:inherit; transition:border-color 0.15s; background:#F8FAFC; }
    .msg-inp:focus { border-color:#7C3AED; background:#fff; }
    .send-btn { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#7C3AED,#8B5CF6); border:none; cursor:pointer; font-size:17px; color:#fff; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:transform 0.12s; }
    .send-btn:hover { transform:scale(1.08); }
    .send-btn:active{ transform:scale(0.92); }
    .photo-btn{ width:38px; height:38px; border-radius:50%; background:#F1F5F9; border:none; cursor:pointer; font-size:18px; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.15s; }
    .photo-btn:hover{ background:#E2E8F0; }
    /* Bubbles */
    .brow  { display:flex; margin-bottom:2px; animation:msgIn 0.15s ease; }
    .brow.me   { justify-content:flex-end; }
    .brow.them { justify-content:flex-start; }
    @keyframes msgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .bub   { max-width:70%; padding:9px 14px; border-radius:18px; font-size:14px; line-height:1.5; word-break:break-word; }
    .bub.me   { background:linear-gradient(135deg,#7C3AED,#8B5CF6); color:#fff; border-bottom-right-radius:4px; }
    .bub.them { background:#fff; color:#0F172A; border:1px solid #E8ECF4; border-bottom-left-radius:4px; }
    .btime { font-size:10px; opacity:0.6; margin-top:3px; display:block; }
    .bub.me .btime { text-align:right; }
    /* Photo bubble */
    .bub img { max-width:220px; max-height:220px; border-radius:12px; display:block; object-fit:cover; cursor:pointer; }
    /* Live-type preview bubble */
    .live-preview { background:#E8ECF4; color:#334155; border-bottom-left-radius:4px; font-style:italic; opacity:0.85; }
    .live-cursor  { display:inline-block; width:2px; height:14px; background:#7C3AED; animation:blink 0.9s step-end infinite; vertical-align:middle; margin-left:1px; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    /* Date divider */
    .date-div { text-align:center; font-size:11px; color:#94A3B8; padding:8px 0; font-weight:600; }
    /* Typing dots */
    .typing-row { display:flex; align-items:center; gap:4px; padding:4px 0 6px; height:22px; opacity:0; transition:opacity 0.2s; }
    .typing-row.show { opacity:1; }
    .td { width:6px; height:6px; border-radius:50%; background:#94A3B8; animation:bounce 1.2s ease-in-out infinite; }
    .td:nth-child(2){animation-delay:.2s} .td:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
    /* System messages */
    .sys-msg { text-align:center; font-size:12px; color:#94A3B8; padding:8px 0; font-style:italic; }
    /* Mood badge */
    .mood-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:100px; background:#7C3AED12; border:1px solid #7C3AED30; font-size:13px; }
    /* End chat btn */
    .end-btn { padding:7px 14px; border-radius:20px; background:#EF444412; border:1px solid #EF444430; color:#EF4444; font-size:12px; font-weight:700; cursor:pointer; white-space:nowrap; }
    /* Empty state */
    .chat-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; text-align:center; padding:40px; color:#94A3B8; background:#F8FAFC; }
    /* Screenshot warning toast */
    .ss-warn { position:fixed; top:80px; left:50%; transform:translateX(-50%); background:#EF4444; color:#fff; padding:12px 24px; border-radius:12px; font-weight:700; font-size:14px; z-index:9999; animation:fadeIn 0.2s; box-shadow:0 8px 24px rgba(239,68,68,0.4); }
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    /* MOOD MODAL */
    .mood-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin:16px 0; }
    .mood-opt  { display:flex; flex-direction:column; align-items:center; gap:4px; padding:12px 8px; border-radius:14px; border:2px solid #E2E8F0; cursor:pointer; transition:all 0.15s; }
    .mood-opt:hover  { border-color:#7C3AED; background:#7C3AED06; }
    .mood-opt.sel    { border-color:#7C3AED; background:#7C3AED12; }
    .mood-opt .me    { font-size:28px; }
    .mood-opt .ml    { font-size:10px; font-weight:600; color:#64748B; text-align:center; }
    .mood-opt.sel .ml{ color:#7C3AED; }
    /* Mobile */
    @media(max-width:640px){
      .conv-panel{ position:absolute; z-index:20; height:calc(100vh - 62px); width:280px; box-shadow:4px 0 20px rgba(0,0,0,0.15); transform:translateX(-100%); transition:transform 0.25s; }
      .conv-panel.mob-open{ transform:translateX(0); }
      .msg-panel { width:100%; }
      .bub { max-width:82%; }
    }
  </style>
</head>
<body>
<!-- Screenshot prevention overlay -->
<div id="screenshotOverlay">
  <div style="font-size:48px">🚫</div>
  <div style="font-size:18px;font-weight:800">Screenshot Blocked</div>
  <div style="font-size:13px;opacity:0.7">This conversation is protected</div>
</div>

<!-- Watermark (shows user ID so screenshots are traceable) -->
<div class="chat-watermark" id="watermarkEl" style="display:none">
  <span id="watermarkText"></span>
</div>

<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="chat-shell chat-protected" id="chatShell">

      <!-- LEFT: Conversation list -->
      <div class="conv-panel" id="convPanel">
        <div class="conv-hdr">
          <span style="font-size:15px;font-weight:800;color:#0F172A">💬 Messages</span>
          <button onclick="openNewChat()" style="background:linear-gradient(135deg,#7C3AED,#8B5CF6);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">+</button>
        </div>
        <div class="conv-search">
          <input id="convSearch" placeholder="🔍 Search…" oninput="filterConvs(this.value)">
        </div>
        <div class="conv-list" id="convList">
          <div style="padding:30px 16px;text-align:center;color:#94A3B8;font-size:13px">Loading…</div>
        </div>
      </div>

      <!-- RIGHT: Message panel -->
      <div class="msg-panel" id="msgPanel">
        <div class="chat-empty" id="noChat">
          <div style="font-size:52px;margin-bottom:12px">💬</div>
          <div style="font-size:16px;font-weight:700;color:#334155;margin-bottom:6px">Personal Vault Messages</div>
          <div style="font-size:13px;margin-bottom:20px;max-width:280px;line-height:1.6">Real-time, ephemeral — messages vanish when you end the chat</div>
          <button onclick="openNewChat()" style="background:linear-gradient(135deg,#7C3AED,#8B5CF6);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer">+ Start New Chat</button>
        </div>
        <div id="activeChat" style="display:none;flex-direction:column;flex:1">
          <div class="msg-hdr" id="msgHdr"></div>
          <div class="msg-body" id="msgBody"></div>
          <div style="padding:0 18px 2px">
            <div class="typing-row" id="typingRow"><div class="td"></div><div class="td"></div><div class="td"></div><span style="font-size:11px;color:#94A3B8;margin-left:4px" id="typingLbl"></span></div>
          </div>
          <div class="msg-foot">
            <button class="photo-btn" onclick="document.getElementById('photoInput').click()" title="Share photo">📷</button>
            <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="sendPhoto(this)">
            <textarea class="msg-inp" id="msgInp" placeholder="Type your message…" rows="1"
              oninput="onInput()" onkeydown="onKey(event)"></textarea>
            <button class="send-btn" onclick="sendMsg()">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Mood modal -->
<div id="moodModal" class="modal-backdrop" style="display:none">
  <div class="modal" style="max-width:440px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">How are you feeling right now?</span>
    </div>
    <p style="font-size:13px;color:#64748B;margin-bottom:4px">Select your mood before starting the conversation</p>
    <div class="mood-grid" id="moodGrid"></div>
    <div class="field" style="margin-bottom:14px">
      <label class="label">Why are you here? <span style="color:#94A3B8;font-weight:400">(optional)</span></label>
      <input id="moodReason" class="input" placeholder="e.g. just want to catch up, need someone to talk to…">
    </div>
    <button onclick="joinWithMood()" class="btn btn-primary btn-full" id="moodBtn">Start Chat →</button>
  </div>
</div>

<!-- New Chat modal -->
<div id="newChatModal" class="modal-backdrop" style="display:none" onclick="closeNewChat()">
  <div class="modal" style="max-width:400px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Start New Conversation</span>
      <button onclick="closeNewChat()" style="background:#F1F5F9;border:none;cursor:pointer;width:32px;height:32px;border-radius:8px;font-size:18px;color:#64748B">×</button>
    </div>
    <div class="field" style="margin-bottom:10px">
      <label class="label">Search users by name or email</label>
      <input id="userSearch" class="input" placeholder="Ali Baba…" oninput="searchUsers(this.value)" autocomplete="off">
    </div>
    <div id="userResults" style="max-height:260px;overflow-y:auto"></div>
  </div>
</div>

<!-- Photo lightbox -->
<div id="lightbox" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:9990;align-items:center;justify-content:center" onclick="closeLightbox()">
  <img id="lightboxImg" style="max-width:90vw;max-height:90vh;border-radius:12px;object-fit:contain">
</div>

<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('chat');

var me    = Auth.getUser()||{};
var myId  = String(me._id||me.id||'');
var token = Auth.getToken();

/* Set watermark */
var wm = document.getElementById('watermarkText');
if(wm) wm.textContent = (me.firstName||'')+' '+(me.lastName||'')+' · '+myId.slice(-8);
document.getElementById('watermarkEl').style.display = 'block';

/* ══ SCREENSHOT PREVENTION ══ */
(function(){
  var warn = null;
  function showWarn(msg){
    if(warn) warn.remove();
    warn = document.createElement('div');
    warn.className = 'ss-warn';
    warn.textContent = '🚫 '+msg;
    document.body.appendChild(warn);
    setTimeout(function(){ if(warn) warn.remove(); warn=null; }, 3000);
    /* Notify other user */
    if(socket && activeOther) socket.emit('chat:screenshot', { to:activeOther._id });
  }
  /* PrintScreen key */
  document.addEventListener('keyup', function(e){
    if(e.key==='PrintScreen'){ navigator.clipboard&&navigator.clipboard.writeText(''); showWarn('Screenshot attempted — other user was notified'); }
  });
  /* Cmd+Shift+3/4 (Mac) */
  document.addEventListener('keydown', function(e){
    if(e.metaKey&&e.shiftKey&&(e.key==='3'||e.key==='4'||e.key==='s'||e.key==='S')){
      e.preventDefault(); showWarn('Screenshot blocked');
    }
    /* Ctrl+Shift+S / Win+Shift+S */
    if(e.ctrlKey&&e.shiftKey&&(e.key==='s'||e.key==='S')){ e.preventDefault(); showWarn('Screenshot blocked'); }
  });
  /* Visibility change (user switches away, e.g. to screenshot tool) */
  var overlay = document.getElementById('screenshotOverlay');
  document.addEventListener('visibilitychange', function(){
    if(document.hidden && document.getElementById('activeChat').style.display!=='none'){
      overlay.style.display = 'flex';
      setTimeout(function(){ overlay.style.display='none'; }, 1800);
    }
  });
  /* Right-click disabled on chat */
  document.getElementById('chatShell').addEventListener('contextmenu', function(e){ e.preventDefault(); });
})();

/* ══ MOODS ══ */
var MOODS = [
  { emoji:'😊', label:'Happy' },      { emoji:'😔', label:'Down / sad' },
  { emoji:'😤', label:'Frustrated' }, { emoji:'🤔', label:'Curious' },
  { emoji:'💔', label:'Heartbroken'},  { emoji:'🥳', label:'Celebrating' },
  { emoji:'😍', label:'Feeling love'},{ emoji:'😰', label:'Anxious' },
  { emoji:'🤗', label:'Need a hug' }, { emoji:'😎', label:'Confident' },
  { emoji:'😴', label:'Tired' },      { emoji:'🤩', label:'Excited' },
];
var selectedMood = null;

function buildMoodGrid(){
  document.getElementById('moodGrid').innerHTML = MOODS.map(function(m,i){
    return '<div class="mood-opt" onclick="selectMood('+i+')" id="mood-'+i+'"><span class="me">'+m.emoji+'</span><span class="ml">'+m.label+'</span></div>';
  }).join('');
}

function selectMood(i){
  selectedMood = MOODS[i];
  document.querySelectorAll('.mood-opt').forEach(function(el){ el.classList.remove('sel'); });
  document.getElementById('mood-'+i).classList.add('sel');
}

/* ══ SOCKET.IO ══ */
var socket = null;
var activeConvId = null;
var activeOther  = null;
var onlineSet    = new Set();
var convs        = [];
var typTimer     = null;
var livePreview  = null;   /* the live-preview row element */

function connectSocket(){
  socket = io(window.location.origin, {
    transports: ['websocket','polling'],
    reconnection: true,
    reconnectionDelay: 500,
  });

  socket.on('connect', function(){ socket.emit('chat:join', token); });

  /* Real-time live-type mirror */
  socket.on('chat:live-type', function(d){
    if (!activeOther || String(d.from) !== String(activeOther._id)) return;
    if (!d.text) { removeLivePreview(); return; }
    showLivePreview(d.text);
    scrollBottom();
    /* Auto-remove if no update for 3s */
    clearTimeout(typTimer);
    typTimer = setTimeout(removeLivePreview, 3000);
  });

  /* Final message received */
  socket.on('chat:message', function(msg){
    if (!activeOther) return;
    var isFrom = String(msg.from) === String(activeOther._id);
    var isTo   = String(msg.to)   === String(activeOther._id);
    if (!isFrom && !isTo) return;
    removeLivePreview();
    appendBubble(msg);
    scrollBottom();
    socket.emit('chat:read', { to: String(msg.from) });
  });

  /* Our message confirmed saved */
  socket.on('chat:sent', function(d){
    var el = document.getElementById('msg-'+d.tempId);
    if(el){ var t=el.querySelector('.btime'); if(t){ t.innerHTML = fmtTime(d.ts)+' ✓✓'; } }
  });

  /* Mood received */
  socket.on('chat:mood', function(d){
    if(!activeOther || String(d.from) !== String(activeOther._id)) return;
    var sys = document.createElement('div');
    sys.className = 'sys-msg';
    sys.innerHTML = activeOther.firstName+' is feeling <strong>'+d.emoji+' '+d.from+'</strong>'+(d.reason?' — "'+escHtml(d.reason)+'"':'');
    document.getElementById('msgBody').appendChild(sys);
    scrollBottom();
  });

  /* Read receipt */
  socket.on('chat:read', function(){
    document.querySelectorAll('.bub.me .btime').forEach(function(t){
      if(!t.textContent.includes('✓✓')) t.innerHTML = t.textContent.replace('✓','')+'✓✓';
    });
  });

  /* Online status */
  socket.on('chat:online', function(d){
    d.online ? onlineSet.add(String(d.userId)) : onlineSet.delete(String(d.userId));
    renderOnlineDot(d.userId, d.online);
    renderConvList(convs);
  });

  /* Chat ended by other user */
  socket.on('chat:ended', function(d){
    wipeChat();
    if(!d.self){
      var body = document.getElementById('msgBody');
      if(body){
        var el = document.createElement('div');
        el.className = 'sys-msg';
        el.innerHTML = '🔒 <strong>'+(activeOther?activeOther.firstName:'Other user')+' ended the chat.</strong> All messages have been cleared.';
        body.appendChild(el);
      }
    }
  });

  /* Screenshot attempt by other user */
  socket.on('chat:screenshot-alert', function(){
    var warn = document.createElement('div');
    warn.className = 'ss-warn';
    warn.style.background = '#F97316';
    warn.textContent = '⚠️ The other person attempted a screenshot!';
    document.body.appendChild(warn);
    setTimeout(function(){ if(warn.parentNode) warn.remove(); }, 4000);
  });

  /* Error */
  socket.on('chat:error', function(d){ Layout.toast(d.message||'Error', 'error'); });
}

/* ══ LIVE PREVIEW ══ */
function showLivePreview(text){
  if(!livePreview){
    var row = document.createElement('div');
    row.className = 'brow them';
    row.id = 'livePreviewRow';
    row.innerHTML = '<div class="bub them live-preview" id="livePreviewBub"></div>';
    document.getElementById('msgBody').appendChild(row);
    livePreview = row;
  }
  var bub = document.getElementById('livePreviewBub');
  if(bub) bub.innerHTML = escHtml(text) + '<span class="live-cursor"></span>';
}

function removeLivePreview(){
  if(livePreview){ livePreview.remove(); livePreview = null; }
}

/* ══ CONVERSATIONS ══ */
function loadConvs(){
  fetch('/api/trustid/chat/conversations',{ headers:{Authorization:'Bearer '+token} })
    .then(function(r){return r.json();})
    .then(function(r){ convs = r.success?r.data:[]; renderConvList(convs); });
}

function renderConvList(list){
  var el = document.getElementById('convList');
  if(!list.length){ el.innerHTML='<div style="padding:28px 16px;text-align:center;color:#94A3B8;font-size:13px">No chats yet.<br>Click + to start one.</div>'; return; }
  el.innerHTML = list.map(function(c){
    var o = c.other||{};
    var ini = ((o.firstName||'')[0]||'?').toUpperCase()+((o.lastName||'')[0]||'').toUpperCase();
    var isOn = onlineSet.has(String(o._id));
    var act  = activeOther && String(o._id) === String(activeOther._id);
    return '<div class="conv-item'+(act?' active':'')+'" onclick="openConv(\''+c._id+'\',this)" data-other="'+String(o._id)+'">'
      +'<div class="c-av">'+ini+'<span class="'+(isOn?'dot-on':'dot-off')+'"></span></div>'
      +'<div class="c-info"><div class="c-name">'+(o.firstName||'')+' '+(o.lastName||'')+'</div>'
      +'<div class="c-last">'+(isOn?'🟢 Online · ':'')+(c.lastMessage||'No messages yet')+'</div></div>'
      +(c.unread>0?'<div class="c-badge">'+c.unread+'</div>':'')
      +'</div>';
  }).join('');
}

function filterConvs(q){
  if(!q){ renderConvList(convs); return; }
  renderConvList(convs.filter(function(c){
    var o=c.other||{};
    return ((o.firstName||'')+' '+(o.lastName||'')+' '+(o.email||'')).toLowerCase().includes(q.toLowerCase());
  }));
}

function renderOnlineDot(uid, online){
  document.querySelectorAll('[data-other="'+uid+'"] .c-av span').forEach(function(el){
    el.className = online ? 'dot-on' : 'dot-off';
  });
}

/* ══ OPEN CONVERSATION ══ */
function openConv(convId, rowEl){
  var c = convs.find(function(x){ return x._id===convId; });
  if(!c) return;
  activeConvId = convId;
  activeOther  = c.other||{};

  /* Mobile: slide panel */
  if(window.innerWidth<=640){ document.getElementById('convPanel').classList.remove('mob-open'); }

  renderConvList(convs);
  buildActiveChat();

  /* Show mood modal */
  buildMoodGrid();
  selectedMood = null;
  document.getElementById('moodModal').style.display = 'flex';
}

function buildActiveChat(){
  var o   = activeOther||{};
  var ini = ((o.firstName||'')[0]||'?').toUpperCase()+((o.lastName||'')[0]||'').toUpperCase();
  var isOn= onlineSet.has(String(o._id));
  document.getElementById('noChat').style.display='none';
  var ac = document.getElementById('activeChat');
  ac.style.display = 'flex';
  document.getElementById('msgHdr').innerHTML =
    '<button onclick="goBack()" style="background:none;border:none;cursor:pointer;font-size:20px;color:#94A3B8;margin-right:4px;display:none" id="backBtn">←</button>'
    +'<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:14px;flex-shrink:0;position:relative">'
    +ini+'<span id="hdrDot" class="'+(isOn?'dot-on':'dot-off')+'"></span></div>'
    +'<div><div style="font-size:14px;font-weight:800;color:#0F172A">'+(o.firstName||'')+' '+(o.lastName||'')+'</div>'
    +'<div id="hdrStatus" style="font-size:11px;color:'+(isOn?'#22C55E':'#94A3B8')+'">'+(isOn?'● Online':'○ Offline')+'</div></div>'
    +'<div style="margin-left:auto;display:flex;gap:8px;align-items:center">'
    +'<span style="font-size:11px;background:#FEF3C7;color:#92400E;padding:3px 8px;border-radius:100px;font-weight:700;border:1px solid #F59E0B30">🔒 Ephemeral</span>'
    +'<button class="end-btn" onclick="endChat()">End Chat 🗑</button>'
    +'</div>';
  if(window.innerWidth<=640) document.getElementById('backBtn').style.display='block';
  document.getElementById('msgBody').innerHTML = '<div class="sys-msg">🔒 This conversation is ephemeral — messages disappear when the chat ends</div>';
  document.getElementById('msgInp').focus();
}

/* ══ MOOD MODAL ══ */
function joinWithMood(){
  document.getElementById('moodModal').style.display='none';
  if(selectedMood && socket && activeOther){
    var reason = document.getElementById('moodReason').value.trim();
    socket.emit('chat:mood', { to:String(activeOther._id), emoji:selectedMood.emoji, reason:reason });
    /* Show own mood */
    var el = document.createElement('div');
    el.className = 'sys-msg';
    el.innerHTML = 'You set your mood: <span class="mood-badge">'+selectedMood.emoji+' '+selectedMood.label+(reason?' — "'+escHtml(reason)+'"':'')+'</span>';
    document.getElementById('msgBody').appendChild(el);
    scrollBottom();
  }
  document.getElementById('msgInp').focus();
}

/* ══ SEND MESSAGE ══ */
function sendMsg(){
  var inp  = document.getElementById('msgInp');
  var text = inp.value.trim();
  if(!text || !activeOther || !socket) return;
  inp.value='';
  inp.style.height='auto';

  /* Stop live preview for recipient */
  socket.emit('chat:live-type', { to:String(activeOther._id), text:'' });

  var tempId = 'tmp-'+Date.now()+'-'+Math.random().toString(36).slice(2);
  var msg = { id:tempId, from:myId, to:String(activeOther._id), text:text, ts:Date.now(), type:'text' };
  appendBubble(msg, true);
  scrollBottom();
  socket.emit('chat:send', { to:String(activeOther._id), text:text, tempId:tempId });
}

/* ══ LIVE TYPING BROADCAST ══ */
var liveTimer = null;
function onInput(){
  var inp = document.getElementById('msgInp');
  /* Auto-resize */
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,110)+'px';
  /* Broadcast live to recipient */
  if(socket && activeOther){
    socket.emit('chat:live-type', { to:String(activeOther._id), text:inp.value });
  }
}

function onKey(e){
  if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMsg(); }
}

/* ══ PHOTO SHARING ══ */
function sendPhoto(input){
  var file = input.files[0];
  if(!file) return;
  if(file.size > 4*1024*1024){ Layout.toast('Photo must be under 4 MB','error'); input.value=''; return; }
  var reader = new FileReader();
  reader.onload = function(e){
    var b64 = e.target.result;
    var tempId = 'img-'+Date.now();
    var msg = { id:tempId, from:myId, to:String(activeOther._id), data:b64, type:'photo', ts:Date.now() };
    appendBubble(msg, true);
    scrollBottom();
    if(socket && activeOther) socket.emit('chat:photo', { to:String(activeOther._id), data:b64, tempId:tempId, filename:file.name });
  };
  reader.readAsDataURL(file);
  input.value='';
}

/* ══ APPEND BUBBLE ══ */
function appendBubble(msg, optimistic){
  var body  = document.getElementById('msgBody');
  if(!body) return;
  var isMine = String(msg.from)===myId;
  var row   = document.createElement('div');
  row.className = 'brow '+(isMine?'me':'them');
  row.id = 'msg-'+(msg.id||msg.tempId||Date.now());
  var timeStr = fmtTime(msg.ts||Date.now());
  var tick = isMine ? ' '+(optimistic?'✓':'✓✓') : '';

  if(msg.type==='photo'&&msg.data){
    row.innerHTML = '<div class="bub '+(isMine?'me':'them')+'">'
      +'<img src="'+msg.data+'" onclick="openLightbox(\''+msg.data+'\')" alt="Photo" draggable="false" oncontextmenu="return false">'
      +'<span class="btime">'+timeStr+tick+'</span></div>';
  } else {
    row.innerHTML = '<div class="bub '+(isMine?'me':'them')+'">'+escHtml(String(msg.text||''))
      +'<span class="btime">'+timeStr+tick+'</span></div>';
  }
  /* Remove live preview before appending */
  removeLivePreview();
  body.appendChild(row);
}

/* ══ END CHAT (wipe both sides) ══ */
function endChat(){
  if(!confirm('End this chat? All messages will be permanently deleted for both of you.')) return;
  if(socket && activeOther) socket.emit('chat:end', { to:String(activeOther._id) });
  wipeChat();
  var body = document.getElementById('msgBody');
  if(body){ var el=document.createElement('div'); el.className='sys-msg'; el.innerHTML='🔒 You ended the chat. All messages cleared.'; body.appendChild(el); }
}

function wipeChat(){
  var body = document.getElementById('msgBody');
  if(body) body.innerHTML='';
  removeLivePreview();
  livePreview = null;
}

/* ══ HELPERS ══ */
function scrollBottom(){ var b=document.getElementById('msgBody'); if(b) b.scrollTop=b.scrollHeight; }
function fmtTime(ts){ return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function openLightbox(src){ var lb=document.getElementById('lightbox'); lb.style.display='flex'; document.getElementById('lightboxImg').src=src; }
function closeLightbox(){ document.getElementById('lightbox').style.display='none'; }
function goBack(){ document.getElementById('convPanel').classList.add('mob-open'); }

/* ══ NEW CHAT SEARCH ══ */
var searchT = null;
function openNewChat(){
  if(window.innerWidth<=640) document.getElementById('convPanel').classList.add('mob-open');
  document.getElementById('newChatModal').style.display='flex';
  document.getElementById('userSearch').focus();
}
function closeNewChat(){ document.getElementById('newChatModal').style.display='none'; document.getElementById('userSearch').value=''; document.getElementById('userResults').innerHTML=''; }

function searchUsers(q){
  clearTimeout(searchT);
  if(!q.trim()){ document.getElementById('userResults').innerHTML=''; return; }
  searchT = setTimeout(function(){
    fetch('/api/trustid/chat/users?q='+encodeURIComponent(q),{headers:{Authorization:'Bearer '+token}})
      .then(function(r){return r.json();})
      .then(function(r){
        var users=r.success?r.data:[];
        document.getElementById('userResults').innerHTML = users.length
          ? users.map(function(u){
              var ini=((u.firstName||'')[0]||'?').toUpperCase()+((u.lastName||'')[0]||'').toUpperCase();
              return '<div onclick="startChat(\''+u._id+'\',\''+escHtml(u.firstName)+'\',\''+escHtml(u.lastName)+'\')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background 0.1s" onmouseenter="this.style.background=\'#F8FAFC\'" onmouseleave="this.style.background=\'\'">'
                +'<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px">'+ini+'</div>'
                +'<div><div style="font-size:13px;font-weight:700;color:#0F172A">'+(u.firstName||'')+' '+(u.lastName||'')+'</div><div style="font-size:12px;color:#64748B">'+u.email+'</div></div>'
                +'</div>';
            }).join('')
          : '<div style="padding:20px;text-align:center;color:#94A3B8;font-size:13px">No users found</div>';
      });
  },280);
}

async function startChat(userId, first, last){
  closeNewChat();
  var r = await fetch('/api/trustid/chat/start/'+userId,{method:'POST',headers:{Authorization:'Bearer '+token}}).then(function(x){return x.json();});
  if(r.success){
    var existing = convs.find(function(c){ return c._id===r.data.conversation._id; });
    if(!existing){ convs.unshift(Object.assign({},r.data.conversation,{other:r.data.other,unread:0})); renderConvList(convs); }
    openConv(r.data.conversation._id);
  }
}

/* ══ BOOT ══ */
buildMoodGrid();
connectSocket();
loadConvs();
setInterval(loadConvs, 30000);
</script>
