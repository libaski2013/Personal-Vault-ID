<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Personal Vault — Messages</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <!-- Socket.io client -->
  <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
  <style>
    /* ── Chat layout ── */
    .chat-shell { display:flex;height:calc(100vh - 62px);overflow:hidden; }
    .conv-panel  { width:300px;border-right:1px solid #E8ECF4;display:flex;flex-direction:column;background:#fff;flex-shrink:0; }
    .msg-panel   { flex:1;display:flex;flex-direction:column;background:#F8FAFC; }

    /* Conversation list */
    .conv-header { padding:16px;border-bottom:1px solid #E8ECF4;display:flex;align-items:center;justify-content:space-between; }
    .conv-search { padding:12px 14px;border-bottom:1px solid #E8ECF4; }
    .conv-search input { width:100%;height:36px;padding:0 12px;border-radius:10px;border:1px solid #E2E8F0;font-size:13px;outline:none;background:#F8FAFC; }
    .conv-list   { flex:1;overflow-y:auto; }
    .conv-item   { display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;border-bottom:1px solid #F8FAFC;transition:background 0.1s; }
    .conv-item:hover   { background:#F8FAFC; }
    .conv-item.active  { background:#7C3AED08;border-left:3px solid #7C3AED; }
    .conv-avatar { width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0;position:relative; }
    .online-dot  { position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#22C55E;border:2px solid #fff; }
    .offline-dot { position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#E2E8F0;border:2px solid #fff; }
    .conv-info   { flex:1;min-width:0; }
    .conv-name   { font-size:14px;font-weight:700;color:#0F172A;margin-bottom:2px; }
    .conv-last   { font-size:12px;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    .conv-badge  { min-width:20px;height:20px;border-radius:10px;background:#7C3AED;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px; }

    /* Message area */
    .msg-header { padding:14px 20px;border-bottom:1px solid #E8ECF4;background:#fff;display:flex;align-items:center;gap:12px; }
    .msg-body   { flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:4px; }
    .msg-footer { padding:12px 16px;background:#fff;border-top:1px solid #E8ECF4;display:flex;align-items:flex-end;gap:10px; }
    .msg-input  { flex:1;min-height:40px;max-height:120px;padding:10px 14px;border-radius:20px;border:1.5px solid #E2E8F0;font-size:14px;outline:none;resize:none;line-height:1.4;font-family:inherit;transition:border-color 0.15s; }
    .msg-input:focus { border-color:#7C3AED; }
    .send-btn   { width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#8B5CF6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:transform 0.1s,opacity 0.1s; }
    .send-btn:hover   { transform:scale(1.08); }
    .send-btn:active  { transform:scale(0.95); }
    .send-btn:disabled { opacity:0.4;cursor:not-allowed; }

    /* Bubbles */
    .bubble-row  { display:flex;margin-bottom:2px; }
    .bubble-row.me    { justify-content:flex-end; }
    .bubble-row.them  { justify-content:flex-start; }
    .bubble      { max-width:72%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;position:relative; }
    .bubble.me   { background:linear-gradient(135deg,#7C3AED,#8B5CF6);color:#fff;border-bottom-right-radius:4px; }
    .bubble.them { background:#fff;color:#0F172A;border:1px solid #E8ECF4;border-bottom-left-radius:4px; }
    .bubble-time { font-size:10px;opacity:0.6;margin-top:4px;display:block; }
    .bubble.me .bubble-time   { text-align:right; }
    .bubble.them .bubble-time { text-align:left; }
    .bubble.me.tail::after   { content:'';position:absolute;bottom:0;right:-6px;width:12px;height:12px;background:linear-gradient(135deg,#7C3AED,#8B5CF6);clip-path:polygon(0 0,0 100%,100% 100%); }
    .tick { font-size:11px;opacity:0.75;margin-left:4px; }

    /* Date divider */
    .date-div { text-align:center;font-size:11px;color:#94A3B8;padding:10px 0;font-weight:600; }

    /* Empty state */
    .chat-empty { display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:40px;color:#94A3B8; }

    /* Typing indicator */
    .typing-row { display:flex;align-items:center;gap:8px;padding:0 0 8px;opacity:0;transition:opacity 0.2s;height:24px; }
    .typing-row.show { opacity:1; }
    .typing-dot  { width:7px;height:7px;border-radius:50%;background:#94A3B8;animation:typingBounce 1.2s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay:0.2s; }
    .typing-dot:nth-child(3) { animation-delay:0.4s; }
    @keyframes typingBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    /* Search results */
    .user-result { display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;border-radius:10px;transition:background 0.1s; }
    .user-result:hover { background:#F8FAFC; }

    /* New message animation */
    @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .bubble-row { animation:msgIn 0.18s ease; }

    /* Mobile */
    @media(max-width:640px){
      .conv-panel { width:100%;position:absolute;z-index:10;height:calc(100vh - 62px); }
      .conv-panel.hidden { display:none; }
      .msg-panel { width:100%; }
    }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="chat-shell" id="chatShell">

      <!-- Left: Conversation list -->
      <div class="conv-panel" id="convPanel">
        <div class="conv-header">
          <span style="font-size:15px;font-weight:800">💬 Messages</span>
          <button onclick="openNewChat()" title="New conversation" style="background:linear-gradient(135deg,#7C3AED,#8B5CF6);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center">+</button>
        </div>
        <div class="conv-search">
          <input id="convSearch" placeholder="🔍 Search conversations…" oninput="filterConvs(this.value)">
        </div>
        <div class="conv-list" id="convList">
          <div style="padding:40px 20px;text-align:center;color:#94A3B8;font-size:13px">Loading…</div>
        </div>
      </div>

      <!-- Right: Messages -->
      <div class="msg-panel" id="msgPanel">
        <div class="chat-empty" id="noChat">
          <div style="font-size:56px;margin-bottom:16px">💬</div>
          <div style="font-size:16px;font-weight:700;color:#334155;margin-bottom:8px">Your Messages</div>
          <div style="font-size:13px;margin-bottom:20px">Select a conversation or start a new one</div>
          <button onclick="openNewChat()" style="background:linear-gradient(135deg,#7C3AED,#8B5CF6);color:#fff;border:none;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;cursor:pointer">+ Start New Chat</button>
        </div>
        <div id="activeChat" style="display:none;flex:1;display:none;flex-direction:column">
          <div class="msg-header" id="msgHeader"></div>
          <div class="msg-body" id="msgBody"></div>
          <div style="padding:0 20px 4px">
            <div class="typing-row" id="typingRow">
              <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
              <span style="font-size:12px;color:#94A3B8" id="typingName"></span>
            </div>
          </div>
          <div class="msg-footer">
            <textarea class="msg-input" id="msgInput" placeholder="Type a message…" rows="1" onkeydown="onInputKey(event)" oninput="onTyping();autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">➤</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- New Chat modal -->
<div id="newChatModal" class="modal-backdrop" style="display:none" onclick="closeNewChat()">
  <div class="modal" style="max-width:420px" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Start New Conversation</span>
      <button onclick="closeNewChat()" style="background:#F1F5F9;border:none;cursor:pointer;width:32px;height:32px;border-radius:8px;font-size:18px;color:#64748B">×</button>
    </div>
    <div class="field" style="margin-bottom:12px">
      <label class="label">Search users</label>
      <input id="userSearch" class="input" placeholder="Name or email…" oninput="searchUsers(this.value)" autocomplete="off">
    </div>
    <div id="userResults" style="max-height:280px;overflow-y:auto"></div>
  </div>
</div>

<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('chat');

var me         = Auth.getUser() || {};
var myId       = me._id || me.id || '';
var token      = Auth.getToken();
var socket     = null;
var convs      = [];
var activeConv = null;    /* { conversation, other } */
var typingTimer= null;
var onlineSet  = new Set();

/* ── Connect Socket.io ── */
function connectSocket() {
  var base = window.location.origin;
  socket = io(base, { transports:['websocket','polling'], reconnection:true });

  socket.on('connect', function() {
    socket.emit('chat:join', token);
  });

  socket.on('chat:message', function(msg) {
    /* New message received from another user */
    if (activeConv && msg.conversationId === activeConv.conversation._id) {
      appendBubble(msg, false);
      scrollBottom();
      socket.emit('chat:read', { conversationId:msg.conversationId, from:msg.from });
    }
    /* Update conversation list preview */
    updateConvPreview(msg);
  });

  socket.on('chat:message:sent', function(msg) {
    /* Confirmation that our message was saved */
    /* Already displayed optimistically — just add tick */
    var el = document.getElementById('msg-'+msg._id);
    if (el) { var tick = el.querySelector('.tick'); if(tick) tick.textContent='✓✓'; }
  });

  socket.on('chat:typing', function(data) {
    if (!activeConv || data.conversationId !== activeConv.conversation._id) return;
    var row  = document.getElementById('typingRow');
    var name = document.getElementById('typingName');
    if (row && name) {
      name.textContent = (activeConv.other.firstName||'')+ ' is typing…';
      row.classList.add('show');
      clearTimeout(typingTimer);
      typingTimer = setTimeout(function(){ row.classList.remove('show'); }, 2500);
    }
  });

  socket.on('chat:read', function(data) {
    if (activeConv && data.conversationId === activeConv.conversation._id) {
      document.querySelectorAll('.bubble.me .tick').forEach(function(t){ t.textContent='✓✓'; t.style.opacity='1'; });
    }
  });

  socket.on('chat:online', function(data) {
    if (data.online) onlineSet.add(data.userId);
    else             onlineSet.delete(data.userId);
    updateOnlineDots();
  });
}

/* ── Load conversations ── */
function loadConvs() {
  fetch('/api/trustid/chat/conversations', { headers:{Authorization:'Bearer '+token} })
    .then(function(r){return r.json();})
    .then(function(r){
      convs = r.success ? r.data : [];
      renderConvList(convs);
    });
}

function renderConvList(list) {
  var el = document.getElementById('convList');
  if (!list.length) {
    el.innerHTML = '<div style="padding:30px 16px;text-align:center;color:#94A3B8;font-size:13px">No conversations yet.<br>Click + to start one.</div>';
    return;
  }
  el.innerHTML = list.map(function(c){
    var other = c.other||{};
    var ini   = ((other.firstName||'')[0]||'?').toUpperCase() + ((other.lastName||'')[0]||'').toUpperCase();
    var isOnline = onlineSet.has(String(other._id));
    var active   = activeConv && activeConv.conversation._id === c._id;
    return '<div class="conv-item'+(active?' active':'')+'" onclick="openConv(\''+c._id+'\')">'
      +'<div class="conv-avatar">'+ini+'<span class="'+(isOnline?'online':'offline')+'-dot"></span></div>'
      +'<div class="conv-info">'
      +'<div class="conv-name">'+(other.firstName||'')+' '+(other.lastName||'')+'</div>'
      +'<div class="conv-last">'+(c.lastMessage||'No messages yet')+'</div>'
      +'</div>'
      +(c.unread>0?'<div class="conv-badge">'+c.unread+'</div>':'')
      +'</div>';
  }).join('');
}

function filterConvs(q) {
  if (!q) { renderConvList(convs); return; }
  var filtered = convs.filter(function(c){
    var o = c.other||{};
    return ((o.firstName||'')+' '+(o.lastName||'')+' '+(o.email||'')).toLowerCase().includes(q.toLowerCase());
  });
  renderConvList(filtered);
}

/* ── Open a conversation ── */
function openConv(convId) {
  var found = convs.find(function(c){ return c._id===convId; });
  if (!found) return;
  activeConv = found;
  renderConvList(convs);   /* re-render to show active state */

  var other = found.other||{};
  var ini   = ((other.firstName||'')[0]||'?').toUpperCase()+((other.lastName||'')[0]||'').toUpperCase();
  var isOnline = onlineSet.has(String(other._id));

  document.getElementById('noChat').style.display = 'none';
  var ac = document.getElementById('activeChat');
  ac.style.display = 'flex';

  document.getElementById('msgHeader').innerHTML =
    '<div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;flex-shrink:0;position:relative">'
    +ini+'<span class="'+(isOnline?'online':'offline')+'-dot"></span></div>'
    +'<div>'
    +'<div style="font-size:14px;font-weight:800;color:#0F172A">'+(other.firstName||'')+' '+(other.lastName||'')+'</div>'
    +'<div style="font-size:12px;color:'+(isOnline?'#22C55E':'#94A3B8')+'">'+(isOnline?'● Online':'○ Offline')+'</div>'
    +'</div>'
    +'<button onclick="goBack()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:20px;color:#94A3B8;display:none" id="backBtn">←</button>';

  if (window.innerWidth <= 640) {
    document.getElementById('convPanel').classList.add('hidden');
    document.getElementById('backBtn').style.display = 'block';
  }

  loadMessages(convId);
  /* Mark as read */
  socket.emit('chat:read', { conversationId:convId, from:other._id });
  found.unread = 0;
}

function goBack() {
  document.getElementById('convPanel').classList.remove('hidden');
  document.getElementById('activeChat').style.display = 'none';
  document.getElementById('noChat').style.display = 'flex';
  activeConv = null;
}

/* ── Load message history ── */
function loadMessages(convId) {
  var body = document.getElementById('msgBody');
  body.innerHTML = '<div style="text-align:center;padding:20px;color:#94A3B8;font-size:13px">Loading…</div>';
  fetch('/api/trustid/chat/messages/'+convId, { headers:{Authorization:'Bearer '+token} })
    .then(function(r){return r.json();})
    .then(function(r){
      body.innerHTML = '';
      var msgs = r.success ? r.data : [];
      if (!msgs.length) {
        body.innerHTML = '<div style="text-align:center;padding:40px;color:#94A3B8;font-size:13px">No messages yet. Say hello! 👋</div>';
        return;
      }
      var lastDate = '';
      msgs.forEach(function(msg){
        var d = new Date(msg.createdAt).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        if (d !== lastDate) {
          var div = document.createElement('div');
          div.className = 'date-div';
          div.textContent = d;
          body.appendChild(div);
          lastDate = d;
        }
        appendBubble(msg, false);
      });
      scrollBottom();
    });
}

/* ── Render a message bubble ── */
function appendBubble(msg, optimistic) {
  var body    = document.getElementById('msgBody');
  var isMine  = String(msg.from) === String(myId);
  var time    = new Date(msg.createdAt||Date.now()).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  var row = document.createElement('div');
  row.className = 'bubble-row '+(isMine?'me':'them');
  row.id = 'msg-'+msg._id;

  var tick = isMine ? '<span class="tick" style="font-size:11px;opacity:0.7">'+(optimistic?'✓':'✓✓')+'</span>' : '';

  row.innerHTML = '<div class="bubble '+(isMine?'me tail':'them')+'">'
    + escapeHtml(msg.text)
    + '<span class="bubble-time">'+time+tick+'</span>'
    + '</div>';

  body.appendChild(row);
}

function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function scrollBottom() {
  var b = document.getElementById('msgBody');
  if (b) b.scrollTop = b.scrollHeight;
}

/* ── Send message ── */
function sendMessage() {
  if (!activeConv || !socket) return;
  var input = document.getElementById('msgInput');
  var text  = input.value.trim();
  if (!text) return;

  input.value = '';
  autoResize(input);

  var other = activeConv.other;
  var convId = activeConv.conversation._id;

  /* Optimistic bubble */
  var tempId = 'tmp-'+Date.now();
  var row = document.createElement('div');
  row.className = 'bubble-row me';
  row.id = 'msg-'+tempId;
  var time = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  row.innerHTML = '<div class="bubble me tail">'+escapeHtml(text)+'<span class="bubble-time">'+time+' <span class="tick">✓</span></span></div>';
  document.getElementById('msgBody').appendChild(row);
  scrollBottom();

  /* Send via socket */
  socket.emit('chat:send', { conversationId:convId, to:String(other._id), text:text });

  /* Update conv preview */
  if (activeConv) { activeConv.lastMessage = text; }
  convs.forEach(function(c){ if(c._id===convId) c.lastMessage=text; });
  renderConvList(convs);
}

function onInputKey(e) {
  if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function onTyping() {
  if (!activeConv || !socket) return;
  socket.emit('chat:typing', { to:String(activeConv.other._id), conversationId:activeConv.conversation._id });
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function updateConvPreview(msg) {
  var found = convs.find(function(c){ return c._id===msg.conversationId; });
  if (found) { found.lastMessage=msg.text; if(!activeConv||activeConv.conversation._id!==msg.conversationId) found.unread=(found.unread||0)+1; }
  renderConvList(convs);
}

function updateOnlineDots() {
  convs.forEach(function(c){
    if (c.other && onlineSet.has(String(c.other._id))) {
      /* Would need to re-render — just reload list */
    }
  });
}

/* ── New chat modal ── */
var searchTimer = null;
function openNewChat() { document.getElementById('newChatModal').style.display='flex'; document.getElementById('userSearch').focus(); }
function closeNewChat() { document.getElementById('newChatModal').style.display='none'; document.getElementById('userSearch').value=''; document.getElementById('userResults').innerHTML=''; }

function searchUsers(q) {
  clearTimeout(searchTimer);
  if (!q.trim()) { document.getElementById('userResults').innerHTML=''; return; }
  searchTimer = setTimeout(function(){
    fetch('/api/trustid/chat/users?q='+encodeURIComponent(q), { headers:{Authorization:'Bearer '+token} })
      .then(function(r){return r.json();})
      .then(function(r){
        var users = r.success?r.data:[];
        if (!users.length) { document.getElementById('userResults').innerHTML='<div style="padding:20px;text-align:center;color:#94A3B8;font-size:13px">No users found</div>'; return; }
        document.getElementById('userResults').innerHTML = users.map(function(u){
          var ini = ((u.firstName||'')[0]||'?').toUpperCase()+((u.lastName||'')[0]||'').toUpperCase();
          return '<div class="user-result" onclick="startChat(\''+u._id+'\',\''+escapeHtml(u.firstName)+'\',\''+escapeHtml(u.lastName)+'\')">'
            +'<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#8B5CF6);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;flex-shrink:0">'+ini+'</div>'
            +'<div><div style="font-size:13px;font-weight:700;color:#0F172A">'+(u.firstName||'')+' '+(u.lastName||'')+'</div><div style="font-size:12px;color:#64748B">'+u.email+'</div></div>'
            +'</div>';
        }).join('');
      });
  }, 300);
}

async function startChat(userId, firstName, lastName) {
  closeNewChat();
  var r = await fetch('/api/trustid/chat/start/'+userId, { method:'POST', headers:{Authorization:'Bearer '+token} }).then(function(x){return x.json();});
  if (r.success) {
    var existing = convs.find(function(c){ return c._id===r.data.conversation._id; });
    if (!existing) { convs.unshift({ ...r.data.conversation, other:r.data.other, unread:0 }); }
    openConv(r.data.conversation._id);
  }
}

/* ── Boot ── */
connectSocket();
loadConvs();

/* Poll for new conversations every 30s as a safety net */
setInterval(loadConvs, 30000);
</script>
</body>
</html>
