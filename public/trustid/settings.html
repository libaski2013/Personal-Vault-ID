<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Settings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="./js/auth.js"></script>
<script>Auth.requireAuth();</script>
<script src="./js/api.js"></script>
<script src="./js/components.js"></script>
<script>
const { createElement: h, useState } = React;

function SettingsPage() {
  const [cur,  setCur]  = useState('');
  const [nw,   setNw]   = useState('');
  const [conf, setConf] = useState('');
  const [loading, setLoading] = useState(false);
  const toast = useToast();

  const submit = async () => {
    if (!cur || !nw || nw !== conf) {
      toast({ type:'error', msg: nw !== conf ? "Passwords don't match" : 'Fill all fields' });
      return;
    }
    if (nw.length < 8) { toast({ type:'error', msg:'Password must be at least 8 characters' }); return; }
    setLoading(true);
    const r = await Api.changePassword(cur, nw);
    setLoading(false);
    if (r.success) {
      toast({ type:'success', msg:'Password updated!' });
      setCur(''); setNw(''); setConf('');
    } else {
      toast({ type:'error', msg: r.message || 'Failed to update password' });
    }
  };

  return h(AppLayout, { activePage:'settings' },
    h('div', null,
      h(PH, { title:'Settings', sub:'Manage account preferences' }),
      h('div', { style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:22} },

        /* ── Left ── */
        h('div', { style:{display:'flex',flexDirection:'column',gap:18} },
          h('div', { className:'card' },
            h('h3', { style:{fontSize:15,fontWeight:800,marginBottom:18} }, '🔒 Change Password'),
            h('div', { style:{display:'flex',flexDirection:'column',gap:14,marginBottom:16} },
              h(Field, { label:'Current password', value:cur,  onChange:setCur,  type:'password' }),
              h(Field, { label:'New password',     value:nw,   onChange:setNw,   type:'password', placeholder:'Min 8 characters' }),
              h(Field, { label:'Confirm new password', value:conf, onChange:setConf, type:'password' })
            ),
            h(Btn, { label:'Update Password', onClick:submit, loading })
          ),
          h('div', { className:'card' },
            h('h3', { style:{fontSize:15,fontWeight:800,marginBottom:14} }, '🔔 Notifications'),
            [['Email Notifications',true],['Document Alerts',true],['Reminder Emails',false],['Security Alerts',true]].map(([lb,on]) =>
              h('div', { key:lb, style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:`1px solid ${C[50]}`} },
                h('span', { style:{fontSize:13,color:C[700]} }, lb),
                h('div', { style:{width:40,height:22,borderRadius:11,background:on?C.purple:C[200],position:'relative',cursor:'pointer'} },
                  h('div', { style:{position:'absolute',top:2,left:on?20:2,width:18,height:18,borderRadius:'50%',background:'#fff',transition:'left 0.2s'} })
                )
              )
            )
          )
        ),

        /* ── Right ── */
        h('div', { style:{display:'flex',flexDirection:'column',gap:18} },
          h('div', { className:'card' },
            h('h3', { style:{fontSize:15,fontWeight:800,marginBottom:14} }, '🌐 Session'),
            h('div', { style:{padding:'12px 14px',borderRadius:10,background:C.green+'10',border:`1px solid ${C.green}30`,marginBottom:14} },
              h('div', { style:{fontWeight:700,fontSize:13,color:C.green} }, '✅ Connected to Live Backend'),
              h('div', { style:{fontSize:12,color:C[500],marginTop:4} }, 'All data is saved to MongoDB')
            ),
            h('div', { style:{display:'flex',flexDirection:'column',gap:10} },
              h(Btn, { label:'Sign Out', v:'ghost', onClick:Auth.logout }),
            )
          ),
          h('div', { className:'card' },
            h('h3', { style:{fontSize:15,fontWeight:800,marginBottom:14} }, '🗑️ Danger Zone'),
            h('div', { style:{padding:14,borderRadius:10,background:C.red+'06',border:`1px solid ${C.red}20`} },
              h('div', { style:{fontWeight:700,fontSize:13,color:C[900],marginBottom:4} }, 'Delete Account'),
              h('div', { style:{fontSize:12,color:C[500],marginBottom:12,lineHeight:1.6} }, 'This is irreversible. All your data will be permanently deleted.'),
              h(Btn, { label:'Delete Account', v:'danger', full:false, sm:true })
            )
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(SettingsPage));
</script>
</body>
</html>
