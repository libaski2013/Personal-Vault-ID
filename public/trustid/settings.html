<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Settings</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"></div>
  </div>
</div>
<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('settings');

/* Static notification toggles state */
var notifState = { 'Email Notifications':true, 'Document Alerts':true, 'Reminder Emails':false, 'Security Alerts':true };
var currentUser = Auth.getUser() || {};

function toggleNotif(key) {
  notifState[key] = !notifState[key];
  renderNotifToggles();
}

function renderNotifToggles() {
  var container = document.getElementById('notifToggles');
  if (!container) return;
  container.innerHTML = Object.keys(notifState).map(function(key) {
    var on  = notifState[key];
    var bg  = on ? '#7C3AED' : '#E2E8F0';
    var pos = on ? '20px'    : '2px';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #F8FAFC">'
      + '<span style="font-size:13px;color:#334155">' + key + '</span>'
      + '<div onclick="toggleNotif(\'' + key + '\')" style="width:40px;height:22px;border-radius:11px;background:' + bg + ';position:relative;cursor:pointer;transition:background 0.2s">'
      +   '<div style="position:absolute;top:2px;left:' + pos + ';width:18px;height:18px;border-radius:50%;background:#fff;transition:left 0.2s"></div>'
      + '</div>'
      + '</div>';
  }).join('');
}

function submitPassword() {
  var cur  = document.getElementById('curPwd').value;
  var nw   = document.getElementById('newPwd').value;
  var conf = document.getElementById('confPwd').value;

  if (!cur || !nw || !conf) { Layout.toast('Please fill all fields.', 'error'); return; }
  if (nw !== conf)           { Layout.toast("New passwords don't match.", 'error'); return; }
  if (nw.length < 8)         { Layout.toast('Password must be at least 8 characters.', 'error'); return; }

  var btn = document.getElementById('pwdBtn');
  btn.disabled    = true;
  btn.textContent = 'Updating…';

  Api.changePassword(cur, nw).then(function(res) {
    btn.disabled    = false;
    btn.textContent = 'Update Password';
    if (res.success) {
      Layout.toast('Password updated successfully!');
      document.getElementById('curPwd').value  = '';
      document.getElementById('newPwd').value  = '';
      document.getElementById('confPwd').value = '';
    } else {
      Layout.toast(res.message || 'Failed to update password.', 'error');
    }
  });
}

function submitPhone() {
  var phone = document.getElementById('phoneNumber').value.trim();
  if (!phone) { Layout.toast('Enter a phone number.', 'error'); return; }

  var btn = document.getElementById('phoneBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  Api.updatePhone(phone).then(function(res) {
    btn.disabled = false;
    btn.textContent = 'Save Phone Number';
    if (res.success && res.user) {
      currentUser = res.user;
      Auth.setSession(Auth.getToken(), res.user);
      Layout.toast('Phone number saved for password resets.');
    } else {
      Layout.toast(res.message || 'Failed to save phone number.', 'error');
    }
  });
}

/* ── Eye toggle helper ── */
function togglePwd(inputId, btnId) {
  var inp = document.getElementById(inputId);
  var btn = document.getElementById(btnId);
  if (!inp) return;
  var show = inp.type === 'password';
  inp.type = show ? 'text' : 'password';
  if (btn) btn.textContent = show ? '🙈' : '👁';
}

/* Build a password field with eye toggle */
function pwdField(label, id, placeholder) {
  return '<div><label class="label">' + label + '</label>'
    + '<div style="position:relative">'
    + '<input id="' + id + '" class="input" type="password" placeholder="' + placeholder + '" style="padding-right:40px">'
    + '<button type="button" onclick="togglePwd(\'' + id + '\',\'eye_' + id + '\')" id="eye_' + id + '" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#94A3B8;padding:4px;line-height:1">👁</button>'
    + '</div></div>';
}

/* PIN digit auto-advance */
function pinAdv(inp, idx) {
  if (inp.value) {
    var pins = document.querySelectorAll('#newPinRow input[type="password"], #newPinRow input[type="text"]');
    if (idx < pins.length - 1) pins[idx + 1].focus();
  }
}

var pinVisible = false;
function togglePinVis() {
  pinVisible = !pinVisible;
  var pins = document.querySelectorAll('#newPinRow input');
  pins.forEach(function(p) { p.type = pinVisible ? 'text' : 'password'; });
  var btn = document.getElementById('pinEye');
  if (btn) btn.textContent = pinVisible ? '🙈' : '👁';
}

/* Reset vault/album PIN */
async function resetVaultPin() {
  var accountPwd = document.getElementById('pinVerifyPwd').value;
  var pins = Array.from(document.querySelectorAll('#newPinRow input')).map(function(p){ return p.value; });
  var newPin = pins.join('');

  if (!accountPwd) { Layout.toast('Enter your account password to verify', 'error'); return; }
  if (newPin.length < 4) { Layout.toast('Enter all 4 PIN digits', 'error'); return; }

  var btn = document.getElementById('pinBtn');
  btn.disabled = true; btn.textContent = 'Resetting…';

  /* Step 1: verify account password by calling change-password with same value */
  /* We use a dedicated PIN reset endpoint instead */
  var r = await fetch('/api/trustid/vault/reset-pin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + Auth.getToken() },
    body: JSON.stringify({ accountPassword: accountPwd, newPin: newPin })
  }).then(function(x) { return x.json(); });

  btn.disabled = false; btn.textContent = 'Reset Vault PIN 🔐';

  if (r.success) {
    Layout.toast('Vault PIN reset successfully! 🔐', 'success');
    document.getElementById('pinVerifyPwd').value = '';
    document.querySelectorAll('#newPinRow input').forEach(function(p){ p.value=''; });
    sessionStorage.removeItem('pv_vault_unlocked');
    sessionStorage.removeItem('pv_album_unlocked');
  } else {
    Layout.toast(r.message || 'Failed to reset PIN', 'error');
  }
}

document.getElementById('content').innerHTML =
  '<div class="page-header">'
  + '<div><h1 class="page-title">Settings</h1><p class="page-sub">Manage account preferences</p></div>'
  + '</div>'

  + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:22px">'

  /* ── Left ── */
  + '<div style="display:flex;flex-direction:column;gap:18px">'

  + '<div class="card">'
  +   '<h3 style="font-size:15px;font-weight:800;margin-bottom:14px">📱 Password Reset Phone</h3>'
  +   '<div style="font-size:12px;color:#64748B;line-height:1.6;margin-bottom:14px">Use this phone number to receive password reset verification codes.</div>'
  +   '<div style="margin-bottom:14px"><label class="label">Phone Number</label><input id="phoneNumber" class="input" type="tel" placeholder="+233241234567" value="' + (currentUser.phone || '') + '"></div>'
  +   '<button id="phoneBtn" onclick="submitPhone()" class="btn btn-primary btn-full">Save Phone Number</button>'
  + '</div>'

  + '<div class="card">'
  +   '<h3 style="font-size:15px;font-weight:800;margin-bottom:18px">🔒 Change Password</h3>'
  +   '<div style="display:flex;flex-direction:column;gap:14px;margin-bottom:16px">'
  +     pwdField('Current Password','curPwd','Enter current password')
  +     pwdField('New Password','newPwd','Min 8 characters')
  +     pwdField('Confirm New Password','confPwd','Repeat new password')
  +   '</div>'
  +   '<button id="pwdBtn" onclick="submitPassword()" class="btn btn-primary btn-full">Update Password</button>'
  + '</div>'

  /* Vault / Album PIN reset */
  + '<div class="card">'
  +   '<h3 style="font-size:15px;font-weight:800;margin-bottom:6px">🔐 Reset Vault PIN</h3>'
  +   '<p style="font-size:12px;color:#64748B;margin-bottom:14px;line-height:1.6">This resets the PIN for both your <strong>Secret Vault</strong> and <strong>Secret Album</strong>. You must enter your account password to confirm.</p>'
  +   '<div style="display:flex;flex-direction:column;gap:12px;margin-bottom:14px">'
  +     pwdField('Account Password (to verify it\'s you)','pinVerifyPwd','Your current login password')
  +     '<div><label class="label">New Vault PIN (4+ digits)</label>'
  +       '<div style="display:flex;gap:10px;margin-top:6px" id="newPinRow">'
  +         '<input class="input" type="password" inputmode="numeric" maxlength="1" style="width:52px;height:52px;text-align:center;font-size:22px;font-weight:700;padding:0;flex-shrink:0" oninput="pinAdv(this,0)">'
  +         '<input class="input" type="password" inputmode="numeric" maxlength="1" style="width:52px;height:52px;text-align:center;font-size:22px;font-weight:700;padding:0;flex-shrink:0" oninput="pinAdv(this,1)">'
  +         '<input class="input" type="password" inputmode="numeric" maxlength="1" style="width:52px;height:52px;text-align:center;font-size:22px;font-weight:700;padding:0;flex-shrink:0" oninput="pinAdv(this,2)">'
  +         '<input class="input" type="password" inputmode="numeric" maxlength="1" style="width:52px;height:52px;text-align:center;font-size:22px;font-weight:700;padding:0;flex-shrink:0" oninput="pinAdv(this,3)">'
  +         '<button type="button" onclick="togglePinVis()" id="pinEye" style="background:none;border:none;cursor:pointer;font-size:20px;color:#94A3B8;padding:4px" title="Show/hide PIN">👁</button>'
  +       '</div>'
  +     '</div>'
  +   '</div>'
  +   '<button id="pinBtn" onclick="resetVaultPin()" class="btn btn-primary btn-full">Reset Vault PIN 🔐</button>'
  + '</div>'

  + '<div class="card">'
  +   '<h3 style="font-size:15px;font-weight:800;margin-bottom:14px">🔔 Notifications</h3>'
  +   '<div id="notifToggles"></div>'
  + '</div>'

  + '</div>'

  /* ── Right ── */
  + '<div style="display:flex;flex-direction:column;gap:18px">'

  + '<div class="card">'
  +   '<h3 style="font-size:15px;font-weight:800;margin-bottom:14px">🌐 Session</h3>'
  +   '<div style="padding:12px 14px;border-radius:10px;background:#22C55E10;border:1px solid #22C55E30;margin-bottom:14px">'
  +     '<div style="font-weight:700;font-size:13px;color:#22C55E">✅ Connected to Live Backend</div>'
  +     '<div style="font-size:12px;color:#64748B;margin-top:4px">All data is saved to MongoDB</div>'
  +   '</div>'
  +   '<button onclick="Auth.logout()" class="btn btn-ghost btn-full">Sign Out</button>'
  + '</div>'

  + '<div class="card">'
  +   '<h3 style="font-size:15px;font-weight:800;margin-bottom:14px">🗑️ Danger Zone</h3>'
  +   '<div style="padding:14px;border-radius:10px;background:#EF444406;border:1px solid #EF444420">'
  +     '<div style="font-weight:700;font-size:13px;color:#0F172A;margin-bottom:4px">Delete Account</div>'
  +     '<div style="font-size:12px;color:#64748B;margin-bottom:12px;line-height:1.6">This is irreversible. All your data will be permanently deleted.</div>'
  +     '<button onclick="Layout.toast(\'Account deletion requires admin approval.\', \'warning\')" class="btn btn-danger btn-sm">Delete Account</button>'
  +   '</div>'
  + '</div>'

  + '</div>'
  + '</div>';

renderNotifToggles();
</script>
</body>
</html>
