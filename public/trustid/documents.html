<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Documents</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./js/react.min.js"></script>
  <script src="./js/react-dom.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="./js/auth.js"></script>
<script>Auth.requireAuth();</script>
<script src="./js/api.js"></script>
<script src="./js/components.js"></script>
<script>
const { createElement: h, useState, useEffect, useCallback } = React;
const cic = { identity:'🪪', financial:'💳', address:'🏠', other:'📄' };

function DocumentsPage() {
  const [docs,      setDocs]     = useState([]);
  const [loading,   setLoading]  = useState(true);
  const [tab,       setTab]      = useState('all');
  const [view,      setView]     = useState('table');
  const [showUp,    setShowUp]   = useState(false);
  const [uf,        setUf]       = useState({ type:'', category:'identity' });
  const [uploading, setUploading]= useState(false);
  const toast = useToast();

  const load = useCallback(async () => {
    setLoading(true);
    const r = await Api.getDocs();
    if (r.success) setDocs(r.data);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const upload = async () => {
    if (!uf.type) return;
    setUploading(true);
    const r = await Api.uploadDoc({ name:uf.type, type:uf.type, category:uf.category });
    setUploading(false);
    if (r.success) {
      setDocs(d => [r.data, ...d]);
      setShowUp(false);
      setUf({ type:'', category:'identity' });
      toast({ type:'success', msg:'Document uploaded!' });
    } else toast({ type:'error', msg:r.message || 'Upload failed' });
  };

  const filtered = tab === 'all' ? docs : docs.filter(d => d.status === tab);

  return h(AppLayout, { activePage:'documents' },
    h('div', null,
      h(PH, { title:'Documents', sub:`${docs.length} total · ${docs.filter(d=>d.status==='verified').length} verified`,
        actions: h(Btn, { label:'Upload Document', icon:'📤', full:false, sm:true, onClick:()=>setShowUp(true) }) }),

      /* Tabs + View Toggle */
      h('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18} },
        h('div', { style:{display:'flex',background:C[100],borderRadius:10,padding:4,gap:2} },
          ['all','verified','pending','rejected'].map(t =>
            h('button', { key:t, onClick:()=>setTab(t),
              style:{padding:'6px 16px',borderRadius:8,border:'none',background:tab===t?'#fff':'transparent',color:tab===t?C[900]:C[500],fontWeight:tab===t?700:400,fontSize:13,cursor:'pointer',textTransform:'capitalize',boxShadow:tab===t?'0 1px 4px rgba(0,0,0,0.08)':'none'} },
              t, tab===t&&` (${filtered.length})`)
          )
        ),
        h('div', { style:{display:'flex',gap:6} },
          ['table','grid'].map(v =>
            h('button', { key:v, onClick:()=>setView(v), style:{padding:'6px 12px',borderRadius:8,border:`1px solid ${C[200]}`,background:view===v?C.purple:'#fff',color:view===v?'#fff':C[600],fontWeight:600,fontSize:12,cursor:'pointer'} },
              v==='table'?'☰ Table':'⊞ Grid')
          )
        )
      ),

      loading ? h('div', { style:{display:'flex',justifyContent:'center',padding:60} }, h(Spin, { sz:32 })) :
      view==='table' ?
        h('div', { className:'table-wrap' },
          h('table', null,
            h('thead', null, h('tr', null, ['Document','Category','Date','Status',''].map(hd => h('th', { key:hd }, hd)))),
            h('tbody', null,
              filtered.map(doc => h('tr', { key:doc._id },
                h('td', null, h('div', { style:{display:'flex',alignItems:'center',gap:11} },
                  h('div', { style:{width:38,height:38,borderRadius:9,background:C[100],display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0} }, cic[doc.category]||'📄'),
                  h('span', { style:{fontWeight:600} }, doc.name))),
                h('td', { style:{textTransform:'capitalize'} }, doc.category),
                h('td', null, fmtDate(doc.createdAt)),
                h('td', null, h(Badge, { status:doc.status })),
                h('td', null)
              ))
            )
          ),
          filtered.length===0 && h('div', { style:{textAlign:'center',padding:40,color:C[400]} }, 'No documents found')
        ) :
        h('div', { style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16} },
          filtered.map(doc => h('div', { key:doc._id, className:'card', style:{cursor:'pointer'} },
            h('div', { style:{display:'flex',justifyContent:'space-between',marginBottom:14} },
              h('div', { style:{width:48,height:48,borderRadius:12,background:C[100],display:'flex',alignItems:'center',justifyContent:'center',fontSize:24} }, cic[doc.category]||'📄'),
              h(Badge, { status:doc.status })
            ),
            h('div', { style:{fontWeight:700,fontSize:14,color:C[900]} }, doc.name),
            h('div', { style:{fontSize:12,color:C[500],marginTop:4} }, fmtDate(doc.createdAt))
          ))
        ),

      h(Modal, { open:showUp, onClose:()=>setShowUp(false), title:'Upload Document' },
        h('div', { style:{display:'flex',flexDirection:'column',gap:16} },
          h(Sel, { label:'Document Type', value:uf.type, onChange:v=>setUf(f=>({...f,type:v})), ph:'Select type…',
            options:['Passport',"Driver's License",'National ID','Bank Statement','Utility Bill','Tax Return','Birth Certificate'] }),
          h(Sel, { label:'Category', value:uf.category, onChange:v=>setUf(f=>({...f,category:v})),
            options:[{v:'identity',l:'Identity'},{v:'financial',l:'Financial'},{v:'address',l:'Address'},{v:'other',l:'Other'}] }),
          h('div', { style:{border:`2px dashed ${C[200]}`,borderRadius:12,padding:28,textAlign:'center',background:C[50]} },
            h('div', { style:{fontSize:30,marginBottom:8} }, '📁'),
            h('div', { style:{fontSize:14,color:C[500]} }, 'Click to select or drag & drop'),
            h('div', { style:{fontSize:12,color:C[400],marginTop:4} }, 'PDF, JPG, PNG — max 10MB')
          ),
          h(Btn, { label:'Upload Document', onClick:upload, loading:uploading, icon:'📤' })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(DocumentsPage));
</script>
</body>
</html>
