<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Expenses</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>

<!-- Add Expense Modal -->
<div id="expenseModal" class="modal-backdrop" style="display:none">
  <div class="modal" style="max-width:440px;width:100%">
    <div class="modal-header">
      <h2 class="modal-title">Add Expense</h2>
      <button onclick="closeExpenseModal()" style="background:none;border:none;font-size:24px;cursor:pointer;color:#94A3B8;line-height:1;padding:0">&times;</button>
    </div>
    <div style="padding:24px;display:flex;flex-direction:column;gap:16px">
      <div>
        <label class="label">Title <span style="color:#EF4444">*</span></label>
        <input id="expTitle" class="input" placeholder="e.g. Grocery Shopping">
      </div>
      <div>
        <label class="label">Amount ($) <span style="color:#EF4444">*</span></label>
        <input id="expAmount" class="input" type="number" min="0" step="0.01" placeholder="0.00">
      </div>
      <div>
        <label class="label">Category</label>
        <select id="expCategory" class="input">
          <option>Food</option>
          <option>Entertainment</option>
          <option>Utilities</option>
          <option>Health</option>
          <option>Transport</option>
          <option>Shopping</option>
          <option>Other</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;margin-top:4px">
        <button onclick="closeExpenseModal()" class="btn btn-ghost btn-full">Cancel</button>
        <button onclick="submitExpense()" id="expBtn" class="btn btn-primary btn-full">Add Expense</button>
      </div>
    </div>
  </div>
</div>

<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('expenses');
document.getElementById('loading').innerHTML = Layout.spinner();

var CAT_ICONS  = { Food:'🍔', Entertainment:'🎬', Utilities:'⚡', Health:'💊', Transport:'🚗', Shopping:'🛍️', Other:'💸' };
var CAT_COLORS = { Food:'#22C55E', Entertainment:'#7C3AED', Utilities:'#F97316', Health:'#3B82F6', Transport:'#EF4444', Shopping:'#EC4899', Other:'#64748B' };

var allExpenses = [];

function openExpenseModal()  { document.getElementById('expenseModal').style.display = 'flex'; }
function closeExpenseModal() {
  document.getElementById('expenseModal').style.display = 'none';
  document.getElementById('expTitle').value    = '';
  document.getElementById('expAmount').value   = '';
  document.getElementById('expCategory').value = 'Food';
}

function getStats() {
  var total  = allExpenses.reduce(function(s, e){ return s + parseFloat(e.amount || 0); }, 0);
  var bycat  = {};
  allExpenses.forEach(function(e) { bycat[e.category] = (bycat[e.category] || 0) + parseFloat(e.amount || 0); });
  var topCat = '—';
  var topAmt = 0;
  Object.keys(bycat).forEach(function(k) { if (bycat[k] > topAmt) { topAmt = bycat[k]; topCat = k; } });
  return { total: total, count: allExpenses.length, avg: allExpenses.length ? total / allExpenses.length : 0, topCat: topCat, bycat: bycat };
}

function renderExpenses() {
  var stats = getStats();

  /* stat cards */
  var sc = document.getElementById('statCards');
  if (sc) {
    sc.innerHTML =
      Layout.statCard('💰', 'Total This Month', '$' + stats.total.toFixed(2), '#7C3AED')
    + Layout.statCard('🧾', 'Transactions',     stats.count,                   '#3B82F6')
    + Layout.statCard('📊', 'Avg Transaction',  '$' + stats.avg.toFixed(2),    '#F97316')
    + Layout.statCard('🏆', 'Top Category',     stats.topCat,                  '#22C55E');
  }

  /* category bars */
  var catBars = document.getElementById('catBars');
  if (catBars) {
    var entries = Object.keys(stats.bycat).sort(function(a,b){ return stats.bycat[b] - stats.bycat[a]; });
    if (entries.length === 0) {
      catBars.innerHTML = '<div class="empty">No spending data yet.</div>';
    } else {
      catBars.innerHTML = entries.map(function(cat) {
        var amt = stats.bycat[cat];
        var pct = stats.total > 0 ? ((amt / stats.total) * 100).toFixed(0) : 0;
        var col = CAT_COLORS[cat] || '#64748B';
        return '<div style="margin-bottom:12px">'
          + '<div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:13px">'
          +   '<span>' + (CAT_ICONS[cat] || '💸') + ' ' + cat + '</span>'
          +   '<span style="font-weight:700">$' + amt.toFixed(2) + ' (' + pct + '%)</span>'
          + '</div>'
          + '<div style="height:6px;background:#F1F5F9;border-radius:3px">'
          +   '<div style="height:100%;border-radius:3px;background:' + col + ';width:' + pct + '%"></div>'
          + '</div>'
          + '</div>';
      }).join('');
    }
  }

  /* transactions list */
  var listEl = document.getElementById('txList');
  if (listEl) {
    if (allExpenses.length === 0) {
      listEl.innerHTML = '<div class="empty">No transactions yet. Add your first expense!</div>';
    } else {
      listEl.innerHTML = allExpenses.map(function(e) {
        var col  = CAT_COLORS[e.category] || '#64748B';
        var icon = CAT_ICONS[e.category]  || '💸';
        return '<div style="display:flex;align-items:center;gap:15px;padding:13px 0;border-bottom:1px solid #F8FAFC">'
          + '<div style="width:44px;height:44px;border-radius:12px;background:' + col + '15;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">' + icon + '</div>'
          + '<div style="flex:1">'
          +   '<div style="font-weight:600;font-size:14px;color:#0F172A">' + e.title + '</div>'
          +   '<div style="font-size:12px;color:#64748B">' + e.category + ' · ' + Layout.fmtDate(e.date || e.createdAt) + '</div>'
          + '</div>'
          + '<div style="font-weight:800;font-size:15px;color:' + col + '">-$' + parseFloat(e.amount).toFixed(2) + '</div>'
          + '<button onclick="deleteExpense(\'' + e._id + '\')" style="background:none;border:none;cursor:pointer;color:#CBD5E1;font-size:17px;padding:4px 6px">🗑</button>'
          + '</div>';
      }).join('');
    }
  }
}

function deleteExpense(id) {
  if (!confirm('Delete this expense?')) return;
  Api.deleteExpense(id).then(function(res) {
    if (res.success) {
      allExpenses = allExpenses.filter(function(e){ return e._id !== id; });
      renderExpenses();
      Layout.toast('Expense deleted.', 'info');
    } else {
      Layout.toast(res.message || 'Failed to delete.', 'error');
    }
  });
}

function submitExpense() {
  var title    = document.getElementById('expTitle').value.trim();
  var amount   = parseFloat(document.getElementById('expAmount').value);
  var category = document.getElementById('expCategory').value;

  if (!title || isNaN(amount) || amount <= 0) {
    Layout.toast('Please enter a valid title and amount.', 'error');
    return;
  }

  var btn = document.getElementById('expBtn');
  btn.disabled    = true;
  btn.textContent = 'Adding…';

  Api.addExpense({ title: title, amount: amount, category: category }).then(function(res) {
    btn.disabled    = false;
    btn.textContent = 'Add Expense';
    if (res.success) {
      allExpenses.unshift(res.data);
      renderExpenses();
      closeExpenseModal();
      Layout.toast('Expense added!');
    } else {
      Layout.toast(res.message || 'Failed to add expense.', 'error');
    }
  });
}

Api.getExpenses().then(function(res) {
  allExpenses = res.success ? res.data : [];

  document.getElementById('content').innerHTML =
    '<div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">'
    + '<div><h1 class="page-title">Expenses</h1><p class="page-sub">Track and manage your spending</p></div>'
    + '<button onclick="openExpenseModal()" class="btn btn-primary">➕ Add Expense</button>'
    + '</div>'

    + '<div class="grid-4" id="statCards" style="margin-bottom:24px"></div>'

    + '<div class="card" style="margin-bottom:22px">'
    +   '<h3 style="font-size:14px;font-weight:800;margin-bottom:18px">Spending by Category</h3>'
    +   '<div id="catBars"></div>'
    + '</div>'

    + '<div class="card">'
    +   '<h3 style="font-size:14px;font-weight:800;margin-bottom:16px">All Transactions</h3>'
    +   '<div id="txList"></div>'
    + '</div>';

  renderExpenses();
}).catch(function() {
  document.getElementById('content').innerHTML = '<div class="empty">Failed to load expenses. Please refresh.</div>';
});
</script>
</body>
</html>
