<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Your Digital Identity Platform</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1E1B4B">
  <meta name="description" content="Manage, verify, and share your identity documents with AI-powered scanning and real-time trust scoring.">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="./js/auth.js"></script>
<script>
/* Redirect logged-in users */
Auth.requireGuest();
</script>
<script src="./js/api.js"></script>
<script src="./js/components.js"></script>
<script>
const { createElement: h, useState } = React;

const feats = [
  ['🛡️','Digital Identity','Secure, government-grade identity certificates stored on a trusted platform.'],
  ['📊','Trust Score','Dynamic 0–1000 score that grows as you verify more documents.'],
  ['🤖','AI Doc Scanning','AI-powered document enhancement and authenticity verification.'],
  ['📱','QR Verification','Instantly share your TrustID with QR codes for real-time verification.'],
  ['💰','Expense Tracker','Built-in financial tracker to manage documents and spending together.'],
  ['🔒','Bank-grade Security','End-to-end encryption, MFA, and zero-knowledge proofs.'],
];

function Landing() {
  const go = p => window.location.href = p;
  return h('div', { style:{fontFamily:'Inter,system-ui,sans-serif',background:'#fff',overflowX:'hidden'} },

    /* NAV */
    h('nav', { style:{position:'sticky',top:0,zIndex:100,background:'rgba(255,255,255,0.95)',backdropFilter:'blur(12px)',borderBottom:`1px solid ${C[100]}`,height:66,display:'flex',alignItems:'center'} },
      h('div', { style:{maxWidth:1140,margin:'0 auto',padding:'0 24px',width:'100%',display:'flex',alignItems:'center',justifyContent:'space-between'} },
        h('div', { style:{display:'flex',alignItems:'center',gap:10} },
          h('div', { style:{width:38,height:38,borderRadius:10,background:`linear-gradient(135deg,${C.navy},${C.purple})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18} }, '🛡️'),
          h('span', { style:{fontSize:20,fontWeight:900,color:C[900]} }, 'TrustID')
        ),
        h('div', { style:{display:'flex',alignItems:'center',gap:10} },
          h('button', { onClick:()=>go('./login.html'), className:'btn btn-outline btn-sm', style:{width:'auto'} }, 'Sign In'),
          h('button', { onClick:()=>go('./register.html'), className:'btn btn-primary btn-sm', style:{width:'auto'} }, 'Get Started →')
        )
      )
    ),

    /* HERO */
    h('div', { className:'hero', style:{position:'relative',overflow:'hidden'} },
      h('div', { style:{maxWidth:720,margin:'0 auto',position:'relative',textAlign:'center'} },
        h('div', { style:{display:'inline-flex',alignItems:'center',gap:8,padding:'6px 16px',borderRadius:100,background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',marginBottom:28} },
          h('span', { style:{width:8,height:8,borderRadius:'50%',background:C.green,display:'inline-block'} }),
          h('span', { style:{color:'rgba(255,255,255,0.8)',fontSize:13,fontWeight:600} }, 'Secure · Verified · Trusted')
        ),
        h('h1', { style:{fontSize:'clamp(36px,5.5vw,64px)',fontWeight:900,color:'#fff',lineHeight:1.1,marginBottom:20,letterSpacing:-1.5} },
          'Your Digital Identity,',
          h('br'),
          h('span', { style:{background:'linear-gradient(90deg,#A78BFA,#60A5FA)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'} }, 'Verified & Trusted')
        ),
        h('p', { style:{fontSize:17,color:'rgba(255,255,255,0.65)',maxWidth:560,margin:'0 auto 42px',lineHeight:1.75} },
          'The all-in-one platform to manage, verify, and share your identity documents — with AI-powered scanning and real-time trust scoring.'
        ),
        h('div', { style:{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'} },
          h('button', { onClick:()=>go('./register.html'), style:{padding:'15px 34px',borderRadius:14,background:'#fff',border:'none',color:C.purple,fontWeight:800,fontSize:16,cursor:'pointer',boxShadow:'0 8px 32px rgba(0,0,0,0.25)'} }, 'Create Free Account'),
          h('button', { onClick:()=>go('./login.html'), style:{padding:'15px 34px',borderRadius:14,background:'rgba(255,255,255,0.1)',border:'1.5px solid rgba(255,255,255,0.3)',color:'#fff',fontWeight:700,fontSize:16,cursor:'pointer'} }, 'Sign In →')
        )
      )
    ),

    /* STATS */
    h('div', { style:{background:C[900],padding:'40px 24px'} },
      h('div', { style:{maxWidth:1140,margin:'0 auto',display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:24,textAlign:'center'} },
        [['1,284+','Verified Users'],['4,521','Documents Verified'],['987','Active TrustIDs'],['99.9%','Uptime SLA']].map(([v,l]) =>
          h('div', { key:l },
            h('div', { style:{fontSize:34,fontWeight:900,color:'#fff'} }, v),
            h('div', { style:{fontSize:13,color:C[400],marginTop:5} }, l)
          )
        )
      )
    ),

    /* FEATURES */
    h('div', { className:'section', style:{background:C[50]} },
      h('div', { className:'container' },
        h('div', { style:{textAlign:'center',marginBottom:54} },
          h('div', { style:{display:'inline-block',padding:'5px 14px',borderRadius:100,background:C.purple+'12',color:C.purple,fontSize:12,fontWeight:700,marginBottom:14} }, 'PLATFORM FEATURES'),
          h('h2', { style:{fontSize:38,fontWeight:900,color:C[900],letterSpacing:-1,marginBottom:14} }, 'Everything you need'),
          h('p', { style:{fontSize:16,color:C[500],maxWidth:480,margin:'0 auto'} }, 'Manage your entire digital identity lifecycle from one powerful platform.')
        ),
        h('div', { className:'grid-3' },
          feats.map(([icon,title,desc]) =>
            h('div', { key:title, className:'card', style:{borderRadius:20,padding:26} },
              h('div', { style:{fontSize:34,marginBottom:14} }, icon),
              h('h3', { style:{fontSize:16,fontWeight:800,color:C[900],marginBottom:8} }, title),
              h('p', { style:{fontSize:14,color:C[500],lineHeight:1.65,margin:0} }, desc)
            )
          )
        )
      )
    ),

    /* HOW IT WORKS */
    h('div', { className:'section', style:{background:'#fff'} },
      h('div', { style:{maxWidth:900,margin:'0 auto',textAlign:'center'} },
        h('h2', { style:{fontSize:36,fontWeight:900,color:C[900],marginBottom:14,letterSpacing:-0.8} }, 'How TrustID works'),
        h('p', { style:{color:C[500],fontSize:16,marginBottom:54} }, 'Three simple steps to a verified digital identity.'),
        h('div', { className:'grid-3' },
          [['1','Create Account','Sign up free. No credit card required.',C.blue],['2','Verify Documents','Upload your ID documents. Our AI verifies them.',C.purple],['3','Get Your TrustID','Receive your certificate with a trust score.',C.green]].map(([n,t,d,col]) =>
            h('div', { key:n, style:{display:'flex',flexDirection:'column',alignItems:'center',gap:14} },
              h('div', { style:{width:60,height:60,borderRadius:'50%',background:`linear-gradient(135deg,${col},${col}90)`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:900,fontSize:22,boxShadow:`0 8px 24px ${col}40`} }, n),
              h('h3', { style:{fontSize:17,fontWeight:800,color:C[900]} }, t),
              h('p', { style:{fontSize:14,color:C[500],lineHeight:1.65,textAlign:'center'} }, d)
            )
          )
        )
      )
    ),

    /* CTA */
    h('div', { style:{background:`linear-gradient(135deg,${C.navy},${C.purple})`,padding:'80px 24px',textAlign:'center'} },
      h('div', { style:{maxWidth:600,margin:'0 auto'} },
        h('h2', { style:{fontSize:36,fontWeight:900,color:'#fff',marginBottom:16,letterSpacing:-0.5} }, "Ready to get your TrustID?"),
        h('p', { style:{fontSize:16,color:'rgba(255,255,255,0.7)',marginBottom:36,lineHeight:1.7} }, "Join thousands of users who trust us with their digital identity. It's free forever."),
        h('div', { style:{display:'flex',gap:14,justifyContent:'center'} },
          h('button', { onClick:()=>go('./register.html'), style:{padding:'14px 34px',borderRadius:14,background:'#fff',border:'none',color:C.purple,fontWeight:800,fontSize:15,cursor:'pointer'} }, 'Create Free Account'),
          h('button', { onClick:()=>go('./login.html'), style:{padding:'14px 34px',borderRadius:14,background:'transparent',border:'1.5px solid rgba(255,255,255,0.4)',color:'#fff',fontWeight:700,fontSize:15,cursor:'pointer'} }, 'Sign In')
        )
      )
    ),

    h('div', { style:{background:C[900],padding:'24px',textAlign:'center',color:C[500],fontSize:13} },
      '© 2024 TrustID Platform · Secure Digital Identity'
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(Landing));
</script>
</body>
</html>
