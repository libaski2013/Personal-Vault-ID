    .trustid-config input { width: min(46vw, 340px); border: 1px solid #CBD5E1; border-radius: 8px; padding: 8px 10px; font-size: 12px; }
    .trustid-config button { border: 0; border-radius: 8px; padding: 8px 10px; background: #1E1B4B; color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; }
    @media (max-width: 760px) { .trustid-config { display: none; } }

const h = ()=>({ "Content-Type":"application/json", Authorization:`Bearer ${_token}` });
const jfetch = async (url,opts={})=>{ const r=await fetch(url,{...opts,headers:{...h(),...(opts.headers||{})}}); return r.json(); };

const CAT_COLORS = {Food:GREEN,Entertainment:PURPLE,Utilities:ORANGE,Health:BLUE,Transport:RED,Shopping:"#EC4899",Other:SL[500]};

const api = {
  /* AUTH */
  login: async (email, password) => {
    if (DEMO_MODE) {
      await pause(700);
      if (email==="admin@trustid.com") { _token="demo_admin"; return {success:true,token:"demo_admin",user:D_USERS.admin}; }
      if (password.length>=6)          { _token="demo_user";  return {success:true,token:"demo_user", user:D_USERS.user};  }
      return {success:false,message:"Invalid credentials. Try any password ≥ 6 chars."};
    }
    const d = await jfetch(`${API_BASE}/auth/login`,{method:"POST",body:JSON.stringify({email,password})});
    if (d.token) { _token=d.token; return {success:true,...d}; }
    return {success:false,message:d.message};
  },
  register: async (body) => {
    if (DEMO_MODE) { await pause(900); return {success:true}; }
    const d = await jfetch(`${API_BASE}/auth/register`,{method:"POST",body:JSON.stringify(body)});
    return d.token ? {success:true,...d} : {success:false,message:d.message};
  },
  changePassword: async (cur,nw) => {
    if (DEMO_MODE) { await pause(500); return {success:true}; }
    const d = await jfetch(`${API_BASE}/auth/change-password`,{method:"PUT",body:JSON.stringify({currentPassword:cur,newPassword:nw})});
    return _optionalChain([d, 'access', _2 => _2.message, 'optionalAccess', _3 => _3.includes, 'call', _4 => _4("success")]) ? {success:true} : {success:false,message:d.message};
  },

  uploadDoc:  async (b) => {
    if (DEMO_MODE) {

      const n={_id:`d${Date.now()}`,name:b.name||b.type,type:b.type,category:b.category||"other",status:"pending",createdAt:new Date().toISOString(),isPrimary:false};
      D_DOCS.unshift(n); return {success:true,data:n};

    return {success:true,data:await jfetch(`${API_BASE}/documents`,{method:"POST",body:JSON.stringify(b)})};
  },
  getAllDocs:  async ()      => { if(DEMO_MODE){await pause(400);return{success:true,data:[...D_ALL_DOCS]};} return {success:true,data:await jfetch(`${API_BASE}/documents/all`)}; },
  verifyDoc:  async (id)    => { if(DEMO_MODE){await pause(600);const i=D_ALL_DOCS.findIndex(d=>d._id===id);if(i>-1)D_ALL_DOCS[i].status="verified";return{success:true};}
                                  await jfetch(`${API_BASE}/documents/${id}/verify`,{method:"PUT"}); return {success:true}; },
  rejectDoc:  async (id,r)  => { if(DEMO_MODE){await pause(600);const i=D_ALL_DOCS.findIndex(d=>d._id===id);if(i>-1)D_ALL_DOCS[i].status="rejected";return{success:true};}
