<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID Admin — Verification Queue</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="../icon.svg">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script>if(!Auth.requireAdmin()) throw '';</script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.init('admin-docs');
document.getElementById('loading').innerHTML = Layout.spinner();

var allDocs  = [];
var activeTab = 'pending';

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  var el = document.getElementById('dtab-' + tab);
  if (el) el.classList.add('active');
  renderDocs();
}

function renderDocs() {
  var filtered = activeTab === 'all'
    ? allDocs
    : allDocs.filter(function(d){ return d.status === activeTab; });

  var tbody = document.getElementById('docsBody');
  if (!tbody) return;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5"><div class="empty">🎉 No documents in this category.</div></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(d) {
    var u       = d.user || {};
    var actions = '';
    if (d.status === 'pending') {
      actions =
        '<div style="display:flex;gap:8px">'
        + '<button onclick="verifyDoc(\'' + d._id + '\')" style="padding:6px 14px;border-radius:8px;background:#22C55E12;border:1px solid #22C55E40;cursor:pointer;font-weight:700;font-size:12px;color:#22C55E">✓ Verify</button>'
        + '<button onclick="rejectDoc(\'' + d._id + '\')" style="padding:6px 14px;border-radius:8px;background:#EF444412;border:1px solid #EF444440;cursor:pointer;font-weight:700;font-size:12px;color:#EF4444">✗ Reject</button>'
        + '</div>';
    } else {
      actions = '<span style="font-size:12px;color:#94A3B8">— No action needed</span>';
    }
    return '<tr>'
      + '<td><div style="display:flex;align-items:center;gap:10px">'
      +   '<div style="width:38px;height:38px;border-radius:9px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📄</div>'
      +   '<span style="font-weight:600;font-size:13px;color:#0F172A">' + (d.type||d.name||'Document') + '</span>'
      + '</div></td>'
      + '<td>'
      +   '<div style="font-size:13px;font-weight:500;color:#0F172A">' + (u.firstName||'') + ' ' + (u.lastName||'') + '</div>'
      +   '<div style="font-size:11px;color:#64748B">' + (u.email||'') + '</div>'
      + '</td>'
      + '<td style="font-size:12px;color:#64748B">' + Layout.fmtDate(d.createdAt) + '</td>'
      + '<td>' + Layout.badge(d.status) + '</td>'
      + '<td>' + actions + '</td>'
      + '</tr>';
  }).join('');
}

function verifyDoc(id) {
  Api.verifyDoc(id).then(function(res) {
    if (res.success) {
      allDocs = allDocs.map(function(d){ return d._id === id ? Object.assign({}, d, { status:'verified' }) : d; });
      renderDocs();
      updateTabCounts();
      Layout.toast('Document verified!');
    } else {
      Layout.toast(res.message || 'Verification failed.', 'error');
    }
  });
}

function rejectDoc(id) {
  var reason = prompt('Reason for rejection (optional):') || 'Does not meet requirements';
  Api.rejectDoc(id, reason).then(function(res) {
    if (res.success) {
      allDocs = allDocs.map(function(d){ return d._id === id ? Object.assign({}, d, { status:'rejected' }) : d; });
      renderDocs();
      updateTabCounts();
      Layout.toast('Document rejected.', 'warning');
    } else {
      Layout.toast(res.message || 'Rejection failed.', 'error');
    }
  });
}

function updateTabCounts() {
  var pending  = allDocs.filter(function(d){ return d.status==='pending'; }).length;
  var verified = allDocs.filter(function(d){ return d.status==='verified'; }).length;
  var rejected = allDocs.filter(function(d){ return d.status==='rejected'; }).length;
  var pEl = document.getElementById('pcount');
  if (pEl) pEl.textContent = pending > 0 ? pending : '';
  var subEl = document.getElementById('queueSub');
  if (subEl) subEl.textContent = pending + ' documents awaiting review';
}

Api.getAllDocs().then(function(res) {
  allDocs = res.success ? res.data : [];
  var pending  = allDocs.filter(function(d){ return d.status==='pending'; }).length;
  var verified = allDocs.filter(function(d){ return d.status==='verified'; }).length;
  var rejected = allDocs.filter(function(d){ return d.status==='rejected'; }).length;

  document.getElementById('content').innerHTML =
    '<div class="page-header">'
    + '<div><h1 class="page-title">Verification Queue</h1><p class="page-sub" id="queueSub">' + pending + ' documents awaiting review</p></div>'
    + '</div>'

    + '<div class="tabs" style="margin-bottom:18px">'
    + '<button id="dtab-pending"  class="tab active" onclick="setTab(\'pending\')">Pending <span id="pcount" style="background:#F97316;color:#fff;border-radius:100px;padding:0 6px;font-size:10px;margin-left:5px;font-weight:700">' + (pending > 0 ? pending : '') + '</span></button>'
    + '<button id="dtab-verified" class="tab"        onclick="setTab(\'verified\')">Verified</button>'
    + '<button id="dtab-rejected" class="tab"        onclick="setTab(\'rejected\')">Rejected</button>'
    + '<button id="dtab-all"      class="tab"        onclick="setTab(\'all\')">All (' + allDocs.length + ')</button>'
    + '</div>'

    + '<div class="card">'
    +   '<div class="table-wrap"><table>'
    +   '<thead><tr><th>Document</th><th>Submitted By</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>'
    +   '<tbody id="docsBody"></tbody>'
    +   '</table></div>'
    + '</div>';

  renderDocs();
}).catch(function() {
  document.getElementById('content').innerHTML = '<div class="empty">Failed to load verification queue. Please refresh.</div>';
});
</script>
</body>
</html>
