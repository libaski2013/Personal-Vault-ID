<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID Admin — Verification Queue</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="../icon.svg">
  <link rel="stylesheet" href="../css/styles.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="../js/auth.js"></script>
<script>Auth.requireAdmin();</script>
<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script>
const { createElement: h, useState, useEffect, useCallback } = React;

function AdminDocs() {
  const [docs,    setDocs]    = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab,     setTab]     = useState('pending');
  const toast = useToast();

  const load = useCallback(async () => {
    setLoading(true);
    const r = await Api.getAllDocs();
    if (r.success) setDocs(r.data);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const verify = async id => {
    const r = await Api.verifyDoc(id);
    if (r.success) { setDocs(d=>d.map(x=>x._id===id?{...x,status:'verified'}:x)); toast({type:'success',msg:'Document verified!'}); }
    else toast({type:'error',msg:r.message||'Failed'});
  };

  const reject = async id => {
    const r = await Api.rejectDoc(id, 'Does not meet requirements');
    if (r.success) { setDocs(d=>d.map(x=>x._id===id?{...x,status:'rejected'}:x)); toast({type:'warning',msg:'Document rejected'}); }
    else toast({type:'error',msg:r.message||'Failed'});
  };

  const filtered = tab==='all' ? docs : docs.filter(d=>d.status===tab);
  const pending  = docs.filter(d=>d.status==='pending').length;

  return h(AppLayout, { activePage:'admin-docs' },
    h('div', null,
      h(PH, { title:'Verification Queue', sub:`${pending} documents awaiting review` }),

      /* Tabs */
      h('div', { style:{display:'flex',gap:4,marginBottom:18,background:C[100],borderRadius:10,padding:4,width:'fit-content'} },
        ['pending','verified','rejected','all'].map(t =>
          h('button', { key:t, onClick:()=>setTab(t),
            style:{padding:'7px 18px',borderRadius:8,border:'none',background:tab===t?'#fff':'transparent',color:tab===t?C[900]:C[500],fontWeight:tab===t?700:400,fontSize:13,cursor:'pointer',textTransform:'capitalize',boxShadow:tab===t?'0 1px 4px rgba(0,0,0,0.08)':'none'} },
            t,
            t==='pending'&&pending>0&&h('span', { style:{background:C.orange,color:'#fff',borderRadius:100,padding:'0 6px',fontSize:10,marginLeft:5,fontWeight:700} }, pending)
          )
        )
      ),

      h('div', { className:'table-wrap' },
        loading
          ? h('div', { style:{padding:40,textAlign:'center'} }, h(Spin))
          : h('table', null,
              h('thead', null,
                h('tr', null,
                  ['Document','Submitted By','Date','Status','Actions'].map(hd => h('th', { key:hd }, hd))
                )
              ),
              h('tbody', null,
                filtered.map(d =>
                  h('tr', { key:d._id },
                    h('td', null,
                      h('div', { style:{display:'flex',alignItems:'center',gap:10} },
                        h('div', { style:{width:38,height:38,borderRadius:9,background:C[100],display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0} }, '📄'),
                        h('span', { style:{fontWeight:600} }, d.type)
                      )
                    ),
                    h('td', null,
                      h('div', { style:{fontSize:13,fontWeight:500} }, `${d.user?.firstName||''} ${d.user?.lastName||''}`),
                      h('div', { style:{fontSize:11,color:C[500]} }, d.user?.email)
                    ),
                    h('td', { style:{color:C[500]} }, fmtDate(d.createdAt)),
                    h('td', null, h(Badge, { status:d.status })),
                    h('td', null,
                      d.status==='pending'
                        ? h('div', { style:{display:'flex',gap:8} },
                            h('button', { onClick:()=>verify(d._id), style:{padding:'6px 14px',borderRadius:8,background:C.green+'12',border:`1px solid ${C.green}40`,cursor:'pointer',fontWeight:700,fontSize:12,color:C.green} }, '✓ Verify'),
                            h('button', { onClick:()=>reject(d._id), style:{padding:'6px 14px',borderRadius:8,background:C.red+'12',border:`1px solid ${C.red}40`,cursor:'pointer',fontWeight:700,fontSize:12,color:C.red} }, '✗ Reject')
                          )
                        : h('span', { style:{fontSize:12,color:C[400]} }, '— No action needed')
                    )
                  )
                ),
                filtered.length===0 && h('tr', null,
                  h('td', { colSpan:5, style:{padding:40,textAlign:'center',color:C[400],fontSize:14} }, '🎉 No documents in this category')
                )
              )
            )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(AdminDocs));
</script>
</body>
</html>
