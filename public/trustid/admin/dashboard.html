<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID Admin — Overview</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="../icon.svg">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script>if(!Auth.requireAdmin()) throw '';</script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.init('admin-dashboard');
document.getElementById('loading').innerHTML = Layout.spinner();

Promise.all([Api.getAdminStats(), Api.getAllDocs()]).then(function(results) {
  var sr   = results[0];
  var dr   = results[1];
  var s    = sr.success ? sr.data : {};
  var docs = dr.success ? dr.data : [];

  var totalUsers    = s.totalUsers       || 0;
  var activeTrust   = s.activeTrustIds   || 0;
  var verifiedDocs  = s.verifiedDocs     || 0;
  var pendingReview = s.pendingReviews   || 0;

  var growth   = s.growth   || [];
  var docStatus = s.docStatus || [];
  var byLevel  = s.byLevel  || [];

  /* Growth bars */
  var maxU = 1;
  growth.forEach(function(g) { if (g.users > maxU) maxU = g.users; });

  var growthHTML = growth.map(function(g) {
    var uPct = ((g.users / maxU) * 100).toFixed(0);
    var dPct = ((( g.docs||0) / maxU) * 100).toFixed(0);
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;height:160px">'
      + '<div style="flex:1;width:100%;display:flex;align-items:flex-end;gap:2px">'
      +   '<div title="Users: ' + g.users + '" style="flex:1;height:' + uPct + '%;background:#3B82F690;border-radius:3px 3px 0 0;min-height:4px"></div>'
      +   '<div title="Docs: ' + (g.docs||0) + '" style="flex:1;height:' + dPct + '%;background:#7C3AED90;border-radius:3px 3px 0 0;min-height:4px"></div>'
      + '</div>'
      + '<span style="font-size:9px;color:#64748B;margin-top:4px">' + (g.m||'') + '</span>'
      + '</div>';
  }).join('');

  /* Doc status bars */
  var maxDocVal = 1;
  docStatus.forEach(function(d) { if ((d.value||0) > maxDocVal) maxDocVal = d.value; });
  var docStatusHTML = docStatus.map(function(d) {
    var pct = ((( d.value||0) / maxDocVal) * 100).toFixed(0);
    return '<div style="margin-bottom:12px">'
      + '<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">'
      +   '<span>' + (d.name||'') + '</span>'
      +   '<strong>' + (d.value||0) + '</strong>'
      + '</div>'
      + '<div style="height:6px;background:#F1F5F9;border-radius:3px">'
      +   '<div style="height:100%;border-radius:3px;background:' + (d.color||'#7C3AED') + ';width:' + pct + '%"></div>'
      + '</div>'
      + '</div>';
  }).join('');

  /* By level bars */
  var maxLvl = 1;
  byLevel.forEach(function(x) { if ((x.v||0) > maxLvl) maxLvl = x.v; });
  var byLevelHTML = byLevel.map(function(x) {
    var pct = (((x.v||0) / maxLvl) * 100).toFixed(0);
    return '<div style="margin-bottom:10px">'
      + '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px">'
      +   '<span style="color:#475569">' + (x.l||'') + '</span>'
      +   '<strong>' + (x.v||0) + '</strong>'
      + '</div>'
      + '<div style="height:6px;background:#F1F5F9;border-radius:3px">'
      +   '<div style="height:100%;border-radius:3px;background:#7C3AED;width:' + pct + '%"></div>'
      + '</div>'
      + '</div>';
  }).join('');

  /* Recent submissions */
  var recentHTML = docs.slice(0, 6).map(function(d) {
    return '<div style="display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid #F8FAFC">'
      + '<div style="width:36px;height:36px;border-radius:8px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0">📄</div>'
      + '<div style="flex:1">'
      +   '<div style="font-weight:600;font-size:12px;color:#0F172A">' + (d.type||'Document') + '</div>'
      +   '<div style="font-size:11px;color:#64748B">' + ((d.user||{}).firstName||'') + ' ' + ((d.user||{}).lastName||'') + ' · ' + Layout.fmtShort(d.createdAt) + '</div>'
      + '</div>'
      + Layout.badge(d.status)
      + '</div>';
  }).join('');

  document.getElementById('content').innerHTML =
    '<div class="page-header">'
    + '<div><h1 class="page-title">Platform Overview</h1><p class="page-sub">Real-time analytics &amp; insights</p></div>'
    + '</div>'

    + '<div class="grid-4" style="margin-bottom:26px">'
    + Layout.statCard('👥', 'Total Users',       totalUsers.toLocaleString(),   '#3B82F6')
    + Layout.statCard('🛡️', 'Active TrustIDs',   activeTrust.toLocaleString(),  '#7C3AED')
    + Layout.statCard('✅', 'Verified Docs',      verifiedDocs.toLocaleString(), '#22C55E')
    + Layout.statCard('⏳', 'Pending Reviews',    pendingReview,                 '#F97316')
    + '</div>'

    + '<div style="display:grid;grid-template-columns:2fr 1fr;gap:22px;margin-bottom:22px">'

    /* Growth chart */
    + '<div class="card">'
    +   '<h3 style="font-size:14px;font-weight:800;margin-bottom:18px">Platform Growth</h3>'
    +   '<div style="display:flex;align-items:flex-end;gap:8px;height:160px;padding-bottom:24px">'
    +     (growthHTML || '<div style="color:#94A3B8;font-size:13px;margin:auto">No growth data yet</div>')
    +   '</div>'
    +   '<div style="display:flex;gap:16px;margin-top:8px">'
    +     '<span style="display:flex;align-items:center;gap:4px;font-size:12px"><span style="width:10px;height:10px;border-radius:2px;background:#3B82F690;display:inline-block"></span>Users</span>'
    +     '<span style="display:flex;align-items:center;gap:4px;font-size:12px"><span style="width:10px;height:10px;border-radius:2px;background:#7C3AED90;display:inline-block"></span>Docs</span>'
    +   '</div>'
    + '</div>'

    /* Doc status */
    + '<div class="card">'
    +   '<h3 style="font-size:14px;font-weight:800;margin-bottom:14px">Document Status</h3>'
    +   (docStatusHTML || '<div class="empty">No status data</div>')
    + '</div>'

    + '</div>'

    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:22px">'

    /* By level */
    + '<div class="card">'
    +   '<h3 style="font-size:14px;font-weight:800;margin-bottom:16px">Users by Trust Level</h3>'
    +   (byLevelHTML || '<div class="empty">No level data</div>')
    + '</div>'

    /* Recent submissions */
    + '<div class="card">'
    +   '<h3 style="font-size:14px;font-weight:800;margin-bottom:16px">Recent Submissions</h3>'
    +   (docs.length === 0 ? '<div class="empty">No documents yet</div>' : recentHTML)
    + '</div>'

    + '</div>'

    /* ── System Control Panel ── */
    + '<div style="margin-top:28px;background:linear-gradient(135deg,#0F0E2A,#1E1B4B);border-radius:20px;padding:28px;color:#fff">'
    +   '<div style="display:flex;align-items:center;gap:12px;margin-bottom:6px">'
    +     '<span style="font-size:24px">⚙️</span>'
    +     '<h3 style="font-size:16px;font-weight:900">System Control Panel</h3>'
    +     '<span style="font-size:11px;background:#F9731618;color:#F97316;padding:3px 10px;border-radius:100px;font-weight:700;border:1px solid #F9731640">ADMIN ONLY</span>'
    +   '</div>'
    +   '<p style="font-size:13px;color:rgba(255,255,255,0.55);margin-bottom:24px">Use these controls to manage the system. Actions here are irreversible.</p>'
    +   '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">'

    /* Change admin password */
    +   '<div style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:18px">'
    +     '<div style="font-size:18px;margin-bottom:8px">🔑</div>'
    +     '<div style="font-weight:700;margin-bottom:4px">Change Admin Password</div>'
    +     '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:14px">Update your super admin password from the default</div>'
    +     '<a href="../settings.html" style="display:inline-block;padding:8px 16px;border-radius:10px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:#fff;font-size:13px;font-weight:600;text-decoration:none">Go to Settings →</a>'
    +   '</div>'

    /* Clear test data */
    +   '<div style="background:#EF444410;border:1px solid #EF444430;border-radius:14px;padding:18px">'
    +     '<div style="font-size:18px;margin-bottom:8px">🗑️</div>'
    +     '<div style="font-weight:700;margin-bottom:4px;color:#fff">Clear All Test Data</div>'
    +     '<div style="font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:14px" id="clearSubText">Permanently delete all test users and their data. Admin accounts are kept.</div>'
    +     '<button onclick="previewClear()" style="padding:8px 16px;border-radius:10px;background:#EF4444;border:none;color:#fff;font-size:13px;font-weight:700;cursor:pointer" id="clearBtn">🗑 Review &amp; Clear</button>'
    +   '</div>'

    +   '</div>'
    + '</div>';

}).catch(function() {
  document.getElementById('content').innerHTML = '<div class="empty">Failed to load admin data. Please refresh.</div>';
});

/* ── Clear test data flow ── */
async function previewClear() {
  var btn = document.getElementById('clearBtn');
  btn.textContent = 'Loading…';
  btn.disabled = true;

  var res = await fetch('../api/trustid/admin/data-counts', { headers:{ Authorization:'Bearer '+Auth.getToken() } }).then(function(r){return r.json();});

  if (!res.success) { Layout.toast(res.message||'Error loading counts', 'error'); btn.textContent='🗑 Review & Clear'; btn.disabled=false; return; }

  var d = res.data;
  var confirmed = confirm(
    '⚠️  CLEAR ALL TEST DATA\n\n' +
    'This will permanently delete:\n' +
    '  • ' + d.testUsers      + ' test users\n' +
    '  • ' + d.docs           + ' documents\n' +
    '  • ' + d.expenses       + ' expenses\n' +
    '  • ' + d.reminders      + ' reminders\n' +
    '  • ' + d.todos          + ' to-do items\n' +
    '  • ' + d.academics      + ' academic records\n' +
    '  • ' + d.lifeEntries    + ' life story entries\n' +
    '  • ' + d.vaultItems     + ' vault items\n' +
    '  • ' + d.shareCards     + ' share cards\n\n' +
    'TOTAL: ' + d.total + ' records\n\n' +
    '✅ Admin accounts are KEPT.\n\n' +
    'Click OK to permanently delete all test data.'
  );

  if (!confirmed) { btn.textContent='🗑 Review & Clear'; btn.disabled=false; return; }

  /* Second confirmation */
  var typed = prompt('Type  CLEAR ALL  to confirm:');
  if ((typed||'').trim() !== 'CLEAR ALL') {
    Layout.toast('Cancelled — confirmation text did not match', 'warning');
    btn.textContent='🗑 Review & Clear'; btn.disabled=false; return;
  }

  btn.textContent = 'Clearing…';
  var del = await fetch('../api/trustid/admin/clear-test-data', {
    method: 'DELETE',
    headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+Auth.getToken() },
    body: JSON.stringify({ confirm:'CLEAR ALL TEST DATA' })
  }).then(function(r){return r.json();});

  if (del.success) {
    document.getElementById('clearSubText').textContent = '✅ Cleared! ' + JSON.stringify(del.deleted);
    Layout.toast('All test data cleared successfully. System is ready for live use.', 'success');
    setTimeout(function(){ location.reload(); }, 2000);
  } else {
    Layout.toast(del.message||'Clear failed', 'error');
  }
  btn.textContent='🗑 Review & Clear'; btn.disabled=false;
}
</script>
</body>
</html>
