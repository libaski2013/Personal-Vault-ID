<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID Admin — Registry</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="../icon.svg">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>
<script src="../js/auth.js"></script>
<script>if(!Auth.requireAdmin()) throw '';</script>
<script src="../js/api.js"></script>
<script src="../js/layout.js"></script>
<script>
Layout.init('admin-trustids');
document.getElementById('loading').innerHTML = Layout.spinner();

var allUsers = [];

function renderUsers(search) {
  search = (search || '').toLowerCase();
  var filtered = allUsers.filter(function(u) {
    return (u.firstName + ' ' + u.lastName + ' ' + u.email).toLowerCase().indexOf(search) !== -1;
  });

  var tbody = document.getElementById('tidBody');
  if (!tbody) return;

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty">No users found.</div></td></tr>';
    return;
  }

  tbody.innerHTML = filtered.map(function(u) {
    var tid   = u.trustId || {};
    var level = tid.level || 1;
    var score = tid.score || 0;
    var col   = Layout.tlColor(level);
    var lbl   = Layout.tlN(level);
    var ini   = ((u.firstName||'')[0]||'U').toUpperCase();
    var pct   = ((score / 1000) * 100).toFixed(0);

    return '<tr>'
      + '<td><div style="display:flex;align-items:center;gap:12px">'
      +   '<div style="width:42px;height:42px;border-radius:50%;background:' + col + '20;border:2px solid ' + col + '30;display:flex;align-items:center;justify-content:center;color:' + col + ';font-weight:800;font-size:15px;flex-shrink:0">' + ini + '</div>'
      +   '<div>'
      +     '<div style="font-weight:700;font-size:13px;color:#0F172A">' + (u.firstName||'') + ' ' + (u.lastName||'') + '</div>'
      +     '<div style="font-size:11px;color:#64748B">' + (u.email||'') + '</div>'
      +   '</div>'
      + '</div></td>'
      + '<td><span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:100px;background:' + col + '15;border:1px solid ' + col + '30;color:' + col + ';font-size:11px;font-weight:700">🛡 L' + level + ' · ' + lbl + '</span></td>'
      + '<td><div style="display:flex;align-items:center;gap:10px">'
      +   '<div style="flex:1;height:6px;background:#F1F5F9;border-radius:3px;max-width:80px">'
      +     '<div style="height:100%;border-radius:3px;background:' + col + ';width:' + pct + '%"></div>'
      +   '</div>'
      +   '<span style="font-size:13px;font-weight:700;color:' + col + '">' + score + '</span>'
      + '</div></td>'
      + '<td style="font-size:13px;color:#64748B">' + (u.docsCount||0) + ' docs</td>'
      + '<td>' + Layout.badge(u.status||'active') + '</td>'
      + '<td><button style="padding:5px 12px;border-radius:8px;background:#F1F5F9;border:none;cursor:pointer;font-size:12px;color:#64748B;font-weight:600">View</button></td>'
      + '</tr>';
  }).join('');
}

Api.getAdminUsers().then(function(res) {
  allUsers = res.success ? res.data : [];

  document.getElementById('content').innerHTML =
    '<div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">'
    + '<div><h1 class="page-title">TrustID Registry</h1><p class="page-sub">All issued TrustID certificates</p></div>'
    + '<button onclick="Layout.toast(\'Export coming soon.\', \'info\')" class="btn btn-ghost">📤 Export Registry</button>'
    + '</div>'

    + '<div class="card">'
    +   '<div style="padding-bottom:16px;border-bottom:1px solid #F1F5F9;margin-bottom:16px">'
    +     '<input id="searchInput" class="input" placeholder="🔍 Search users…" oninput="renderUsers(this.value)" style="max-width:360px">'
    +   '</div>'
    +   '<div class="table-wrap"><table>'
    +   '<thead><tr><th>User</th><th>Trust Level</th><th>Score</th><th>Documents</th><th>Status</th><th>Actions</th></tr></thead>'
    +   '<tbody id="tidBody"></tbody>'
    +   '</table></div>'
    + '</div>';

  renderUsers('');
}).catch(function() {
  document.getElementById('content').innerHTML = '<div class="empty">Failed to load TrustID registry. Please refresh.</div>';
});
</script>
</body>
</html>
