<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Dashboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>
<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('dashboard');
var user = Auth.getUser() || {};
var tid  = user.trustId || {};
document.getElementById('loading').innerHTML = Layout.spinner();

Promise.all([Api.getDocs(), Api.getReminders(), Api.getTodos(), Api.getExpenses()])
.then(function(results) {
  var docs     = results[0].success ? results[0].data : [];
  var rems     = results[1].success ? results[1].data : [];
  var todos    = results[2].success ? results[2].data : [];
  var expenses = results[3].success ? results[3].data : [];

  var totalExp = expenses.reduce(function(s,e){ return s + e.amount; }, 0);
  var verified = docs.filter(function(d){ return d.status==='verified'; }).length;
  var pcol     = { high:'#EF4444', medium:'#F97316', low:'#22C55E' };

  var scoreColor = ['','#EF4444','#F97316','#EAB308','#22C55E','#7C3AED'][tid.level||1]||'#94A3B8';
  var score = tid.score || 100;
  var r = 44, circ = 2*Math.PI*r;
  var offset = circ*(1 - score/1000);

  document.getElementById('content').innerHTML =
    '<div class="page-header">'
    + '<div><h1 class="page-title">Good morning, '+user.firstName+' 👋</h1>'
    + '<p class="page-sub">'+new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})+'</p></div>'
    + '</div>'

    /* Stat cards */
    + '<div class="grid-4" style="margin-bottom:24px">'
    + Layout.statCard('🛡️','Trust Score', score, '#7C3AED')
    + Layout.statCard('📄','Documents',   docs.length, '#3B82F6')
    + Layout.statCard('✅','Verified',    verified, '#22C55E')
    + Layout.statCard('💰','Monthly Expenses', '$'+totalExp.toFixed(0), '#F97316')
    + '</div>'

    /* Two-column layout */
    + '<div style="display:grid;grid-template-columns:1fr 340px;gap:22px">'

    /* Left */
    + '<div style="display:flex;flex-direction:column;gap:20px">'

    /* TrustID Card */
    + '<div style="background:linear-gradient(135deg,#0F0E2A 0%,#312E81 55%,#7C3AED 100%);border-radius:22px;padding:30px;box-shadow:0 16px 48px #7C3AED40">'
    + '<div style="display:flex;align-items:flex-start;justify-content:space-between">'
    + '<div>'
    + '<div style="display:flex;align-items:center;gap:7px;margin-bottom:16px"><span style="font-size:17px">🛡️</span><span style="color:rgba(255,255,255,0.6);font-size:11px;font-weight:700;letter-spacing:2px">TRUSTID ACTIVE</span></div>'
    + '<div style="color:#fff;font-size:17px;font-weight:800;letter-spacing:2.5px;margin-bottom:8px;font-family:monospace">'+(tid.id||'Pending Issuance')+'</div>'
    + '<div style="color:rgba(255,255,255,0.55);font-size:12px;margin-bottom:16px">Issued '+Layout.fmtDate(tid.issuedAt)+' · '+user.firstName+' '+user.lastName+'</div>'
    + '<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:100px;background:'+scoreColor+'18;border:1px solid '+scoreColor+'40;color:'+scoreColor+';font-size:11px;font-weight:700">🛡 L'+(tid.level||1)+' · '+Layout.tlN(tid.level||1)+'</span>'
    + '</div>'
    /* Score ring */
    + '<div style="position:relative;width:108px;height:108px;flex-shrink:0">'
    + '<svg width="108" height="108" style="transform:rotate(-90deg)"><circle cx="54" cy="54" r="'+r+'" fill="none" stroke="#E2E8F0" stroke-width="7"/><circle cx="54" cy="54" r="'+r+'" fill="none" stroke="'+scoreColor+'" stroke-width="7" stroke-dasharray="'+circ+'" stroke-dashoffset="'+offset+'" stroke-linecap="round"/></svg>'
    + '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center"><span style="font-size:22px;font-weight:900;color:'+scoreColor+'">'+score+'</span><span style="font-size:11px;color:#64748B">/1000</span></div>'
    + '</div>'
    + '</div></div>'

    /* Recent docs */
    + '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><h3 style="font-size:14px;font-weight:800;margin:0">Recent Documents</h3><a href="./documents.html" style="font-size:12px;color:#7C3AED;font-weight:600">View all →</a></div>'
    + (docs.length===0 ? '<div class="empty">No documents yet</div>' :
       docs.slice(0,4).map(function(d){
         return '<div style="display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:1px solid #F8FAFC">'
           + '<div style="width:40px;height:40px;border-radius:10px;background:#F1F5F9;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0">📄</div>'
           + '<div style="flex:1"><div style="font-weight:600;font-size:13px">'+d.name+'</div><div style="font-size:11px;color:#64748B">'+Layout.fmtDate(d.createdAt)+'</div></div>'
           + Layout.badge(d.status)+'</div>';
       }).join(''))
    + '</div></div>'

    /* Right */
    + '<div style="display:flex;flex-direction:column;gap:16px">'

    /* Reminders */
    + '<div class="card"><h3 style="font-size:13px;font-weight:800;margin-bottom:13px">⏰ Upcoming Reminders</h3>'
    + (rems.filter(function(r){return !r.done;}).length===0 ? '<div class="empty" style="padding:16px">🎉 All caught up!</div>' :
       rems.filter(function(r){return !r.done;}).slice(0,4).map(function(r){
         return '<div style="display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #F8FAFC">'
           + '<div style="width:5px;border-radius:3px;background:'+(pcol[r.priority]||'#94A3B8')+';flex-shrink:0"></div>'
           + '<div><div style="font-size:13px;font-weight:600">'+r.title+'</div>'
           + '<div style="font-size:11px;color:#64748B">📅 '+Layout.fmtDate(r.dueDate)+'</div></div></div>';
       }).join(''))
    + '</div>'

    /* Todos */
    + '<div class="card"><h3 style="font-size:13px;font-weight:800;margin-bottom:13px">✅ Pending Tasks</h3>'
    + (todos.filter(function(t){return !t.done;}).length===0 ? '<div class="empty" style="padding:16px">All done!</div>' :
       todos.filter(function(t){return !t.done;}).slice(0,4).map(function(t){
         return '<div style="display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid #F8FAFC">'
           + '<div style="width:17px;height:17px;border-radius:50%;border:2px solid '+(pcol[t.priority]||'#94A3B8')+';flex-shrink:0"></div>'
           + '<span style="font-size:13px;color:#334155">'+t.title+'</span></div>';
       }).join(''))
    + '</div>'

    /* Expenses */
    + '<div style="background:linear-gradient(135deg,#7C3AED,#8B5CF6);border-radius:16px;padding:20px;color:#fff">'
    + '<div style="font-size:12px;font-weight:600;opacity:0.75;margin-bottom:4px">💰 Total Expenses</div>'
    + '<div style="font-size:30px;font-weight:900">$'+totalExp.toFixed(2)+'</div>'
    + '<div style="font-size:11px;opacity:0.65;margin-top:4px">This month · '+expenses.length+' transactions</div>'
    + '</div>'

    + '</div></div>';
}).catch(function(e){
  document.getElementById('content').innerHTML = '<div class="empty">Failed to load data. Please refresh.</div>';
});
</script>
</body>
</html>
