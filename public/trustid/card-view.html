<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Digital Contact Card</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <meta name="theme-color" content="#0D1117">
  <link rel="icon" href="./icon.svg">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,sans-serif;background:#1a1a1a;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 12px 40px;}
    a{color:inherit;text-decoration:none;}
    :root{--gold:#C9A227;--gold2:#E8C84A;--dark:#0D1117;}

    /* Header */
    .pv-bar{width:min(520px,100%);background:linear-gradient(135deg,#0D1117,#1E1B4B);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .pv-icon{width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#7C3AED,#5B21B6);display:flex;align-items:center;justify-content:center;font-size:14px;}
    .pv-title{font-size:12px;font-weight:800;color:#fff;}
    .pv-sub{font-size:9px;color:rgba(255,255,255,0.35);font-weight:600;}
    .verified{margin-left:auto;background:rgba(201,162,39,0.15);border:1px solid rgba(201,162,39,0.3);border-radius:100px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--gold);}

    /* Card wrapper */
    .card-outer{width:min(520px,100%);border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 0 1px rgba(201,162,39,0.2);}

    /* Split body */
    .corp-body{display:grid;grid-template-columns:200px 1fr;}

    /* LEFT */
    .corp-left{background:var(--dark);padding:20px 16px 16px;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:9px;}
    .corp-left::before{content:'';position:absolute;top:-20px;right:-30px;width:90px;height:120%;background:linear-gradient(180deg,var(--gold),transparent 60%);transform:skewX(-12deg);opacity:.07;pointer-events:none;}
    .logo-w{width:44px;height:44px;border-radius:9px;overflow:hidden;border:1.5px solid rgba(201,162,39,0.4);display:flex;align-items:center;justify-content:center;background:rgba(201,162,39,0.1);font-size:20px;flex-shrink:0;}
    .logo-w img{width:100%;height:100%;object-fit:cover;}
    .corp-name{font-size:15px;font-weight:900;color:#fff;letter-spacing:.5px;text-transform:uppercase;line-height:1.1;}
    .corp-co{font-size:19px;font-weight:900;color:var(--gold);letter-spacing:.5px;text-transform:uppercase;line-height:1;}
    .title-row{display:flex;align-items:center;gap:5px;margin:3px 0;}
    .t-line{flex:1;height:1px;background:var(--gold);opacity:.45;}
    .corp-title{font-size:9px;font-weight:700;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap;}
    /* Bio expandable */
    .bio-wrap{font-size:10px;color:rgba(255,255,255,.6);line-height:1.55;font-style:italic;}
    .bio-text{overflow:hidden;transition:max-height .3s;}
    .bio-text.c{max-height:30px;}
    .bio-text.e{max-height:300px;}
    .bio-btn{font-size:9px;color:var(--gold);cursor:pointer;font-weight:700;background:none;border:none;padding:2px 0;letter-spacing:.5px;}
    /* Contact rows */
    .contacts{display:flex;flex-direction:column;gap:6px;margin-top:2px;}
    .c-row{display:flex;align-items:center;gap:7px;}
    .c-ico{width:24px;height:24px;border-radius:6px;background:rgba(201,162,39,.15);border:1px solid rgba(201,162,39,.3);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;color:var(--gold);}
    .c-info{flex:1;min-width:0;}
    .c-lbl{font-size:7px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}
    .c-val{font-size:10px;color:rgba(255,255,255,.8);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .c-val a{color:inherit;}

    /* RIGHT */
    .corp-right{background:#F8F8F4;padding:14px 14px 10px;display:flex;flex-direction:column;gap:9px;}
    .photo-qr{display:flex;justify-content:space-between;align-items:flex-start;}
    .corp-ph{width:80px;height:100px;object-fit:cover;border-radius:9px;border:3px solid var(--gold);display:block;}
    .corp-ph-e{width:80px;height:100px;border-radius:9px;border:2px dashed var(--gold);background:rgba(201,162,39,.06);display:flex;align-items:center;justify-content:center;font-size:28px;}
    .qr-w{text-align:center;}
    .qr-w img{width:60px;height:60px;border-radius:7px;border:2px solid #E8ECF4;display:block;}
    .qr-l{font-size:7px;font-weight:700;color:#64748B;letter-spacing:.8px;margin-top:3px;}
    /* Social */
    .conn-hdr{display:flex;align-items:center;gap:7px;border-bottom:1.5px solid var(--gold);padding-bottom:5px;}
    .conn-ico{width:22px;height:22px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
    .conn-title{font-size:10px;font-weight:900;color:var(--dark);letter-spacing:1.2px;text-transform:uppercase;}
    .soc-list{display:flex;flex-direction:column;gap:4px;}
    .soc-row{display:flex;align-items:center;gap:7px;}
    .soc-ico{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
    .soc-url{font-size:10px;color:#334155;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .soc-url a{color:inherit;}
    .soc-line{flex:1;height:1px;background:var(--gold);opacity:.25;}

    /* BOTTOM BAR */
    .corp-bot{background:var(--dark);display:grid;grid-template-columns:repeat(4,1fr);border-top:2px solid var(--gold);}
    .bot-item{padding:8px 10px;border-right:1px solid rgba(201,162,39,.12);}
    .bot-item:last-child{border-right:none;}
    .bot-icon{font-size:14px;margin-bottom:2px;}
    .bot-lbl{font-size:7px;font-weight:800;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;}
    .bot-txt{font-size:9px;color:rgba(255,255,255,.6);line-height:1.4;margin-top:1px;}

    /* Watermark */
    .corp-wm{position:absolute;bottom:44px;right:5px;font-size:7px;font-weight:700;color:rgba(255,255,255,.05);letter-spacing:2px;transform:rotate(-90deg);transform-origin:right center;pointer-events:none;white-space:nowrap;}

    /* Actions */
    .actions{width:min(520px,100%);margin-top:14px;display:flex;flex-direction:column;gap:8px;}
    .a-btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:all .15s;}
    .a-btn:hover{transform:translateY(-1px);}
    .a-save{background:linear-gradient(135deg,#7C3AED,#5B21B6);color:#fff;}
    .a-wa{background:#25D366;color:#fff;}
    .a-call{background:#0D1117;color:var(--gold);border:1.5px solid rgba(201,162,39,.3);}
    .a-copy{background:#fff;color:#334155;border:1.5px solid #E8ECF4;}

    .powered{margin-top:16px;font-size:11px;color:#555;text-align:center;}
    .powered a{color:var(--gold);font-weight:700;}
    .loading{display:flex;flex-direction:column;align-items:center;gap:12px;padding:80px 20px;color:#888;}
    .spin{width:32px;height:32px;border-radius:50%;border:3px solid rgba(201,162,39,.2);border-top-color:var(--gold);animation:sp .8s linear infinite;}
    @keyframes sp{to{transform:rotate(360deg)}}
    @media(max-width:480px){
      .corp-body{grid-template-columns:1fr;}
      .corp-bot{grid-template-columns:repeat(2,1fr);}
    }
  </style>
</head>
<body>

<div class="pv-bar">
  <div class="pv-icon">🔐</div>
  <div><div class="pv-title">Personal Vault</div><div class="pv-sub">DIGITAL CONTACT CARD</div></div>
  <div class="verified">✦ Verified</div>
</div>

<div id="main"><div class="loading"><div class="spin"></div><span style="color:#888">Loading card…</span></div></div>

<div class="powered">Powered by <a href="./index.html">Personal Vault</a></div>

<script>
var code=new URLSearchParams(window.location.search).get('code');
var SOCIALS=[
  {k:'facebook', icon:'📘',color:'#1877F2',base:'facebook.com/'},
  {k:'instagram',icon:'📷',color:'#E1306C',base:'instagram.com/'},
  {k:'linkedin', icon:'💼',color:'#0A66C2',base:'linkedin.com/in/'},
  {k:'twitter',  icon:'🐦',color:'#000',   base:'twitter.com/'},
  {k:'youtube',  icon:'📺',color:'#FF0000',base:'youtube.com/@'},
  {k:'tiktok',   icon:'🎵',color:'#010101',base:'tiktok.com/@'},
  {k:'telegram', icon:'✈️',color:'#229ED9',base:'t.me/'},
  {k:'github',   icon:'💻',color:'#333',   base:'github.com/'},
];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

if(!code){
  document.getElementById('main').innerHTML='<div class="loading"><div style="font-size:36px">❌</div><span>No card code. Scan a valid QR.</span></div>';
} else {
  fetch('/api/trustid/cards/view/'+code)
    .then(function(r){return r.json();})
    .then(function(r){
      if(!r.success){document.getElementById('main').innerHTML='<div class="loading"><div style="font-size:36px">🔒</div><span>'+r.message+'</span></div>';return;}
      render(r.data);
    })
    .catch(function(){document.getElementById('main').innerHTML='<div class="loading"><div style="font-size:36px">⚠️</div><span>Network error</span></div>';});
}

function render(d){
  if(d.fullName) document.title=d.fullName+' — Digital Card';
  var qrUrl=window.location.href;
  var qrSrc='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data='+encodeURIComponent(qrUrl);
  var phones=(d.phones||[]).filter(function(p){return p.number;});
  var activeSoc=SOCIALS.filter(function(s){return d.socials&&d.socials[s.k];});
  var hasBio=!!(d.bio&&d.bio.trim());
  var bioLong=hasBio&&d.bio.length>55;

  var html='<div class="card-outer" style="position:relative"><div class="corp-body">';

  /* LEFT */
  html+='<div class="corp-left">';
  html+='<div class="logo-w">'+(d.logo?'<img src="'+d.logo+'" alt="Logo" draggable="false">':'🏢')+'</div>';
  html+='<div class="corp-name">'+(d.fullName||'Name')+'</div>';
  if(d.businessName) html+='<div class="corp-co">'+esc(d.businessName)+'</div>';
  if(d.jobTitle) html+='<div class="title-row"><div class="t-line"></div><div class="corp-title">'+esc(d.jobTitle)+'</div><div class="t-line"></div></div>';
  if(hasBio) html+='<div class="bio-wrap"><div class="bio-text c" id="bioT">'+esc(d.bio)+'</div>'+(bioLong?'<button class="bio-btn" onclick="tb(this)">Read more ↓</button>':'')+'</div>';
  html+='<div class="contacts">';
  phones.forEach(function(p){html+='<div class="c-row"><div class="c-ico">📞</div><div class="c-info"><div class="c-lbl">'+esc(p.label)+'</div><div class="c-val"><a href="tel:'+esc(p.number)+'">'+esc(p.number)+'</a></div></div></div>';});
  if(d.email) html+='<div class="c-row"><div class="c-ico">📧</div><div class="c-info"><div class="c-lbl">EMAIL</div><div class="c-val"><a href="mailto:'+esc(d.email)+'">'+esc(d.email)+'</a></div></div></div>';
  if(d.website) html+='<div class="c-row"><div class="c-ico">🌐</div><div class="c-info"><div class="c-lbl">WEBSITE</div><div class="c-val"><a href="'+esc(d.website)+'" target="_blank">'+esc(d.website.replace(/^https?:\/\//,''))+'</a></div></div></div>';
  if(d.location&&(d.location.city||d.location.country||d.location)) html+='<div class="c-row"><div class="c-ico">📍</div><div class="c-info"><div class="c-lbl">LOCATION</div><div class="c-val">'+(typeof d.location==='string'?esc(d.location):[d.location.city,d.location.country].filter(Boolean).map(esc).join(', '))+'</div></div></div>';
  html+='</div></div>';

  /* RIGHT */
  html+='<div class="corp-right">';
  html+='<div class="photo-qr"><div>'+(d.photo?'<img class="corp-ph" src="'+d.photo+'" alt="Photo" draggable="false">':'<div class="corp-ph-e">👤</div>')+'</div><div class="qr-w"><img src="'+qrSrc+'" alt="QR"><div class="qr-l">SCAN TO CONNECT</div></div></div>';
  html+='<div class="conn-hdr"><div class="conn-ico">👤</div><div class="conn-title">Connect With Me</div></div>';
  html+='<div class="soc-list">';
  if(activeSoc.length){
    activeSoc.forEach(function(s){
      var h=(d.socials[s.k]||'').replace('@','');
      var url='https://'+s.base+h;
      html+='<div class="soc-row"><div class="soc-ico" style="background:'+s.color+'18;color:'+s.color+'">'+s.icon+'</div><div class="soc-url"><a href="'+url+'" target="_blank">'+s.base+esc(h)+'</a></div><div class="soc-line"></div></div>';
    });
  } else {
    html+='<div style="font-size:11px;color:#94A3B8;padding:8px 0">No social handles added</div>';
  }
  html+='</div></div>';
  html+='</div>'; /* end corp-body */

  /* BOTTOM BAR */
  var bot=[
    {icon:'🎯',lbl:'VISION',    txt:d.vision     ||''},
    {icon:'⭐',lbl:'EXPERTISE', txt:d.expertise  ||''},
    {icon:'🤝',lbl:'SERVICES',  txt:(d.services&&d.services.length)?d.services.join(' | '):''},
    {icon:'🏆',lbl:'COMMITMENT',txt:d.commitment ||''},
  ].filter(function(b){return b.txt;});

  if(bot.length){
    /* Pad to 4 */
    while(bot.length<4) bot.push({icon:'',lbl:'',txt:''});
    html+='<div class="corp-bot">';
    bot.forEach(function(b){html+='<div class="bot-item"><div class="bot-icon">'+b.icon+'</div><div class="bot-lbl">'+b.lbl+'</div><div class="bot-txt">'+esc(b.txt)+'</div></div>';});
    html+='</div>';
  }

  html+='<div class="corp-wm">✦ PERSONAL VAULT ✦</div>';
  html+='</div>'; /* end card-outer */

  /* Actions */
  var firstPhone=phones.length?phones[0].number:'';
  var waNum=(d.whatsapp||firstPhone).replace(/\D/g,'');
  html+='<div class="actions">';
  html+='<button class="a-btn a-save" onclick="saveContact()">👥 Save to My Contacts</button>';
  if(waNum) html+='<a class="a-btn a-wa" href="https://wa.me/'+waNum+'" target="_blank">💬 WhatsApp</a>';
  if(firstPhone) html+='<a class="a-btn a-call" href="tel:'+firstPhone+'">📞 Call '+firstPhone+'</a>';
  html+='<button class="a-btn a-copy" onclick="copyLink()">🔗 Copy Card Link</button>';
  html+='</div>';

  document.getElementById('main').innerHTML=html;
}

function tb(btn){var el=document.getElementById('bioT');if(!el)return;var ex=el.classList.toggle('e');el.classList.toggle('c',!ex);btn.textContent=ex?'Read less ↑':'Read more ↓';}

function saveContact(){
  var tok=localStorage.getItem('tid_token');
  if(!tok){if(confirm('Sign in to save this contact?'))window.location.href='./login.html';return;}
  fetch('/api/trustid/cards/save',{method:'POST',headers:{'Content-Type':'application/json',Authorization:'Bearer '+tok},body:JSON.stringify({shareCode:code})})
    .then(function(r){return r.json();})
    .then(function(r){alert(r.success?'Contact saved to Personal Vault! 👥':r.message||'Error');});
}
function copyLink(){navigator.clipboard.writeText(window.location.href).then(function(){alert('Link copied to clipboard!');});}
</script>
</body>
</html>
