<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — My TrustID</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>
<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('trustid');
document.getElementById('loading').innerHTML = Layout.spinner();

var user  = Auth.getUser() || {};
var tid   = user.trustId   || {};
var level = tid.level || 1;
var score = tid.score || 100;
var col   = Layout.tlColor(level);
var ini   = ((user.firstName||'')[0]||'').toUpperCase() + ((user.lastName||'')[0]||'').toUpperCase();

/* Score ring SVG */
var r    = 50;
var circ = 2 * Math.PI * r;
var offset = circ * (1 - score / 1000);

var bars = [
  ['Identity Verification',   85],
  ['Document Authenticity',   90],
  ['Address Verification',    70],
  ['Financial Verification',  60]
];

function tlBadge(lvl) {
  var c   = Layout.tlColor(lvl);
  var lbl = Layout.tlN(lvl);
  return '<span style="display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border-radius:100px;background:' + c + '18;border:1px solid ' + c + '40;color:' + c + ';font-size:12px;font-weight:700">🛡 L' + lvl + ' · ' + lbl + '</span>';
}

document.getElementById('content').innerHTML =
  '<div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">'
  + '<div><h1 class="page-title">My TrustID</h1><p class="page-sub">Your verified digital identity certificate</p></div>'
  + '<div style="display:flex;gap:10px">'
  +   '<button class="btn btn-ghost">📄 Export PDF</button>'
  +   '<button class="btn btn-primary">🔗 Share TrustID</button>'
  + '</div>'
  + '</div>'

  + '<div style="display:grid;grid-template-columns:1fr 340px;gap:24px">'

  /* ── Left column ── */
  + '<div style="display:flex;flex-direction:column;gap:20px">'

  /* Certificate card */
  + '<div style="background:linear-gradient(135deg,#0F0E2A 0%,#312E81 55%,#7C3AED 100%);border-radius:24px;padding:32px;box-shadow:0 20px 60px #7C3AED45;position:relative;overflow:hidden">'
  +   '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px">'
  +     '<div style="display:flex;align-items:center;gap:10px">'
  +       '<span style="font-size:26px">🛡️</span>'
  +       '<div>'
  +         '<div style="color:rgba(255,255,255,0.45);font-size:9px;font-weight:700;letter-spacing:2.5px">TRUSTID DIGITAL CERTIFICATE</div>'
  +         '<div style="color:#fff;font-size:15px;font-weight:900">TrustID Platform</div>'
  +       '</div>'
  +     '</div>'
  +     tlBadge(level)
  +   '</div>'
  +   '<div>'
  +     '<div style="color:rgba(255,255,255,0.4);font-size:10px;font-weight:700;letter-spacing:3px;margin-bottom:8px">CERTIFICATE NUMBER</div>'
  +     '<div style="color:#fff;font-size:20px;font-weight:800;letter-spacing:4px;margin-bottom:22px;font-family:monospace">' + (tid.id || 'PENDING') + '</div>'
  +     '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:18px">'
  +       '<div><div style="color:rgba(255,255,255,0.4);font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:5px">OWNER</div><div style="color:#fff;font-size:14px;font-weight:600">' + (user.firstName||'') + ' ' + (user.lastName||'') + '</div></div>'
  +       '<div><div style="color:rgba(255,255,255,0.4);font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:5px">ISSUED</div><div style="color:#fff;font-size:14px;font-weight:600">' + Layout.fmtDate(tid.issuedAt) + '</div></div>'
  +       '<div><div style="color:rgba(255,255,255,0.4);font-size:9px;font-weight:700;letter-spacing:1.5px;margin-bottom:5px">STATUS</div><div style="color:#fff;font-size:14px;font-weight:600">' + (tid.status||'pending').toUpperCase() + '</div></div>'
  +     '</div>'
  +   '</div>'
  + '</div>'

  /* Score breakdown */
  + '<div class="card">'
  +   '<h3 style="font-size:14px;font-weight:800;margin-bottom:20px">Trust Score Breakdown</h3>'
  +   '<div style="display:flex;align-items:center;gap:26px;margin-bottom:24px">'
  +     '<div style="position:relative;width:120px;height:120px;flex-shrink:0">'
  +       '<svg width="120" height="120" style="transform:rotate(-90deg)">'
  +         '<circle cx="60" cy="60" r="' + r + '" fill="none" stroke="#E2E8F0" stroke-width="8"/>'
  +         '<circle cx="60" cy="60" r="' + r + '" fill="none" stroke="' + col + '" stroke-width="8" stroke-dasharray="' + circ.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '" stroke-linecap="round"/>'
  +       '</svg>'
  +       '<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">'
  +         '<span style="font-size:24px;font-weight:900;color:' + col + '">' + score + '</span>'
  +         '<span style="font-size:11px;color:#64748B">/1000</span>'
  +       '</div>'
  +     '</div>'
  +     '<div>'
  +       '<div style="font-size:36px;font-weight:900;color:' + col + '">' + score + '</div>'
  +       '<div style="font-size:13px;color:#64748B">out of 1,000 points</div>'
  +       '<div style="margin-top:10px">' + tlBadge(level) + '</div>'
  +     '</div>'
  +   '</div>'
  +   bars.map(function(b) {
        return '<div style="margin-bottom:13px">'
          + '<div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px">'
          +   '<span style="color:#334155">' + b[0] + '</span>'
          +   '<span style="font-weight:700">' + b[1] + '%</span>'
          + '</div>'
          + '<div style="height:7px;background:#F1F5F9;border-radius:4px">'
          +   '<div style="height:100%;border-radius:4px;background:linear-gradient(90deg,#7C3AED,#8B5CF6);width:' + b[1] + '%"></div>'
          + '</div>'
          + '</div>';
      }).join('')
  + '</div>'
  + '</div>'

  /* ── Right column ── */
  + '<div style="display:flex;flex-direction:column;gap:16px">'

  /* QR placeholder */
  + '<div class="card" style="text-align:center">'
  +   '<h3 style="font-size:13px;font-weight:800;margin-bottom:14px">📱 QR Code</h3>'
  +   '<div style="width:150px;height:150px;margin:0 auto 14px;background:#F8FAFC;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:52px;border:2px dashed #E2E8F0">🔲</div>'
  +   '<p style="font-size:12px;color:#64748B;margin:0 0 12px">Scan to verify this TrustID instantly</p>'
  +   '<button class="btn btn-outline btn-sm">📥 Download QR</button>'
  + '</div>'

  /* Details table */
  + '<div class="card">'
  +   '<h3 style="font-size:13px;font-weight:800;margin-bottom:14px">Certificate Details</h3>'
  +   [
       ['TrustID',     tid.id || 'Pending'],
       ['Level',       level + ' — ' + Layout.tlN(level)],
       ['Score',       score + '/1000'],
       ['Status',      (tid.status||'pending').charAt(0).toUpperCase() + (tid.status||'pending').slice(1)],
       ['Owner',       (user.firstName||'') + ' ' + (user.lastName||'')],
       ['Email',       user.email || '—'],
       ['Issued',      Layout.fmtDate(tid.issuedAt)]
     ].map(function(row) {
       return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #F8FAFC;font-size:12px">'
         + '<span style="color:#64748B">' + row[0] + '</span>'
         + '<span style="font-weight:600;color:#0F172A">' + row[1] + '</span>'
         + '</div>';
     }).join('')
  + '</div>'
  + '</div>'
  + '</div>';
</script>
</body>
</html>
