<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Calendar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="./js/auth.js"></script>
<script>Auth.requireAuth();</script>
<script src="./js/api.js"></script>
<script src="./js/components.js"></script>
<script>
const { createElement: h, useState, useEffect } = React;
const MO = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const pcol = { high:C.red, medium:C.orange, low:C.green };

function CalendarPage() {
  const now = new Date();
  const [month,    setMonth] = useState(now.getMonth());
  const [year,     setYear]  = useState(now.getFullYear());
  const [sel,      setSel]   = useState(null);
  const [reminders,setRem]   = useState([]);

  useEffect(() => { Api.getReminders().then(r => r.success && setRem(r.data)); }, []);

  const days  = new Date(year, month+1, 0).getDate();
  const first = new Date(year, month, 1).getDay();
  const cells = [...Array(first).fill(null), ...Array.from({length:days},(_,i)=>i+1)];
  while (cells.length % 7 !== 0) cells.push(null);

  const eventsOn = d => reminders.filter(r => {
    if (!r.dueDate) return false;
    const rd = new Date(r.dueDate);
    return rd.getFullYear()===year && rd.getMonth()===month && rd.getDate()===d;
  });
  const monthEv = reminders.filter(r => {
    if (!r.dueDate) return false;
    const rd = new Date(r.dueDate);
    return rd.getFullYear()===year && rd.getMonth()===month;
  });

  const prev = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); };
  const next = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); };

  return h(AppLayout, { activePage:'calendar' },
    h('div', null,
      h(PH, { title:'Calendar', sub:'Schedule and event management' }),
      h('div', { style:{display:'grid',gridTemplateColumns:'1fr 300px',gap:22} },

        /* ── Calendar grid ── */
        h('div', { className:'card', style:{padding:26} },
          h('div', { style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22} },
            h('button', { onClick:prev, style:{width:36,height:36,borderRadius:10,border:`1px solid ${C[200]}`,background:'#fff',cursor:'pointer',fontSize:17} }, '‹'),
            h('h2', { style:{fontSize:18,fontWeight:800} }, `${MO[month]} ${year}`),
            h('button', { onClick:next, style:{width:36,height:36,borderRadius:10,border:`1px solid ${C[200]}`,background:'#fff',cursor:'pointer',fontSize:17} }, '›')
          ),
          /* Day labels */
          h('div', { style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:6} },
            ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d =>
              h('div', { key:d, style:{textAlign:'center',padding:'6px 0',fontSize:12,fontWeight:700,color:C[400]} }, d)
            )
          ),
          /* Day cells */
          h('div', { style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4} },
            cells.map((d,i) => {
              const evs = d ? eventsOn(d) : [], isSel = d===sel;
              return h('div', { key:i, onClick:()=>d&&setSel(d===sel?null:d),
                style:{minHeight:56,borderRadius:10,
                  background:isSel?C.purple:evs.length?C.purple+'08':'transparent',
                  border:isSel?`2px solid ${C.purple}`:`1px solid ${evs.length?C.purple+'20':'transparent'}`,
                  cursor:d?'pointer':'default',padding:'5px 4px',display:'flex',flexDirection:'column',alignItems:'center'} },
                d && h(React.Fragment, null,
                  h('span', { style:{fontSize:13,fontWeight:evs.length?700:400,color:isSel?'#fff':C[700]} }, d),
                  evs.slice(0,2).map((e,j) =>
                    h('div', { key:j, style:{width:'90%',marginTop:2,fontSize:8,background:pcol[e.priority]+(isSel?'40':'25'),color:isSel?'#fff':pcol[e.priority],borderRadius:3,padding:'1px 3px',fontWeight:600,overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'} }, e.title)
                  )
                )
              );
            })
          )
        ),

        /* ── Sidebar panel ── */
        h('div', { style:{display:'flex',flexDirection:'column',gap:14} },
          h('div', { className:'card' },
            h('h3', { style:{fontSize:13,fontWeight:800,marginBottom:14} }, `Events in ${MO[month]}`),
            monthEv.length===0
              ? h('div', { style:{textAlign:'center',color:C[400],padding:'18px 0',fontSize:13} }, 'No reminders this month')
              : monthEv.map(e =>
                  h('div', { key:e._id, style:{display:'flex',gap:11,padding:'10px 0',borderBottom:`1px solid ${C[50]}`} },
                    h('div', { style:{width:40,height:40,borderRadius:10,background:pcol[e.priority]+'15',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0} },
                      h('span', { style:{fontSize:14,fontWeight:800,color:pcol[e.priority]} }, new Date(e.dueDate).getDate())
                    ),
                    h('div', null,
                      h('div', { style:{fontWeight:600,fontSize:13} }, e.title),
                      h('div', { style:{fontSize:11,color:C[500]} }, fmtDate(e.dueDate))
                    )
                  )
                )
          ),
          sel && h('div', { style:{background:C.purple+'08',borderRadius:14,padding:18,border:`1px solid ${C.purple}25`} },
            h('div', { style:{fontWeight:700,fontSize:13,color:C.purple,marginBottom:10} }, `📅 ${MO[month]} ${sel}`),
            eventsOn(sel).length > 0
              ? eventsOn(sel).map(e =>
                  h('div', { key:e._id, style:{display:'flex',gap:8,alignItems:'center',marginBottom:6} },
                    h('div', { style:{width:8,height:8,borderRadius:'50%',background:pcol[e.priority]} }),
                    h('span', { style:{fontSize:13,fontWeight:600} }, e.title)
                  )
                )
              : h('div', { style:{fontSize:13,color:C[500]} }, 'No reminders on this day')
          )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(CalendarPage));
</script>
</body>
</html>
