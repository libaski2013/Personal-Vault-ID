<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Calendar</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
<div class="app-shell">
  <div id="sidebar"></div>
  <div id="main">
    <div id="topbar"></div>
    <div class="page-content" id="content"><div id="loading"></div></div>
  </div>
</div>
<script src="./js/auth.js"></script>
<script>if(!Auth.requireAuth()) throw '';</script>
<script src="./js/api.js"></script>
<script src="./js/layout.js"></script>
<script>
Layout.init('calendar');
document.getElementById('loading').innerHTML = Layout.spinner();

var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var PCOL   = { high:'#EF4444', medium:'#F97316', low:'#22C55E' };

var now       = new Date();
var curMonth  = now.getMonth();
var curYear   = now.getFullYear();
var selDay    = null;
var reminders = [];

function eventsOnDay(d) {
  return reminders.filter(function(r) {
    if (!r.dueDate) return false;
    var rd = new Date(r.dueDate);
    return rd.getFullYear() === curYear && rd.getMonth() === curMonth && rd.getDate() === d;
  });
}

function eventsInMonth() {
  return reminders.filter(function(r) {
    if (!r.dueDate) return false;
    var rd = new Date(r.dueDate);
    return rd.getFullYear() === curYear && rd.getMonth() === curMonth;
  });
}

function renderCalendar() {
  var days  = new Date(curYear, curMonth + 1, 0).getDate();
  var first = new Date(curYear, curMonth, 1).getDay();
  var cells = [];
  var i;
  for (i = 0; i < first; i++) cells.push(null);
  for (i = 1; i <= days; i++) cells.push(i);
  while (cells.length % 7 !== 0) cells.push(null);

  /* Calendar grid */
  var gridHTML = DAYS.map(function(d) {
    return '<div style="text-align:center;padding:8px 0;font-size:12px;font-weight:700;color:#94A3B8">' + d + '</div>';
  }).join('');

  gridHTML += '<div style="display:contents">';
  cells.forEach(function(d, idx) {
    if (d === null) {
      gridHTML += '<div></div>';
      return;
    }
    var evs   = eventsOnDay(d);
    var isSel = d === selDay;
    var bg    = isSel ? '#7C3AED' : (evs.length ? '#7C3AED08' : 'transparent');
    var bord  = isSel ? '2px solid #7C3AED' : (evs.length ? '1px solid #7C3AED20' : '1px solid transparent');
    var dots  = evs.slice(0, 2).map(function(e) {
      var pc = PCOL[e.priority] || '#94A3B8';
      return '<div style="width:90%;margin:1px auto;font-size:8px;background:' + pc + (isSel ? '40' : '25') + ';color:' + (isSel ? '#fff' : pc) + ';border-radius:3px;padding:1px 3px;font-weight:600;overflow:hidden;white-space:nowrap;text-overflow:ellipsis">' + e.title + '</div>';
    }).join('');

    gridHTML += '<div onclick="selectDay(' + d + ')" style="min-height:56px;border-radius:10px;background:' + bg + ';border:' + bord + ';cursor:pointer;padding:5px 4px;display:flex;flex-direction:column;align-items:center">'
      + '<span style="font-size:13px;font-weight:' + (evs.length ? 700 : 400) + ';color:' + (isSel ? '#fff' : '#334155') + '">' + d + '</span>'
      + dots
      + '</div>';
  });
  gridHTML += '</div>';

  var gridEl = document.getElementById('calGrid');
  if (gridEl) gridEl.innerHTML = gridHTML;

  /* Month heading */
  var headEl = document.getElementById('calHead');
  if (headEl) headEl.textContent = MONTHS[curMonth] + ' ' + curYear;

  /* Month event list */
  var evList = document.getElementById('monthEvents');
  if (evList) {
    var mEvs = eventsInMonth();
    if (mEvs.length === 0) {
      evList.innerHTML = '<div style="text-align:center;color:#94A3B8;padding:18px 0;font-size:13px">No reminders this month</div>';
    } else {
      evList.innerHTML = mEvs.map(function(e) {
        var pc = PCOL[e.priority] || '#94A3B8';
        var day = new Date(e.dueDate).getDate();
        return '<div style="display:flex;gap:11px;padding:10px 0;border-bottom:1px solid #F8FAFC">'
          + '<div style="width:40px;height:40px;border-radius:10px;background:' + pc + '15;display:flex;align-items:center;justify-content:center;flex-shrink:0">'
          +   '<span style="font-size:14px;font-weight:800;color:' + pc + '">' + day + '</span>'
          + '</div>'
          + '<div>'
          +   '<div style="font-weight:600;font-size:13px;color:#0F172A">' + e.title + '</div>'
          +   '<div style="font-size:11px;color:#64748B">' + Layout.fmtDate(e.dueDate) + '</div>'
          + '</div>'
          + '</div>';
      }).join('');
    }
  }

  /* Selected day detail */
  var selDetail = document.getElementById('selDetail');
  if (selDetail) {
    if (selDay) {
      var dayEvs = eventsOnDay(selDay);
      var content;
      if (dayEvs.length === 0) {
        content = '<div style="font-size:13px;color:#64748B">No reminders on this day.</div>';
      } else {
        content = dayEvs.map(function(e) {
          var pc = PCOL[e.priority] || '#94A3B8';
          return '<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px">'
            + '<div style="width:8px;height:8px;border-radius:50%;background:' + pc + ';flex-shrink:0"></div>'
            + '<span style="font-size:13px;font-weight:600;color:#0F172A">' + e.title + '</span>'
            + '</div>';
        }).join('');
      }
      selDetail.style.display = 'block';
      selDetail.innerHTML =
        '<div style="font-weight:700;font-size:13px;color:#7C3AED;margin-bottom:10px">📅 ' + MONTHS[curMonth] + ' ' + selDay + '</div>'
        + content;
    } else {
      selDetail.style.display = 'none';
    }
  }
}

function selectDay(d) {
  selDay = selDay === d ? null : d;
  renderCalendar();
}

function prevMonth() {
  if (curMonth === 0) { curMonth = 11; curYear--; } else curMonth--;
  selDay = null;
  renderCalendar();
}

function nextMonth() {
  if (curMonth === 11) { curMonth = 0; curYear++; } else curMonth++;
  selDay = null;
  renderCalendar();
}

Api.getReminders().then(function(res) {
  reminders = res.success ? res.data : [];

  document.getElementById('content').innerHTML =
    '<div class="page-header">'
    + '<div><h1 class="page-title">Calendar</h1><p class="page-sub">Schedule and event management</p></div>'
    + '</div>'

    + '<div style="display:grid;grid-template-columns:1fr 300px;gap:22px">'

    /* Calendar card */
    + '<div class="card" style="padding:26px">'
    +   '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px">'
    +     '<button onclick="prevMonth()" style="width:36px;height:36px;border-radius:10px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;font-size:17px">‹</button>'
    +     '<h2 id="calHead" style="font-size:18px;font-weight:800;margin:0"></h2>'
    +     '<button onclick="nextMonth()" style="width:36px;height:36px;border-radius:10px;border:1px solid #E2E8F0;background:#fff;cursor:pointer;font-size:17px">›</button>'
    +   '</div>'
    +   '<div id="calGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px"></div>'
    + '</div>'

    /* Right panel */
    + '<div style="display:flex;flex-direction:column;gap:14px">'
    +   '<div class="card">'
    +     '<h3 style="font-size:13px;font-weight:800;margin-bottom:14px">Events this Month</h3>'
    +     '<div id="monthEvents"></div>'
    +   '</div>'
    +   '<div id="selDetail" style="background:#7C3AED08;border-radius:14px;padding:18px;border:1px solid #7C3AED25;display:none"></div>'
    + '</div>'

    + '</div>';

  renderCalendar();
}).catch(function() {
  document.getElementById('content').innerHTML = '<div class="empty">Failed to load calendar data. Please refresh.</div>';
});
</script>
</body>
</html>
