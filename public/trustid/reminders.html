<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>TrustID — Reminders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="./icon.svg">
  <link rel="stylesheet" href="./css/styles.css">
  <script src="./js/react.min.js"></script>
  <script src="./js/react-dom.min.js"></script>
</head>
<body>
<div id="app"></div>
<script src="./js/auth.js"></script>
<script>Auth.requireAuth();</script>
<script src="./js/api.js"></script>
<script src="./js/components.js"></script>
<script>
const { createElement: h, useState, useEffect, useCallback } = React;
const pc = { high:C.red, medium:C.orange, low:C.green };

function RemindersPage() {
  const [rem,    setRem]    = useState([]);
  const [loading,setLoading]= useState(true);
  const [show,   setShow]   = useState(false);
  const [form,   setForm]   = useState({ title:'', dueDate:'', priority:'medium' });
  const [saving, setSaving] = useState(false);
  const toast = useToast();

  const load = useCallback(async () => {
    setLoading(true);
    const r = await Api.getReminders();
    if (r.success) setRem(r.data);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const add = async () => {
    if (!form.title) return;
    setSaving(true);
    const r = await Api.addReminder(form);
    setSaving(false);
    if (r.success) { setRem(p=>[r.data,...p]); setForm({title:'',dueDate:'',priority:'medium'}); setShow(false); toast({type:'success',msg:'Reminder added!'}); }
    else toast({type:'error',msg:r.message||'Failed'});
  };

  const toggle = async (id, done) => {
    const r = await Api.updateReminder(id, { done:!done });
    if (r.success) setRem(p=>p.map(x=>x._id===id?{...x,done:!done}:x));
  };

  const del = async id => {
    await Api.deleteReminder(id);
    setRem(p=>p.filter(r=>r._id!==id));
  };

  const active = rem.filter(r=>!r.done);
  const done   = rem.filter(r=>r.done);

  return h(AppLayout, { activePage:'reminders' },
    h('div', null,
      h(PH, { title:'Reminders', sub:'Stay on top of deadlines',
        actions: h(Btn, { label:'Add Reminder', icon:'➕', full:false, sm:true, onClick:()=>setShow(true) }) }),

      loading ? h('div', { style:{display:'flex',justifyContent:'center',padding:60} }, h(Spin, { sz:32 })) :
      h('div', { style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:22} },
        h('div', null,
          h('h3', { style:{fontSize:13,fontWeight:800,color:C[700],marginBottom:12} }, `Active (${active.length})`),
          active.map(r => h('div', { key:r._id, className:'card', style:{marginBottom:10,display:'flex',gap:13,alignItems:'center'} },
            h('div', { onClick:()=>toggle(r._id,r.done), style:{width:24,height:24,borderRadius:'50%',border:`2.5px solid ${pc[r.priority]}`,cursor:'pointer',flexShrink:0} }),
            h('div', { style:{flex:1} },
              h('div', { style:{fontWeight:700,fontSize:14} }, r.title),
              h('div', { style:{fontSize:12,color:C[500],marginTop:3} }, r.dueDate?`📅 ${fmtDate(r.dueDate)}`:'No date')
            ),
            h('span', { style:{padding:'3px 10px',borderRadius:100,background:pc[r.priority]+'15',color:pc[r.priority],fontSize:11,fontWeight:700,textTransform:'capitalize'} }, r.priority),
            h('button', { onClick:()=>del(r._id), style:{background:'none',border:'none',cursor:'pointer',color:C[300],fontSize:17} }, '🗑')
          )),
          active.length===0 && h('div', { style:{textAlign:'center',padding:'32px 0',color:C[400],fontSize:14} }, '🎉 All caught up!')
        ),
        h('div', null,
          h('h3', { style:{fontSize:13,fontWeight:800,color:C[500],marginBottom:12} }, `Completed (${done.length})`),
          done.map(r => h('div', { key:r._id, className:'card', style:{marginBottom:10,display:'flex',gap:13,alignItems:'center',opacity:0.65} },
            h('div', { onClick:()=>toggle(r._id,r.done), style:{width:24,height:24,borderRadius:'50%',background:C.green+'20',border:`2.5px solid ${C.green}`,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',flexShrink:0,fontSize:12} }, '✓'),
            h('span', { style:{flex:1,textDecoration:'line-through',color:C[400],fontSize:14} }, r.title)
          ))
        )
      ),

      h(Modal, { open:show, onClose:()=>setShow(false), title:'Add Reminder' },
        h('div', { style:{display:'flex',flexDirection:'column',gap:15} },
          h(Field, { label:'Title', value:form.title, onChange:v=>setForm(f=>({...f,title:v})), placeholder:'e.g. Renew passport', req:true }),
          h(Field, { label:'Due Date', value:form.dueDate, onChange:v=>setForm(f=>({...f,dueDate:v})), type:'date' }),
          h('div', null,
            h('label', { className:'label' }, 'Priority'),
            h('div', { style:{display:'flex',gap:10} },
              ['low','medium','high'].map(p => h('button', { key:p, onClick:()=>setForm(f=>({...f,priority:p})),
                style:{flex:1,height:40,borderRadius:10,background:form.priority===p?pc[p]+'20':'transparent',border:`1.5px solid ${form.priority===p?pc[p]:C[200]}`,cursor:'pointer',fontWeight:700,fontSize:13,color:form.priority===p?pc[p]:C[500],textTransform:'capitalize'} }, p))
            )
          ),
          h(Btn, { label:'Add Reminder', onClick:add, loading:saving })
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(RemindersPage));
</script>
</body>
</html>
